                    ctx.lineWidth = 2;
                    ctx.strokeRect(bx, by, bw, bh);
                    ctx.fillStyle = sel ? '#000' : '#ccc';
                    ctx.font = sel ? 'bold 22px monospace' : '20px monospace';
                    ctx.fillText(`STAGE ${i + 1}`, VIEW_W / 2, by + 29);
                }
                if (maxReachedStage + 1 > visibleCount) {
                    ctx.fillStyle = '#666';
                    ctx.font = '13px monospace';
                    if (scrollOffset > 0) ctx.fillText('▲', VIEW_W / 2, listStartY - 8);
                    if (scrollOffset + visibleCount <= maxReachedStage) ctx.fillText('▼', VIEW_W / 2, listStartY + visibleCount * listSpacing + 12);
                }
                ctx.fillStyle = '#888';
                ctx.font = '14px monospace';
                ctx.fillText('[↑↓] / [WS] to move, [Enter] / [Space] to select, [Esc] to go back', VIEW_W / 2, VIEW_H - 40);
                ctx.textAlign = 'left';
                return;
            }

            if (!isBgCached) {
                // 背景テーマ設定
                const sc = STAGE_CONFIG[currentStageIndex] || STAGE_CONFIG[0];
                bgCtx.fillStyle = sc.bg;
                bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

                // 背景とマップの描画
                for (let r = 0; r < MAP_ROWS; r++) {
                    for (let c = 0; c < MAP_COLS; c++) {
                        const tile = mapData[r * MAP_COLS + c];
                        const tx = c * TILE_SIZE;
                        const ty = r * TILE_SIZE;

                        if (tile === 0) {
                            if ((c + r) % 2 === 0 && c % 3 !== 0) {
                                drawShape(
                                    [[0, 1, 0, 0], [1, 5, 1, 1], [1, 5, 5, 1], [0, 1, 1, 0]],
                                    tx + 10, ty + 10, 0, 2, false, false, bgCtx
                                );
                            }
                        } else if (tile === 1) {
                            drawShape(TILE_MOUNTAIN, tx, ty, 0, 4, false, false, bgCtx);
                        } else if (tile === 2) {
                            drawShape(TILE_WATER, tx, ty, 0, 4, false, false, bgCtx);
                        } else if (tile === 3) {
                            drawShape(TILE_BRIDGE, tx, ty, 0, 4, false, false, bgCtx);
                        }
                    }
                }
                isBgCached = true;
            }

            // カメラ適用: ワールドの見える範囲だけbgCanvasから切り出して描画
            const shakeX = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
            const shakeY = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
            if (screenShake > 0) screenShake = Math.max(0, screenShake - 0.8);
            ctx.save();
            ctx.translate(shakeX, shakeY);
            ctx.drawImage(bgCanvas, camX, camY, VIEW_W, VIEW_H, 0, 0, VIEW_W, VIEW_H);

            // ステージ大気オーバーレイ
            const _sc = STAGE_CONFIG[currentStageIndex] || STAGE_CONFIG[0];
            if (_sc.tint) {
                ctx.save();
                ctx.fillStyle = _sc.tint;
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.restore();
            }

            let pRot = 0;
            if (player.dirX === 1) pRot = Math.PI / 2;
            else if (player.dirX === -1) pRot = -Math.PI / 2;
            else if (player.dirY === -1) pRot = 0;
            else if (player.dirY === 1) pRot = Math.PI;

            // 哲学の鍵アイテム描画
            if (keyItemPos && !keyItemCollected) {
                const kx = keyItemPos.x - camX;
                const ky = keyItemPos.y - camY;
                const pulse = Math.sin(Date.now() / 300) * 0.25;
                drawShape(KEY_ITEM_SPRITE, kx, ky, pulse, PIXEL_SCALE);
                // 画面外なら矢印インジケーター
                if (kx < 0 || kx > VIEW_W || ky < 0 || ky > VIEW_H) {
                    const ax = Math.max(20, Math.min(VIEW_W - 20, kx));
                    const ay = Math.max(20, Math.min(VIEW_H - 20, ky));
                    const ang = Math.atan2(keyItemPos.y - (player.y + SPRITE_SIZE/2), keyItemPos.x - (player.x + SPRITE_SIZE/2));
                    ctx.save();
                    ctx.translate(ax, ay);
                    ctx.rotate(ang);
                    ctx.fillStyle = '#EFD02E';
                    ctx.font = 'bold 16px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('▶', 0, 6);
                    ctx.restore();
                }
            }

            // アイテム描画（カメラオフセット適用）
            for (let item of items) {
                const wobble = Math.sin(Date.now() / 200) * 0.15;
                drawShape(item.sprite, item.x - camX, item.y - camY, wobble, PIXEL_SCALE);
            }

            // 弾（カメラオフセット適用）
            for (let p of projectiles) {
                let rot = Math.atan2(p.dy, p.dx) + Math.PI / 2;
                drawShape(p.sprite, p.x - camX, p.y - camY, rot, PIXEL_SCALE);
            }

            // 敵（カメラオフセット適用）
            for (let enemy of enemies) {
                const wobble = Math.sin(Date.now() / 150) * 0.1;
                let scale = PIXEL_SCALE;
                if (enemy.type === 'boss') scale *= 1.5;
                const eFlipX = (player.x < enemy.x);
                const esx = enemy.x - camX, esy = enemy.y - camY;
                if (esx < -SPRITE_SIZE * 2 || esx > VIEW_W + SPRITE_SIZE || esy < -SPRITE_SIZE * 2 || esy > VIEW_H + SPRITE_SIZE) continue;
                drawShape(enemy.sprite, esx, esy, wobble, scale, enemy.hitTimer % 4 > 1, eFlipX);
                // HPバー
                ctx.fillStyle = '#f00';
                const hpRatio = enemy.hp / enemy.maxHp;
                ctx.fillRect(esx, esy - 10, (16 * scale) * hpRatio, 4);
                ctx.strokeStyle = '#000';
                ctx.strokeRect(esx, esy - 10, 16 * scale, 4);
            }

            // 主人公
            if (player.invincibleTimer === 0 || player.invincibleTimer % 8 < 4) {
                let heroFlip = false;
                let heroSprite;
                const wf = player.walkFrame;
                if (player.dirX === -1) { heroSprite = wf ? PLAYER_RIGHT_SPRITE_W2 : PLAYER_RIGHT_SPRITE; heroFlip = true; }
                else if (player.dirX === 1) { heroSprite = wf ? PLAYER_RIGHT_SPRITE_W2 : PLAYER_RIGHT_SPRITE; }
                else if (player.dirY === -1) { heroSprite = wf ? PLAYER_BACK_SPRITE_W2 : PLAYER_BACK_SPRITE; }
                else { heroSprite = wf ? PLAYER_SPRITE_W2 : PLAYER_SPRITE; }

                drawShape(heroSprite, player.x - camX, player.y - camY, 0, PIXEL_SCALE, false, heroFlip);
            }

            // 盾 (構えている時)
            if (isShielding && player.invincibleTimer % 8 < 4) {
                const sx = player.x - camX + player.dirX * 25;
                const sy = player.y - camY + player.dirY * 25;
                drawShape(SHIELD_SPRITE, sx, sy, pRot, PIXEL_SCALE);
            }

            // 剣アーク (攻撃中)
            if (player.isAttacking && currentWeapon === 'sword') {
                const maxTimer = comboStep === 3 ? 20 : 15;
                const progress = 1 - player.attackTimer / maxTimer;
                const cx = player.x - camX + SPRITE_SIZE / 2;
                const cy = player.y - camY + SPRITE_SIZE / 2;
                const baseRadius = SPRITE_SIZE * (hasLongSword ? 2.2 : 1.5);
                const arcRadius = baseRadius * (comboStep === 3 ? 2.2 : comboStep === 2 ? 1.5 : 1.0);
                const arcSpan = comboStep === 3 ? Math.PI * 2 : Math.PI * (comboStep === 2 ? 1.0 : 0.75);
                let centerAngle = Math.PI / 2;
                if (player.dirX === 1) centerAngle = 0;
                else if (player.dirX === -1) centerAngle = Math.PI;
                else if (player.dirY === -1) centerAngle = -Math.PI / 2;
                const sweepStart = comboStep === 3 ? 0 : centerAngle - arcSpan / 2 + progress * arcSpan;
                const sweepEnd = comboStep === 3 ? Math.PI * 2 : centerAngle + arcSpan / 2;
                const alpha = 0.85 * (1 - progress);
                // コンボ段階で色変化
                const arcColor = comboStep === 3 ? `rgba(255,200,50,${alpha})` :
                                 comboStep === 2 ? `rgba(150,200,255,${alpha})` :
                                                  `rgba(200,230,255,${alpha})`;
                ctx.save();
                ctx.strokeStyle = arcColor;
                ctx.lineWidth = comboStep === 3 ? 10 : comboStep === 2 ? 8 : 7;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(cx, cy, arcRadius, sweepStart, sweepEnd);
                ctx.stroke();
                ctx.strokeStyle = comboStep === 3 ? `rgba(255,255,100,${alpha * 0.5})` : `rgba(255,255,255,${alpha * 0.6})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, arcRadius * 0.85, sweepStart, sweepEnd);
                ctx.stroke();
                ctx.restore();
            }

            // アンビエントパーティクル描画
            drawAmbient();

            // パーティクル描画
            drawParticles(camX, camY);

            // 暗闇オーバーレイ
            drawDarknessOverlay(camX, camY);

            // UI (ゲームエリア 0-800)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, VIEW_W, 40);

            ctx.fillStyle = '#fff';
            ctx.font = '20px monospace';
            ctx.fillText(`STAGE: ${currentStageIndex + 1} | SCORE: ${pScore}`, 10, 26);

            ctx.fillStyle = bossActive ? '#ff4444' : '#fff';
            ctx.font = '16px monospace';
            const hudMsg = bossActive ? '⚔ BOSS ⚔' : (keyItemPos ? `倒せ: ${enemiesDefeatedInStage}` : '鍵を取れ!');
            ctx.fillText(hudMsg, VIEW_W - 120, 26);

            // コンボインジケーター
            if (comboStep > 0 && comboTimer > 0) {
                const dots = ['●', '●●', '●●●'];
                const colors = ['#AAAAAA', '#88BBFF', '#FFD700'];
                ctx.fillStyle = colors[comboStep - 1];
                ctx.font = 'bold 16px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`COMBO ${dots[comboStep - 1]}`, VIEW_W / 2, 28);
                if (comboStep === 3) {
                    ctx.fillStyle = `rgba(255,200,0,${(comboTimer / COMBO_WINDOW) * 0.8})`;
                    ctx.fillText('SPIN!', VIEW_W / 2 + 90, 28);
                }
                ctx.textAlign = 'left';
            }

            ctx.fillStyle = '#fff';
            ctx.fillText(`HP: `, 160, 26);
            for (let i = 0; i < player.maxHp; i++) {
                ctx.fillStyle = i < player.hp ? '#e02020' : '#444';
                ctx.fillRect(200 + i * 20, 10, 14, 20);
            }

            ctx.restore(); // end screen shake transform

            // 右側ステータスパネル
            drawStatsPanel();

            // ナラティブオーバーレイ
            drawNarrativeOverlay();

            // ボス哲学対話オーバーレイ
            drawBossDialogue();

            // 思索オーバーレイ
            drawMeditationOverlay();

            // チュートリアル
            drawTutorial();

            // 実績ポップアップ
            if (achievementPopup && achievementPopup.timer > 0) {
                const t = achievementPopup.timer;
                const alpha = t > 160 ? 1 : t > 40 ? (t-40)/120 : t/40;
                const slideY = t > 160 ? 0 : (160-t)*0.3;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = 'rgba(20,20,20,0.9)';
                ctx.fillRect(VIEW_W - 310, 50 + slideY, 290, 58);
                ctx.strokeStyle = '#EFD02E';
                ctx.lineWidth = 2;
                ctx.strokeRect(VIEW_W - 310, 50 + slideY, 290, 58);
                ctx.fillStyle = '#EFD02E';
                ctx.font = 'bold 11px monospace';
                ctx.textAlign = 'right';
                ctx.fillText('🏆 実績解除', VIEW_W - 24, 66 + slideY);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 14px monospace';
                ctx.fillText(achievementPopup.label, VIEW_W - 24, 82 + slideY);
                ctx.fillStyle = '#AAAAAA';
                ctx.font = '11px monospace';
                ctx.fillText(achievementPopup.desc, VIEW_W - 24, 96 + slideY);
                ctx.restore();
            }

            // バーチャルパッド（タッチデバイス）
            drawVirtualPad();

            // 墓石を描画（プレイ中）
            if (!isGameOver) {
                for (const g of graveMarkers) {
                    if (g.stage === currentStageIndex) {
                        const gx = g.x - camX, gy = g.y - camY;
                        if (gx > -20 && gx < VIEW_W && gy > -20 && gy < VIEW_H) {
                            ctx.save();
                            ctx.globalAlpha = 0.55;
                            ctx.fillStyle = '#888888';
                            ctx.fillRect(gx + 16, gy + 8, 16, 24);
                            ctx.fillRect(gx + 10, gy + 8, 28, 10);
                            ctx.fillStyle = '#aaaaaa';
                            ctx.font = '9px monospace';
                            ctx.textAlign = 'center';
                            ctx.fillText('RIP', gx + 24, gy + 25);
                            ctx.textAlign = 'left';
                            ctx.restore();
                        }
                    }
                }
            }

            if (isGameOver) {
                const phase2Start = 220;
                const phase3Start = 150;
                // モノクロフィルター
                ctx.save();
                const monoAlpha = Math.min(1, (deathSceneTimer - phase2Start) / 80);
                if (deathSceneTimer < phase2Start) {
                    ctx.fillStyle = `rgba(0,0,0,${Math.max(0, 0.7 - deathSceneTimer / 300 * 0.3)})`;
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    // グレースケールオーバーレイ
                    ctx.fillStyle = `rgba(180,180,180,${Math.min(0.65, (phase2Start - deathSceneTimer) / 150)})`;
                    ctx.globalCompositeOperation = 'color';
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    ctx.globalCompositeOperation = 'source-over';
                }
                ctx.restore();

                ctx.fillStyle = 'rgba(0,0,0,0.72)';
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.textAlign = 'center';

                // memento mori テキスト
                if (deathSceneTimer < phase2Start) {
                    const fadeIn = Math.min(1, (phase2Start - deathSceneTimer) / 60);
                    ctx.globalAlpha = fadeIn;
                    ctx.fillStyle = '#888888';
                    ctx.font = 'italic 20px serif';
                    ctx.fillText('memento mori', VIEW_W / 2, VIEW_H / 2 - 80);
                    ctx.fillStyle = '#e02020';
                    ctx.font = 'bold 52px monospace';
                    ctx.fillText('GAME OVER', VIEW_W / 2, VIEW_H / 2 - 20);
                    ctx.fillStyle = '#aaaaaa';
                    ctx.font = '18px monospace';
                    ctx.fillText(`— Stage ${currentStageIndex + 1}  Score: ${pScore} —`, VIEW_W / 2, VIEW_H / 2 + 30);

                    if (deathSceneTimer < 80) {
                        ctx.fillStyle = '#888888';
                        ctx.font = 'italic 16px serif';
                        ctx.globalAlpha = (80 - deathSceneTimer) / 80;
                        const lastWords = [
                            'Cogito ergo sum...',
                            '我思う、ゆえに我あり...',
                            '存在は消えても、問いは残る...',
                            'The unexamined life is not worth living...',
                        ];
                        ctx.fillText(lastWords[currentStageIndex % lastWords.length], VIEW_W / 2, VIEW_H / 2 + 75);
                    }
                    ctx.globalAlpha = 1;
                }

                if (Math.floor(Date.now() / 500) % 2 === 0 && deathSceneTimer < 60) {
                    ctx.fillStyle = '#555555';
                    ctx.font = '14px monospace';
                    ctx.fillText('Returning to title...', VIEW_W / 2, VIEW_H / 2 + 120);
                }
                ctx.textAlign = 'left';
            } else if (msgTimer > 0 && currentStageIndex !== 7) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, VIEW_H / 2 - 40, VIEW_W, 80);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(centerMessage, VIEW_W / 2, VIEW_H / 2 + 15);
                ctx.textAlign = 'left';
                msgTimer--;
            } else if (msgTimer > 0 && currentStageIndex === 8 && enemiesDefeatedInStage >= 1) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, VIEW_H / 2 - 40, VIEW_W, 80);
                ctx.fillStyle = '#EFD02E';
                ctx.font = 'bold 40px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(centerMessage, VIEW_W / 2, VIEW_H / 2 + 15);
                ctx.textAlign = 'left';
                msgTimer--;
            }

            if (isPaused && !isGameOver && popupMessage === '') {
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.textAlign = 'center';

                if (!pauseInSettings && !pauseInAchievements) {
                    ctx.fillStyle = '#EFD02E';
                    ctx.font = 'bold 38px monospace';
                    ctx.fillText('— PAUSE —', VIEW_W / 2, VIEW_H / 2 - 90);

                    const pItems = ['▶  再開', '⚙  設定', '🏆  実績', '⏹  タイトルへ'];
                    pItems.forEach((label, i) => {
                        const sel = pauseMenuCursor === i;
                        ctx.fillStyle = sel ? '#ffffff' : '#888888';
                        ctx.font = sel ? 'bold 28px monospace' : '24px monospace';
                        if (sel) {
                            ctx.fillStyle = 'rgba(255,255,255,0.1)';
                            ctx.fillRect(VIEW_W/2 - 160, VIEW_H/2 - 30 + i*60, 320, 44);
                            ctx.fillStyle = '#ffffff';
                        }
                        ctx.fillText(label, VIEW_W / 2, VIEW_H / 2 - 10 + i * 60);
                    });

                    ctx.fillStyle = '#555';
                    ctx.font = '13px monospace';
                    ctx.fillText('↑↓ 選択   Enter 決定   P/Esc 閉じる', VIEW_W / 2, VIEW_H / 2 + 185);
                } else if (pauseInSettings) {
                    ctx.fillStyle = '#EFD02E';
                    ctx.font = 'bold 30px monospace';
                    ctx.fillText('⚙ 設定', VIEW_W / 2, VIEW_H / 2 - 100);

                    const settings = [
                        { label: 'BGM音量', val: bgmVolume },
                        { label: 'SE音量', val: seVolume },
                        { label: '← 戻る', val: null },
                    ];
                    settings.forEach((s, i) => {
                        const sel = pauseMenuCursor === i;
                        ctx.fillStyle = sel ? '#fff' : '#888';
                        ctx.font = sel ? 'bold 22px monospace' : '20px monospace';
                        if (s.val !== null) {
                            const barW = 180;
                            const bx = VIEW_W / 2 - barW / 2;
                            const by = VIEW_H / 2 - 40 + i * 65;
                            ctx.fillText(s.label, VIEW_W / 2, by);
                            ctx.fillStyle = '#333';
                            ctx.fillRect(bx, by + 8, barW, 16);
                            ctx.fillStyle = sel ? '#EFD02E' : '#888';
                            ctx.fillRect(bx, by + 8, barW * s.val, 16);
                            ctx.strokeStyle = '#666';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(bx, by + 8, barW, 16);
                        } else {
                            ctx.fillText(s.label, VIEW_W / 2, VIEW_H / 2 - 40 + i * 65);
                        }
                    });
                    ctx.fillStyle = '#555';
                    ctx.font = '13px monospace';
                    ctx.fillText('↑↓ 選択   ←→ 調整   Esc 戻る', VIEW_W / 2, VIEW_H / 2 + 185);
                } else if (pauseInAchievements) {
                    ctx.fillStyle = '#EFD02E'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('🏆 実績', VIEW_W/2, VIEW_H/2 - 220);
                    ACHIEVEMENTS.forEach((ach, i) => {
                        const unlocked = unlockedAchievements.has(ach.id);
                        ctx.fillStyle = unlocked ? '#EFD02E' : '#444444';
                        ctx.font = (unlocked ? 'bold ' : '') + '13px monospace';
                        ctx.textAlign = 'left';
                        ctx.fillText((unlocked ? '✓ ' : '○ ') + ach.label + ' — ' + ach.desc, VIEW_W/2 - 240, VIEW_H/2 - 185 + i*28);
                    });
                    ctx.fillStyle = '#555'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('Esc 戻る', VIEW_W/2, VIEW_H/2 + 110);
                }
                ctx.textAlign = 'left';
            } else if (isPaused && !isGameOver) {
                // popupMessage表示時の既存処理
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                const pw = 500, ph = 260;
                ctx.fillRect(VIEW_W / 2 - pw / 2, VIEW_H / 2 - ph / 2, pw, ph);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.strokeRect(VIEW_W / 2 - pw / 2, VIEW_H / 2 - ph / 2, pw, ph);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                const lines = popupMessage.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    ctx.font = i === 0 ? 'bold 30px monospace' : '20px monospace';
                    ctx.fillStyle = i === 0 ? '#EFD02E' : '#fff';
                    ctx.fillText(lines[i], VIEW_W / 2, VIEW_H / 2 - ph / 2 + 50 + i * 35);
                }
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = '#ccc';
                    ctx.font = '16px monospace';
                    ctx.fillText("Press [P] or [Start] to Continue", VIEW_W / 2, VIEW_H / 2 + ph / 2 - 20);
                }
                ctx.textAlign = 'left';
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>

</html>
