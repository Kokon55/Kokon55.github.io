        // 障害物の判定
        function isWalkable(x, y) {
            // ピクセル座標を中心に少し余裕を持たせて円形で判定（SPRITE_SIZE/2）
            // 4隅のタイルをチェックして、一つでも障害物なら侵入不可とする
            const padding = 10;
            const points = [
                { cx: x + padding, cy: y + padding },
                { cx: x + SPRITE_SIZE - padding, cy: y + padding },
                { cx: x + padding, cy: y + SPRITE_SIZE - padding },
                { cx: x + SPRITE_SIZE - padding, cy: y + SPRITE_SIZE - padding }
            ];

            for (let p of points) {
                let tx = Math.floor(p.cx / TILE_SIZE);
                let ty = Math.floor(p.cy / TILE_SIZE);

                // 左右ループのためにtxを丸める
                if (tx < 0) tx = MAP_COLS - 1;
                else if (tx >= MAP_COLS) tx = 0;

                // 上下ループのためにtyを丸める
                if (ty < 0) ty = MAP_ROWS - 1;
                else if (ty >= MAP_ROWS) ty = 0;

                const tileType = mapData[ty * MAP_COLS + tx];
                if (tileType === 1 || tileType === 2) {
                    return false; // 山か川
                }
            }
            return true;
        }

        // BFSによる到達可能性の判定（プレイヤーのいるマスから敵のいるマスまで歩いていけるか）
        function isReachable(px, py, ex, ey) {
            const startX = Math.floor(px / TILE_SIZE);
            const startY = Math.floor(py / TILE_SIZE);
            const goalX = Math.floor(ex / TILE_SIZE);
            const goalY = Math.floor(ey / TILE_SIZE);

            if (startX === goalX && startY === goalY) return true;

            const queue = [{ x: startX, y: startY }];
            const visited = new Set();
            visited.add(`${startX},${startY}`);

            const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]]; // 上下左右のみ

            while (queue.length > 0) {
                const curr = queue.shift();

                if (curr.x === goalX && curr.y === goalY) return true;

                for (let d of dirs) {
                    const nx = curr.x + d[0];
                    const ny = curr.y + d[1];

                    // マップ範囲外チェック
                    if (nx < 0 || nx >= MAP_COLS || ny < 0 || ny >= MAP_ROWS) continue;

                    const tileType = mapData[ny * MAP_COLS + nx];
                    if (tileType !== 1 && tileType !== 2) { // 平地(0)か橋(3)なら通れる
                        const key = `${nx},${ny}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            queue.push({ x: nx, y: ny });
                        }
                    }
                }
            }
            return false;
        }

                osc.frequency.setValueAtTime(200, now);

                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'kill') { // 敵を倒した
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);

                const osc2 = audioCtx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(200, now);
                osc2.frequency.exponentialRampToValueAtTime(30, now + 0.3);
                osc2.connect(gainNode);

                osc.start(now);
                osc2.start(now);
                osc.stop(now + 0.3);
                osc2.stop(now + 0.3);
            } else if (type === 'damage') { // プレイヤー被ダメージ
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.2);
                gainNode.gain.setValueAtTime(0.4, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'stageclear') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.setValueAtTime(400, now + 0.15);
                osc.frequency.setValueAtTime(500, now + 0.3);
                osc.frequency.setValueAtTime(600, now + 0.45);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.setValueAtTime(0, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(40, now + 1.5);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 1.5);
                osc.start(now);
                osc.stop(now + 1.5);
            }
        }

        function updateBgm() {
            if (!audioStarted || !audioCtx) return;
            const currentBgm = bgmNotesList[currentStageIndex % bgmNotesList.length];

            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                const freq = currentBgm[bgmIndex % currentBgm.length];
                if (freq > 0) {
                    // メロディ (triangle - クラシック調で暖かい音色)
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, nextNoteTime);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    gainNode.gain.setValueAtTime(0.08, nextNoteTime);
                    gainNode.gain.setValueAtTime(0.06, nextNoteTime + noteLength * 0.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + noteLength);
                    osc.start(nextNoteTime);
                    osc.stop(nextNoteTime + noteLength);

                    // ハーモニー (sine - 3度上)
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(freq * 1.25, nextNoteTime);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    gain2.gain.setValueAtTime(0.03, nextNoteTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + noteLength);
                    osc2.start(nextNoteTime);
                    osc2.stop(nextNoteTime + noteLength);

                    // バス (sine - オクターブ下)
                    const osc3 = audioCtx.createOscillator();
                    const gain3 = audioCtx.createGain();
                    osc3.type = 'sine';
                    osc3.frequency.setValueAtTime(freq * 0.5, nextNoteTime);
                    osc3.connect(gain3);
                    gain3.connect(audioCtx.destination);
                    gain3.gain.setValueAtTime(0.04, nextNoteTime);
                    gain3.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + noteLength * 0.8);
                    osc3.start(nextNoteTime);
                    osc3.stop(nextNoteTime + noteLength);
                }
                nextNoteTime += noteSpeed;
                bgmIndex = (bgmIndex + 1) % currentBgm.length;
            }
        }

            if (gameState === 'title') {

                } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
                    titleSelectedOption = 1;
                } else if (e.code === 'Enter' || e.code === 'Space') {
                    if (titleSelectedOption === 0) {

                    } else {

                            // まだ進捗なし→STARTと同様
                            currentStageIndex = 0;
                            mapData = STAGES[0];

                            centerMessage = "STAGE 1";
                            msgTimer = 120;
                        } else {
                            stageSelectCursor = currentStageIndex;
                            gameState = 'stageSelect';
                        }
                    }
                    e.preventDefault();
                }
                return;
            }

            // ステージ選択画面の操作
            if (gameState === 'stageSelect') {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                    stageSelectCursor = Math.max(0, stageSelectCursor - 1);
                } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                    stageSelectCursor = Math.min(maxReachedStage, stageSelectCursor + 1);
                } else if (e.code === 'Enter' || e.code === 'Space') {

                    hasStarted = true;

                } else if (e.code === 'Escape') {

                }
                return;
            }

                if (e.code === 'ArrowLeft' || e.code === 'KeyA') {

                } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {

            }

            if (e.code === 'Space') {

                        location.reload();
                    }
                    return;
                }
                playerAttack();
                e.preventDefault();
            }
            initAudio();
        });

        // updateHTMLUI関数へ

        function updateHTMLUI() {
            const uiDiv = document.getElementById('ui');
            if (!uiDiv) return;
            let htmlText = '';
            htmlText += '<div style="background:rgba(0,0,0,0.5); padding:10px; border-radius:5px; margin-top:10px; font-size:14px;">';

                if (hasLongSword) {
                    htmlText += '<p style="margin:5px 0; color:#EFD02E;">【大剣】攻撃範囲が2倍になり、威力が1.5倍になります。スペースキーで攻撃。</p>';
                }
                if (hasBow) {
                    htmlText += '<p style="margin:5px 0; color:#EFD02E;">【弓矢】Bボタン、[1/2]キー、または[Q/E]で剣と切り替え。弓は4倍の射程ですが威力は低め。</p>';
                }
                if (hasShield) {
                    htmlText += '<p style="margin:5px 0; color:#EFD02E;">【盾】[Shift]キー、または[LT/RT]ボタン。※攻撃中は使用不可。敵の飛び道具を無効化します。</p>';

            }
            uiDiv.innerHTML = htmlText;
        }
        let isPaused = false;
        let popupMessage = "";
        let isStageAdvancing = false;

        const STAGE_CLEAR_COUNTS = [20, 20, 20, 20, 20, 20, 20, 20, 20];
        const MAX_ENEMIES_PER_STAGE = [2, 3, 3, 4, 4, 5, 5, 1]; // 画面上の最大数

        // 8ステージ分のデータを構築
        // STAGESを複製して8個にする（実際はバリエーションを）
        const STAGE4 = STAGES[0];
        const STAGE5 = STAGES[1];
        const STAGE6 = STAGES[2];
        const STAGE7 = STAGES[0];
        // Final Boss Arena (Stage 8) - All plain green except edges
        const STAGE8 = new Array(300).fill(0);
        for (let r = 0; r < MAP_ROWS; r++) {
            for (let c = 0; c < MAP_COLS; c++) {
                if (r === 0 || r === MAP_ROWS - 1 || c === 0 || c === MAP_COLS - 1) {
                    STAGE8[r * MAP_COLS + c] = 1; // 周りは山
                }
            }
        }

        STAGES.push(STAGE4, STAGE5, STAGE6, STAGE7, STAGE8);

        function spawnEnemies() {
            if (currentStageIndex === 8) {
                // ラスボス
                if (enemies.length === 0 && enemiesDefeatedInStage === 0) {
                    enemies.push({
                        x: 400, y: 150,
                        hp: ENEMY_TYPES[6].hp, maxHp: ENEMY_TYPES[6].hp,
                        speed: ENEMY_TYPES[6].speed,
                        sprite: ENEMY_TYPES[6].sprite,
                        type: ENEMY_TYPES[6].type,
                        fireInterval: ENEMY_TYPES[6].fireInterval,
                        fireTimer: 0,
                        hitTimer: 0
                    });
                }
                return;
            }

            const maxOnScreen = MAX_ENEMIES_PER_STAGE[currentStageIndex];
            // 倒すべき残りの数と現在の画面上の数を考慮
            const remainingToClear = STAGE_CLEAR_COUNTS[currentStageIndex] - enemiesDefeatedInStage;
            const toSpawn = Math.min(maxOnScreen - enemies.length, remainingToClear - enemies.length);

            for (let i = 0; i < toSpawn; i++) {
                let ex, ey, dist, reachable;
                let attempts = 0;
                do {
                    ex = Math.random() * (canvas.width - SPRITE_SIZE);
                    ey = Math.random() * (canvas.height - SPRITE_SIZE);
                    if (ex < 0) ex = 0; if (ey < 0) ey = 0;
                    const dx = ex - player.x;
                    const dy = ey - player.y;
                    dist = Math.sqrt(dx * dx + dy * dy);
                    reachable = isWalkable(ex, ey) && isReachable(player.x, player.y, ex, ey);
                    attempts++;
                    // 100回超えたら距離制限を無視してでも「到達可能な場所」を優先させる
                } while ((!reachable || dist < 120) && attempts < 1000);

                if (!reachable) {
                    // 1000回やってもダメならプレイヤーと同じ位置の少し横に出す（フェールセーフ）
                    ex = player.x;
                    ey = player.y;
                }

                // 出現する敵の種類をステージごとに調整
                let avail = [0, 1, 2]; // 最初はスライム、オーク、コウモリ
                if (currentStageIndex >= 2) avail.push(3); // Stage 3+ Mage (盾が出る面から)
                if (currentStageIndex >= 2) avail.push(4); // Stage 3+ Archer (盾が出る面から)
                if (currentStageIndex >= 3) avail.push(5); // Stage 4+ SwordFighter

                const typeIdx = avail[Math.floor(Math.random() * avail.length)];
                const typeDef = ENEMY_TYPES[typeIdx];
                enemies.push({
                    x: ex, y: ey,
                    hp: typeDef.hp, maxHp: typeDef.hp,
                    speed: typeDef.speed,
                    sprite: typeDef.sprite,
                    type: typeDef.type,
                    fireInterval: typeDef.fireInterval || 0,
                    fireTimer: 0,
                    hitTimer: 0
                });
            }
        }

        // 初期ロード時のプレイヤーも安全な位置に配置する
        do {
            player.x = 40 + Math.random() * (canvas.width - 80);
            player.y = 40 + Math.random() * (canvas.height - 80);
        } while (!isWalkable(player.x, player.y) || !isWalkable(player.x + Math.sign(player.dirX) * 5, player.y));

        spawnEnemies();


        function playerAttack() {
            if (!player.isAttacking && !isGameOver) {
                player.isAttacking = true;
                player.attackTimer = 15;
                if (currentWeapon === 'sword') {
                    playSoundEffect('attack');
                } else if (currentWeapon === 'bow') {
                    playSoundEffect('attack');
                    // 弓矢は上下左右のみ（斜めは除外）
                    let arrowDx = 0, arrowDy = 0;
                    if (Math.abs(player.dirX) >= Math.abs(player.dirY)) {
                        arrowDx = player.dirX >= 0 ? 1 : -1;
                        arrowDy = 0;
                    } else {
                        arrowDx = 0;
                        arrowDy = player.dirY >= 0 ? 1 : -1;
                    }
                    projectiles.push({
                        x: player.x + SPRITE_SIZE / 2 - 12,
                        y: player.y + SPRITE_SIZE / 2 - 12,
                        dx: arrowDx,
                        dy: arrowDy,
                        speed: 8,
                        sprite: ARROW_SPRITE,
                        timer: 50, // Range 4x
                        isPlayerProjectile: true
                    });
                }
            }
        }

        function update() {
            if (jpTimer > 0) jpTimer--;

            let padUp = false, padDown = false, padLeft = false, padRight = false;
            let padA = false, padB = false, padStart = false, padShield = false;

            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let gp of gamepads) {
                if (gp) {
                    const threshold = 0.5;
                    padUp = padUp || gp.axes[1] < -threshold || gp.buttons[12]?.pressed;
                    padDown = padDown || gp.axes[1] > threshold || gp.buttons[13]?.pressed;
                    padLeft = padLeft || gp.axes[0] < -threshold || gp.buttons[14]?.pressed;
                    padRight = padRight || gp.axes[0] > threshold || gp.buttons[15]?.pressed;

                    padA = padA || gp.buttons[0]?.pressed || gp.buttons[2]?.pressed;
                    padStart = padStart || gp.buttons[9]?.pressed;
                    padB = padB || gp.buttons[1]?.pressed;
                    padShield = padShield || gp.buttons[4]?.pressed || gp.buttons[5]?.pressed || gp.buttons[6]?.pressed || gp.buttons[7]?.pressed;
                }
            }

            if (padA || padStart) {
                if (!hasStarted) {
                    hasStarted = true;
                    initAudio();
                }
                if (isGameOver) {
                    if (gameOverTimer <= 0) {
                        sessionStorage.setItem('restartStage', gameOverSelectedStage);
                        location.reload();
                    }
                    return;
                }
            }

            if (padA) {
                playerAttack();
                initAudio();
            }

            if (isGameOver && gameOverTimer <= 0 && jpTimer === 0) {
                if (padLeft) {
                    gameOverSelectedStage = Math.max(0, gameOverSelectedStage - 1);
                    jpTimer = 15;
                } else if (padRight) {
                    gameOverSelectedStage = Math.min(maxReachedStage, gameOverSelectedStage + 1);
                    jpTimer = 15;
                }
            }

            if (padStart && jpTimer === 0) { // Start button
                isPaused = !isPaused;
                if (!isPaused) popupMessage = "";
                jpTimer = 30;
            }

            if (padB && hasBow && jpTimer === 0) { // B button
                currentWeapon = currentWeapon === 'sword' ? 'bow' : 'sword';
                jpTimer = 20;
            }

            if (hasShield) {
                isShielding = (keys['ShiftLeft'] || keys['ShiftRight'] || padShield) && !player.isAttacking;
            }

            if (!hasStarted) return;
            if (isPaused) return; // ポーズ中は処理を止める
            if (isGameOver) {
                if (gameOverTimer > 0) gameOverTimer--;
                return; // ゲームオーバーになったら完全に動きを止める（即死させる）
            }
            // 進行中ならスキップ
            if (msgTimer > 0 && currentStageIndex === 8 && enemiesDefeatedInStage >= 1) {
                // ボス撃破後はすぐに復帰させず、ゲームクリアメッセージを出し続ける
            } else if (msgTimer > 0) {
                msgTimer--;
                return;
            }

            if (player.invincibleTimer > 0) player.invincibleTimer--;

            // -- プレイヤー移動 --

            let dx = 0;
            let dy = 0;
            if (keys['ArrowUp'] || keys['KeyW'] || padUp) dy -= 1;
            if (keys['ArrowDown'] || keys['KeyS'] || padDown) dy += 1;
            if (keys['ArrowLeft'] || keys['KeyA'] || padLeft) dx -= 1;
            if (keys['ArrowRight'] || keys['KeyD'] || padRight) dx += 1;

            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                dx /= len;
                dy /= len;

                const nextX = player.x + dx * player.speed;
                const nextY = player.y + dy * player.speed; // 地形判定をして移動
                if (isWalkable(nextX, player.y)) {
                    player.x = nextX;
                }
                if (isWalkable(player.x, nextY)) {
                    player.y = nextY;
                }

                // 向きの更新
                if (Math.abs(dx) > Math.abs(dy)) {
                    player.dirX = dx > 0 ? 1 : -1;
                    player.dirY = 0;
                } else {
                    player.dirX = 0;
                    player.dirY = dy > 0 ? 1 : -1;
                }
            }

            // 境界チェック（ループ廃止、クランプ処理）
            if (player.x < 0) player.x = 0;
            else if (player.x > canvas.width - SPRITE_SIZE) player.x = canvas.width - SPRITE_SIZE;

            if (player.y < 0) player.y = 0;
            else if (player.y > canvas.height - SPRITE_SIZE) player.y = canvas.height - SPRITE_SIZE;

            // アイテムの拾得チェック
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                if (Math.hypot(player.x - item.x, player.y - item.y) < SPRITE_SIZE) {
                    if (item.isBox) {
                        playSoundEffect('stageclear');
                        // ステージ3（index=2）は玉を飛ばす敵が初出のため、必ずシールドを付与
                        if (currentStageIndex === 2 && !hasShield) {
                            hasShield = true;
                            updateHTMLUI();
                        } else {
                            const r = Math.random();
                            if (!hasLongSword && r < 0.25) {
                                hasLongSword = true;
                                updateHTMLUI();
                            } else if (!hasBow && r < 0.5) {
                                hasBow = true;
                                updateHTMLUI();
                            } else if (!hasShield && r < 0.75) {
                                hasShield = true;
                                updateHTMLUI();
                            } else if (!hasBoots) {
                                hasBoots = true;
                                player.speed = 3.0;
                                updateHTMLUI();
                            } else {
                                player.hp = Math.min(player.maxHp, player.hp + 1);
                            }
                        }
                    } else {
                        player.hp = Math.min(player.maxHp, player.hp + 1);
                        playSoundEffect('stageclear');
                    }
                    items.splice(i, 1);
                }
            }

            // (アイテム描画はdraw関数へ移動しました)

            // 弾の更新
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.dx * p.speed;
                p.y += p.dy * p.speed;
                p.timer--;

                if (p.timer <= 0) {
                    projectiles.splice(i, 1);
                    continue;
                }

                // プレイヤーの弾丸（弓矢）が敵に当たる判定
                if (p.isPlayerProjectile) {
                    let hit = false;
                    for (let j = 0; j < enemies.length; j++) {
                        let enemy = enemies[j];
                        if (enemy.hp <= 0 || enemy.hitTimer > 0) continue;
                        const ecx = enemy.x + SPRITE_SIZE / 2;
                        const ecy = enemy.y + SPRITE_SIZE / 2;
                        const er = SPRITE_SIZE * 0.4;
                        if (Math.hypot(ecx - (p.x + 12), ecy - (p.y + 12)) < er + 10) {
                            // Hit enemy!
                            enemy.hp -= 0.66; // 攻撃力2/3 (Sword is 1, LongSword is 1.5)
                            enemy.hitTimer = 10;
                            enemy.x += p.dx * 15; // Knockback
                            enemy.y += p.dy * 15;
                            playSoundEffect('hit');
                            if (enemy.hp <= 0) {
                                playSoundEffect('kill');
                                pScore += enemy.maxHp;
                                enemiesDefeatedInStage++;
                                if (Math.random() < 0.15) {
                                    items.push({ x: enemy.x, y: enemy.y, sprite: HEART_SPRITE });
                                }
                                if (enemiesDefeatedInStage === 10 && !itemBoxSpawnedThisStage) {
                                    items.push({ x: canvas.width / 2, y: canvas.height / 2, sprite: ITEM_BOX_SPRITE, isBox: true });
                                    itemBoxSpawnedThisStage = true;
                                }

                                enemies.splice(j, 1);

                                if (enemiesDefeatedInStage >= STAGE_CLEAR_COUNTS[currentStageIndex] && !isStageAdvancing) {
                                    isStageAdvancing = true;
                                    if (currentStageIndex === 8) {
                                        centerMessage = "GAME CLEAR! YOU RESTORED PEACE!";
                                        msgTimer = 999;
                                    } else {
                                        setTimeout(advanceStage, 1000);
                                        centerMessage = "STAGE CLEAR!";
                                        msgTimer = 120;
                                    }
                                } else if (!isStageAdvancing && enemiesDefeatedInStage < STAGE_CLEAR_COUNTS[currentStageIndex]) {
                                    spawnEnemies();
                                }
                            }
                            hit = true;
                            break;
                        }
                    }
                    if (hit) {
                        projectiles.splice(i, 1);
                        continue;
                    }
                }

                // プレイヤーとの当たり判定 (弓矢は自爆しないように isPlayerProjectile を除外)
                if (!p.isPlayerProjectile) {
                    const pcx = player.x + SPRITE_SIZE / 2;
                    const pcy = player.y + SPRITE_SIZE / 2;

                    // 盾による防御
                    if (isShielding) {
                        const sx = pcx + player.dirX * 20;
                        const sy = pcy + player.dirY * 20;
                        if (Math.hypot(sx - (p.x + 12), sy - (p.y + 12)) < 30) {
                            playSoundEffect('attack'); // 弾いた音（剣の音を流用）
                            projectiles.splice(i, 1);
                            continue;
                        }
                    }

                    const pr = SPRITE_SIZE * 0.4;
                    if (player.invincibleTimer === 0 && Math.hypot(pcx - (p.x + 12), pcy - (p.y + 12)) < pr + 10) {
                        player.hp -= 1;
                        player.invincibleTimer = 60;
                        playSoundEffect('damage');
                        projectiles.splice(i, 1);
                        if (player.hp <= 0 && !isGameOver) {
                            isGameOver = true;
                            gameOverTimer = 120; // 1秒間操作を受け付けない
                            playSoundEffect('gameover');
                        }
                        continue; // 弾消滅
                    }
                }
            }


            // -- 敵の処理 --
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                if (enemy.hp <= 0) continue;

                if (enemy.hitTimer > 0) enemy.hitTimer--;

                // 中心点などの計算用
                const ecx = enemy.x + SPRITE_SIZE / 2;
                const ecy = enemy.y + SPRITE_SIZE / 2;
                const er = SPRITE_SIZE * 0.4; // 敵の当たり判定半径
                const pr = SPRITE_SIZE * 0.4; // プレイヤーの当たり判定半径

                // 敵の移動・攻撃処理（ノックバック中は動かない）
                if (enemy.hitTimer === 0) {
                    let edx = player.x - enemy.x;
                    let edy = player.y - enemy.y;
                    const dist = Math.sqrt(edx * edx + edy * edy);

                    if (enemy.type === 'mage' || enemy.type === 'archer' || enemy.type === 'boss') {
                        // 遠距離タイプは一定距離を保つ、または火を噴く
                        enemy.fireTimer++;
                        if (dist > 250) {
                            if (dist > 0) { edx /= dist; edy /= dist; }
                            const nextEx = enemy.x + edx * enemy.speed;
                            const nextEy = enemy.y + edy * enemy.speed;
                            if (isWalkable(nextEx, enemy.y)) enemy.x = nextEx;
                            if (isWalkable(enemy.x, nextEy)) enemy.y = nextEy;
                        }
                        if (enemy.fireTimer > enemy.fireInterval) {
                            enemy.fireTimer = 0;
                            // 弾を発射
                            let pdirX = edx / dist;
                            let pdirY = edy / dist;
                            if (enemy.type === 'boss') {
                                // 扇状に3発撃つ
                                for (let a = -1; a <= 1; a++) {
                                    projectiles.push({
                                        x: ecx - 12, y: ecy - 12,
                                        dx: Math.cos(Math.atan2(pdirY, pdirX) + a * 0.3),
                                        dy: Math.sin(Math.atan2(pdirY, pdirX) + a * 0.3),
                                        speed: 3, sprite: MAGIC_SPRITE, timer: 150
                                    });
                                }
                            } else {
                                projectiles.push({
                                    x: ecx - 12, y: ecy - 12, dx: pdirX, dy: pdirY,
                                    speed: enemy.type === 'archer' ? 4 : 2.5,
                                    sprite: enemy.type === 'archer' ? ARROW_SPRITE : MAGIC_SPRITE,
                                    timer: 150
                                });
                            }
                        }
                    } else {
                        // 近接タイプ
                        if (dist > 0) {
                            edx /= dist;
                            edy /= dist;
                            const nextEx = enemy.x + edx * enemy.speed;
                            const nextEy = enemy.y + edy * enemy.speed;
                            if (isWalkable(nextEx, enemy.y)) enemy.x = nextEx;
                            if (isWalkable(enemy.x, nextEy)) enemy.y = nextEy;
                        }
                    }
                }

                // プレイヤー側の攻撃判定
                if (player.isAttacking && player.attackTimer === 13) {
                    const attackDist = hasLongSword ? TILE_SIZE * 1.5 : TILE_SIZE;
                    const ax = player.x + SPRITE_SIZE / 2 + player.dirX * attackDist;
                    const ay = player.y + SPRITE_SIZE / 2 + player.dirY * attackDist;
                    const ar = hasLongSword ? TILE_SIZE * 0.8 : TILE_SIZE * 0.5;

                    // 1マス先の障害物チェック（攻撃が岩や池を越えないようにする）
                    const checkX = player.x + SPRITE_SIZE / 2 + player.dirX * TILE_SIZE;
                    const checkY = player.y + SPRITE_SIZE / 2 + player.dirY * TILE_SIZE;
                    let tx = Math.floor(checkX / TILE_SIZE);
                    let ty = Math.floor(checkY / TILE_SIZE);
                    if (tx < 0) tx = MAP_COLS - 1; else if (tx >= MAP_COLS) tx = 0;
                    if (ty < 0) ty = MAP_ROWS - 1; else if (ty >= MAP_ROWS) ty = 0;
                    const tileType = mapData[ty * MAP_COLS + tx];
                    const isAttackBlocked = (tileType === 1 || tileType === 2);

                    if (!isAttackBlocked && Math.hypot(ax - ecx, ay - ecy) < (ar + er)) { // bossは当たり判定を大きくすべきだが簡略化
                        enemy.hp -= (hasLongSword ? 1.5 : 1.0); // 大剣は1.5、通常は1.0
                        enemy.hitTimer = 10;

                        // ノックバック
                        enemy.x += player.dirX * 15;
                        enemy.y += player.dirY * 15;

                        if (enemy.hp <= 0) {
                            playSoundEffect('kill');
                            pScore += enemy.maxHp;
                            enemiesDefeatedInStage++;

                            // 15%の確率でハートを落とす
                            if (Math.random() < 0.15) {
                                items.push({ x: enemy.x, y: enemy.y, sprite: HEART_SPRITE });
                            }

                            // 10体倒したら確定でアイテムボックス出現
                            if (enemiesDefeatedInStage === 10 && !itemBoxSpawnedThisStage) {
                                items.push({ x: canvas.width / 2, y: canvas.height / 2, sprite: ITEM_BOX_SPRITE, isBox: true });
                                itemBoxSpawnedThisStage = true;
                            }

                            enemies.splice(i, 1);

                            if (enemiesDefeatedInStage >= STAGE_CLEAR_COUNTS[currentStageIndex] && !isStageAdvancing) {
                                isStageAdvancing = true;
                                if (currentStageIndex === 8) {
                                    centerMessage = "GAME CLEAR! YOU RESTORED PEACE!";
                                    msgTimer = 999;
                                } else {
                                    setTimeout(advanceStage, 1000);
                                    centerMessage = "STAGE CLEAR!";
                                    msgTimer = 120;
                                }
                            } else if (!isStageAdvancing) {
                                spawnEnemies();
                            }
                            continue;
                        } else {
                            playSoundEffect('hit');
                        }
                    }
                }

                // 敵からプレイヤーへの接触ダメージ判定
                if (player.invincibleTimer === 0 && enemy.hp > 0 && enemy.hitTimer === 0) {
                    const pcx = player.x + SPRITE_SIZE / 2;
                    const pcy = player.y + SPRITE_SIZE / 2;
                    let bossScale = enemy.type === 'boss' ? 1.5 : 1;
                    if (Math.hypot(pcx - ecx, pcy - ecy) < (pr + er * bossScale) * 0.8) {
                        player.hp -= 1;
                        player.invincibleTimer = 60;
                        playSoundEffect('damage');

                        // ノックバック
                        const kbDx = pcx - ecx;
                        const kbDy = pcy - ecy;
                        const len = Math.hypot(kbDx, kbDy) || 1;

                        const knockBackX = player.x + (kbDx / len) * 30;
                        const knockBackY = player.y + (kbDy / len) * 30;

                        if (isWalkable(knockBackX, player.y)) player.x = knockBackX;

                        if (isWalkable(player.x, knockBackY)) player.y = knockBackY;

                        if (player.x < -SPRITE_SIZE / 2) player.x = canvas.width - SPRITE_SIZE / 2;
                        else if (player.x > canvas.width - SPRITE_SIZE / 2) player.x = -SPRITE_SIZE / 2;

                        if (player.y < -SPRITE_SIZE / 2) player.y = canvas.height - SPRITE_SIZE / 2;
                        else if (player.y > canvas.height - SPRITE_SIZE / 2) player.y = -SPRITE_SIZE / 2;

                        if (player.hp <= 0 && !isGameOver) {
                            isGameOver = true;
                            gameOverTimer = 120;
                            playSoundEffect('gameover');
                        }
                    }
                }
            }

            // --- 敵補充 ---
            // 何らかの理由で敵が減少しすぎていて、かつステージクリアでなければ補充
            if (!isGameOver && enemiesDefeatedInStage < STAGE_CLEAR_COUNTS[currentStageIndex]) {
                spawnEnemies();
            }

            if (player.isAttacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) player.isAttacking = false;
            }

            updateBgm();
        }

        function drawShape(sprite, fx, fy, rot, scale, isHitFlash = false, flipX = false, targetCtx = ctx) {
            const rowCount = sprite.length;
            const colCount = sprite[0].length;
            const width = colCount * scale;
            const height = rowCount * scale;
            targetCtx.save();
            targetCtx.translate(Math.round(fx) + width / 2, Math.round(fy) + height / 2);
            targetCtx.rotate(rot);
            if (flipX) targetCtx.scale(-1, 1);
            targetCtx.translate(-width / 2, -height / 2);
            for (let r = 0; r < rowCount; r++) {
                if (!sprite[r]) continue;
                for (let c = 0; c < colCount; c++) {
                    const colorId = sprite[r][c];
                    if (colorId && PALETTE[colorId]) {
                        targetCtx.fillStyle = PALETTE[colorId];
                        if (isHitFlash && colorId !== 0 && colorId !== 1) {
                            targetCtx.fillStyle = '#FFFFFF';
                        }
                        targetCtx.fillRect(c * scale, r * scale, scale + 0.5, scale + 0.5);
                    }
                }
            }
            targetCtx.restore();
        }

        function draw() {
            ctx.imageSmoothingEnabled = false;
            bgCtx.imageSmoothingEnabled = false;

            // タイトル画面
            if (gameState === 'title') {
                ctx.fillStyle = '#000011';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // 星を描画
                ctx.fillStyle = '#fff';
                for (let i = 0; i < 80; i++) {
                    const sx = ((i * 137 + 11) % canvas.width);
                    const sy = ((i * 97 + 31) % canvas.height);
                    ctx.fillRect(sx, sy, i % 3 === 0 ? 2 : 1, i % 3 === 0 ? 2 : 1);
                }
                // タイトルロゴ
                ctx.textAlign = 'center';
                ctx.fillStyle = '#EFD02E';
                ctx.font = 'bold 58px monospace';
                ctx.fillText('Retro Fantasy', canvas.width / 2, 160);
                ctx.fillStyle = '#D0D0D0';
                ctx.font = 'bold 20px monospace';
                ctx.fillText('― An Epic 8-bit Adventure ―', canvas.width / 2, 200);

                // メニュー
                const opts = ['START', 'CONTINUE'];
                for (let i = 0; i < opts.length; i++) {
                    const sel = (titleSelectedOption === i);
                    ctx.fillStyle = sel ? '#EFD02E' : '#aaaaaa';
                    ctx.font = sel ? 'bold 34px monospace' : '28px monospace';
                    ctx.fillText((sel ? '► ' : '  ') + opts[i], canvas.width / 2, 310 + i * 60);
                }
                ctx.fillStyle = '#666';
                ctx.font = '14px monospace';
                ctx.fillText('Use [↑↓] / [WS] to select, [Enter] / [Space] to confirm', canvas.width / 2, canvas.height - 40);
                ctx.textAlign = 'left';
                return;
            }

            // ステージ選択画面
            if (gameState === 'stageSelect') {
                ctx.fillStyle = '#000022';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#EFD02E';
                ctx.font = 'bold 38px monospace';
                ctx.fillText('CONTINUE - Select Stage', canvas.width / 2, 100);
                ctx.fillStyle = '#D0D0D0';
                ctx.font = '18px monospace';
                ctx.fillText(`Available: Stage 1 to Stage ${maxReachedStage + 1}`, canvas.width / 2, 140);

                for (let i = 0; i <= maxReachedStage; i++) {
                    const cols = 5;
                    const bw = 120, bh = 50;
                    const startX = canvas.width / 2 - (Math.min(cols, maxReachedStage + 1) * (bw + 10)) / 2 + bw / 2;
                    const bx = startX + (i % cols) * (bw + 10) - bw / 2;
                    const by = 190 + Math.floor(i / cols) * (bh + 15);
                    const sel = (stageSelectCursor === i);
                    ctx.fillStyle = sel ? '#EFD02E' : '#334';
                    ctx.fillRect(bx, by, bw, bh);
                    ctx.strokeStyle = sel ? '#fff' : '#667';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(bx, by, bw, bh);
                    ctx.fillStyle = sel ? '#000' : '#ccc';
                    ctx.font = sel ? 'bold 20px monospace' : '18px monospace';
                    ctx.fillText(`STAGE ${i + 1}`, bx + bw / 2, by + 31);
                }
                ctx.fillStyle = '#888';
                ctx.font = '14px monospace';
                ctx.fillText('[←→] / [AD] to move, [Enter] / [Space] to select, [Esc] to go back', canvas.width / 2, canvas.height - 40);
                ctx.textAlign = 'left';
                return;
            }

            if (!isBgCached) {
                // 背景テーマ設定
                const bgColors = [
                    '#2D5A27', // 1.草原
                    '#1A3D18', // 2.森
                    '#224466', // 3.川
                    '#555544', // 4.山
                    '#AADDFF', // 5.氷原
                    '#DDAA55', // 6.砂漠
                    '#555555', // 7.城
                    '#88CCEE', // 8.天空
                    '#440000'  // 9.魔界
                ];
                bgCtx.fillStyle = bgColors[currentStageIndex];
                bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

                // 背景とマップの描画
                for (let r = 0; r < MAP_ROWS; r++) {
                    for (let c = 0; c < MAP_COLS; c++) {
                        const tile = mapData[r * MAP_COLS + c];
                        const tx = c * TILE_SIZE;
                        const ty = r * TILE_SIZE;

                        if (tile === 0) {
                            if ((c + r) % 2 === 0 && c % 3 !== 0) {
                                drawShape(
                                    [[0, 1, 0, 0], [1, 5, 1, 1], [1, 5, 5, 1], [0, 1, 1, 0]],
                                    tx + 10, ty + 10, 0, 2, false, false, bgCtx
                                );
                            }
                        } else if (tile === 1) {
                            drawShape(TILE_MOUNTAIN, tx, ty, 0, 4, false, false, bgCtx);
                        } else if (tile === 2) {
                            drawShape(TILE_WATER, tx, ty, 0, 4, false, false, bgCtx);
                        } else if (tile === 3) {
                            drawShape(TILE_BRIDGE, tx, ty, 0, 4, false, false, bgCtx);
                        }
                    }
                }
                isBgCached = true;
            }

            ctx.drawImage(bgCanvas, 0, 0);

            let pRot = 0;
            if (player.dirX === 1) pRot = Math.PI / 2;
            else if (player.dirX === -1) pRot = -Math.PI / 2;
            else if (player.dirY === -1) pRot = 0;
            else if (player.dirY === 1) pRot = Math.PI;

            // アイテム描画
            for (let item of items) {
                const wobble = Math.sin(Date.now() / 200) * 0.15; // ふわふわ
                drawShape(item.sprite, item.x, item.y, wobble, PIXEL_SCALE);
            }

            // 弾
            for (let p of projectiles) {
                let rot = Math.atan2(p.dy, p.dx) + Math.PI / 2;
                drawShape(p.sprite, p.x, p.y, rot, PIXEL_SCALE);
            }

            // 敵 (敵もプレイヤーを向いている方向に反転させる簡易実装)
            for (let enemy of enemies) {
                const wobble = Math.sin(Date.now() / 150) * 0.1;
                let scale = PIXEL_SCALE;
                if (enemy.type === 'boss') scale *= 1.5;
                const eFlipX = (player.x < enemy.x); // プレイヤーが左にいたら左を向く

                // ボス以外は回転せず、画像反転などで表現。スライムやコウモリはそのまま。 
                // Orc等人間型はプレイヤーの方向を向く
                drawShape(enemy.sprite, enemy.x, enemy.y, wobble, scale, enemy.hitTimer % 4 > 1, eFlipX);

                // HPバー
                ctx.fillStyle = '#f00';
                const hpRatio = enemy.hp / enemy.maxHp;
                ctx.fillRect(enemy.x, enemy.y - 10, (16 * scale) * hpRatio, 4);
                ctx.strokeStyle = '#000';
                ctx.strokeRect(enemy.x, enemy.y - 10, 16 * scale, 4);
            }

            // 主人公
            if (player.invincibleTimer === 0 || player.invincibleTimer % 8 < 4) {
                let heroFlip = false;
                let heroSprite = PLAYER_SPRITE;
                if (player.dirX === -1) { heroSprite = PLAYER_RIGHT_SPRITE; heroFlip = true; }  // 左向き（右を反転）
                else if (player.dirX === 1) { heroSprite = PLAYER_RIGHT_SPRITE; }               // 右向き（右横顔）
                else if (player.dirY === -1) { heroSprite = PLAYER_BACK_SPRITE; }               // 上向き（後ろ姿）
                // dirY === 1: 下向き（正面） → PLAYER_SPRITE そのまま

                drawShape(heroSprite, player.x, player.y, 0, PIXEL_SCALE, false, heroFlip);
            }

            // 盾 (構えている時)
            if (isShielding && player.invincibleTimer % 8 < 4) {
                const sx = player.x + player.dirX * 25;
                const sy = player.y + player.dirY * 25;
                drawShape(SHIELD_SPRITE, sx, sy, pRot, PIXEL_SCALE);
            }

            // 剣
            if (player.isAttacking && currentWeapon === 'sword') {
                const offset = (15 - player.attackTimer) * 0.5;
                let sx = player.x + player.dirX * (SPRITE_SIZE * 0.9 + offset);
                let sy = player.y + player.dirY * (SPRITE_SIZE * 0.9 + offset);
                let wpnSprite = hasLongSword ? SWORD_LARGE_SPRITE : SWORD_SPRITE;
                drawShape(wpnSprite, sx, sy, pRot, PIXEL_SCALE);
            }

            // UI
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, 40);

            ctx.fillStyle = '#fff';
            ctx.font = '20px monospace';
            ctx.fillText(`STAGE: ${currentStageIndex + 1} | SCORE: ${pScore}`, 10, 26);

            ctx.fillStyle = '#fff';
            ctx.font = '16px monospace';
            let remain = STAGE_CLEAR_COUNTS[currentStageIndex] - enemiesDefeatedInStage;
            if (currentStageIndex === 8) remain = "BOSS";
            ctx.fillText(`NEXT: ${remain}`, canvas.width - 120, 26);

            ctx.fillStyle = '#fff';
            ctx.fillText(`HP: `, 160, 26);
            for (let i = 0; i < player.maxHp; i++) {
                ctx.fillStyle = i < player.hp ? '#e02020' : '#444';
                ctx.fillRect(200 + i * 20, 10, 14, 20);
            }

            if (isGameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e02020';
                ctx.font = 'bold 50px monospace';
                ctx.textAlign = 'center';
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);

                ctx.fillStyle = '#fff';
                ctx.font = '20px monospace';
                ctx.fillText(`Final Score: ${pScore}`, canvas.width / 2, canvas.height / 2 + 40);

                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = '#ccc';
                    ctx.font = '16px monospace';
                    ctx.fillText("Select Stage with [Left/Right] Keys:", canvas.width / 2, canvas.height / 2 + 90);
                    ctx.fillStyle = '#EFD02E';
                    ctx.font = 'bold 24px monospace';
                    ctx.fillText(`< STAGE ${gameOverSelectedStage + 1} >`, canvas.width / 2, canvas.height / 2 + 120);

                    ctx.fillStyle = '#ccc';
                    ctx.font = '16px monospace';
                    ctx.fillText(gameOverTimer <= 0 ? "Press [SPACE] to Restart there!" : "", canvas.width / 2, canvas.height / 2 + 160);
                }
                ctx.textAlign = 'left';
            } else if (msgTimer > 0 && currentStageIndex !== 7) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, canvas.height / 2 - 40, canvas.width, 80);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(centerMessage, canvas.width / 2, canvas.height / 2 + 15);
                ctx.textAlign = 'left';
                msgTimer--;
            } else if (msgTimer > 0 && currentStageIndex === 8 && enemiesDefeatedInStage >= 1) {
                // Game clear message
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, canvas.height / 2 - 40, canvas.width, 80);
                ctx.fillStyle = '#EFD02E';
                ctx.font = 'bold 40px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(centerMessage, canvas.width / 2, canvas.height / 2 + 15);
                ctx.textAlign = 'left';
                msgTimer--;
            }

            if (isPaused && !isGameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (popupMessage !== "") {
                    // アイテム説明ポップアップ
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    const pw = 500, ph = 260;
                    ctx.fillRect(canvas.width / 2 - pw / 2, canvas.height / 2 - ph / 2, pw, ph);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(canvas.width / 2 - pw / 2, canvas.height / 2 - ph / 2, pw, ph);

                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';

                    const lines = popupMessage.split('\n');
                    for (let i = 0; i < lines.length; i++) {
                        ctx.font = i === 0 ? 'bold 30px monospace' : '20px monospace';
                        ctx.fillStyle = i === 0 ? '#EFD02E' : '#fff';
                        ctx.fillText(lines[i], canvas.width / 2, canvas.height / 2 - ph / 2 + 50 + i * 35);
                    }

                    if (Math.floor(Date.now() / 500) % 2 === 0) {
                        ctx.fillStyle = '#ccc';
                        ctx.font = '16px monospace';
                        ctx.fillText("Press [P] or [Start] to Continue", canvas.width / 2, canvas.height / 2 + ph / 2 - 20);
                    }
                } else {
                    // 通常のポーズ
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 50px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);
                }
                ctx.textAlign = 'left';
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
