            ctx.strokeStyle = 'rgba(255,215,0,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(px + 15, 154); ctx.lineTo(px + STATS_W - 15, 154); ctx.stroke();
            ctx.restore();
            ctx.fillStyle = '#aaaaaa';
            ctx.font = '12px monospace';
            let iy = 168;
            if (hasLongSword) { ctx.fillText('[Long Sword]', px + STATS_W / 2, iy); iy += 18; }
            if (hasBow)       { ctx.fillText('[Bow]',       px + STATS_W / 2, iy); iy += 18; }
            if (hasShield)    { ctx.fillText('[Shield]',    px + STATS_W / 2, iy); iy += 18; }
            if (hasBoots)     { ctx.fillText('[Boots]',     px + STATS_W / 2, iy); iy += 18; }

            // 哲学アイテム表示
            const philTotal = philItems.orb_reason + philItems.orb_emotion + philItems.key_freedom + philItems.chain_duty;
            if (philTotal > 0) {
                ctx.save();
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#9B59B6';
                ctx.fillStyle = '#C084FC';
                ctx.font = 'bold 10px monospace';
                ctx.fillText('— 哲学 —', px + STATS_W / 2, iy);
                ctx.strokeStyle = 'rgba(160,80,240,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(px + 15, iy + 2); ctx.lineTo(px + STATS_W - 15, iy + 2); ctx.stroke();
                ctx.restore();
                iy += 14;
                ctx.font = '10px monospace';
                const philLabel = [
                    philItems.orb_reason   > 0 ? `理×${philItems.orb_reason}`   : null,
                    philItems.orb_emotion  > 0 ? `感×${philItems.orb_emotion}`  : null,
                    philItems.key_freedom  > 0 ? `鍵×${philItems.key_freedom}`  : null,
                    philItems.chain_duty   > 0 ? `鎖×${philItems.chain_duty}`   : null,
                ].filter(Boolean).join(' ');
                ctx.fillStyle = '#DDAAFF';
                ctx.fillText(philLabel, px + STATS_W / 2, iy); iy += 16;
            }

            // カルマ表示
            const karmaY = 230;
            ctx.save();
            ctx.shadowBlur = 4;
            ctx.shadowColor = '#FFD700';
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 11px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('— カルマ —', px + STATS_W / 2, karmaY);
            // 下線
            ctx.strokeStyle = 'rgba(255,215,0,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(px + 15, karmaY + 2); ctx.lineTo(px + STATS_W - 15, karmaY + 2); ctx.stroke();
            ctx.restore();
            const karmaItems = [
                { label: '武', val: karma.bu,    color: '#FF6644' },
                { label: '知', val: karma.chi,   color: '#AADDFF' },
                { label: '守', val: karma.mamori,color: '#44FF88' },
                { label: '哲', val: karma.tetsu, color: '#EFD02E' },
            ];
            karmaItems.forEach((k, i) => {
                const kx = px + 14 + i * 46;
                ctx.fillStyle = k.color;
                ctx.font = 'bold 11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(k.label, kx + 16, karmaY + 14);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '11px monospace';
                ctx.fillText(k.val, kx + 16, karmaY + 26);
            });

            // ボス状態表示
            if (bossActive) {
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 13px monospace';
                ctx.fillText('⚔ BOSS BATTLE', px + STATS_W / 2, VIEW_H - 115);
            } else if (keyItemPos) {
                ctx.fillStyle = '#EFD02E';
                ctx.font = '11px monospace';
                ctx.fillText('黄金の宝珠を探せ', px + STATS_W / 2, VIEW_H - 115);
            } else {
                ctx.fillStyle = '#88ff88';
                ctx.font = '11px monospace';
                ctx.fillText('鍵を手に入れた!', px + STATS_W / 2, VIEW_H - 115);
            }

            // ==== アクティブスキル表示 ====
            const anySkillUnlocked = skills.rengeki.unlocked || skills.barrier.unlocked || skills.timeslow.unlocked;
            if (anySkillUnlocked) {
                ctx.save();
                ctx.shadowBlur = 4; ctx.shadowColor = '#CC88FF';
                ctx.fillStyle = '#CC88FF'; ctx.font = 'bold 11px monospace';
                ctx.fillText('— スキル —', px + STATS_W / 2, VIEW_H - 148);
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(200,136,255,0.3)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(px + 15, VIEW_H - 146); ctx.lineTo(px + STATS_W - 15, VIEW_H - 146); ctx.stroke();
                ctx.restore();
                const skillOrder = ['rengeki', 'barrier', 'timeslow'];
                let sy = VIEW_H - 137;
                skillOrder.forEach(id => {
                    const sk = skills[id];
                    if (!sk.unlocked) return;
                    const def = SKILL_DEFS[id];
                    const barW = STATS_W - 30;
                    ctx.fillStyle = sk.active ? def.color : '#334';
                    ctx.fillRect(px + 15, sy, barW, 12);
                    if (sk.active) {
                        const prog = sk.duration / def.maxDur;
                        ctx.fillStyle = def.color;
                        ctx.globalAlpha = 0.35;
                        ctx.fillRect(px + 15, sy, barW, 12);
                        ctx.globalAlpha = 1;
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(px + 15, sy, barW * prog, 12);
                    } else if (sk.cooldown > 0) {
                        const cdProg = 1 - sk.cooldown / def.maxCd;
                        ctx.fillStyle = '#556';
                        ctx.fillRect(px + 15, sy, barW * cdProg, 12);
                    }
                    ctx.strokeStyle = sk.active ? def.color : '#445';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(px + 15, sy, barW, 12);
                    ctx.fillStyle = sk.active ? '#fff' : (sk.cooldown > 0 ? '#888' : '#ddd');
                    ctx.font = 'bold 9px monospace';
                    ctx.textAlign = 'left';
                    ctx.fillText(`[${def.key}] ${def.name}`, px + 18, sy + 9);
                    if (sk.cooldown > 0 && !sk.active) {
                        ctx.fillStyle = '#aaa'; ctx.textAlign = 'right';
                        ctx.fillText(`${Math.ceil(sk.cooldown/60)}s`, px + STATS_W - 16, sy + 9);
                    }
                    sy += 16;
                });
                ctx.textAlign = 'center';
            }

            // 操作説明
            ctx.fillStyle = '#445566';
            ctx.font = '11px monospace';
            const hints = ['WASD/Arrow:Move', 'Space:Attack', 'Shift:Shield', 'Q/E:Weapon', 'J/K/L:スキル', 'C:合成 V:哲学合成', 'P:Pause'];
            hints.forEach((h, i) => ctx.fillText(h, px + STATS_W / 2, VIEW_H - 95 + i * 15));

            ctx.textAlign = 'left';
        }

        function draw() {
            ctx.imageSmoothingEnabled = false;
            bgCtx.imageSmoothingEnabled = false;

            // タイトル画面
            if (gameState === 'title') {
                titleFrame++;
                // タイトルクォートを200フレームごとに切り替え
                if (titleFrame % 200 === 0) titleQuoteIdx = (titleQuoteIdx + 1) % TITLE_QUOTES.length;

                const T = titleFrame;
                const TT = Date.now() / 1000;

                // ---- 背景: 深宇宙グラジエント ----
                const bgGrad = ctx.createLinearGradient(0, 0, 0, VIEW_H);
                bgGrad.addColorStop(0, '#000008');
                bgGrad.addColorStop(0.5, '#000818');
                bgGrad.addColorStop(1, '#030010');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, VIEW_W + STATS_W, VIEW_H);

                // ---- ネビュラ光 (ふんわりした星雲) ----
                const nebColors = ['rgba(40,20,80,', 'rgba(20,40,80,', 'rgba(60,10,40,'];
                [[VIEW_W*0.2, 150, 220, 0], [VIEW_W*0.75, 380, 180, 1], [VIEW_W*0.5, 520, 260, 2]].forEach(([nx, ny, nr, ci]) => {
                    const pulse = 0.06 + 0.02 * Math.sin(TT * 0.4 + ci);
                    const nGrad = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
                    nGrad.addColorStop(0, nebColors[ci] + pulse + ')');
                    nGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = nGrad;
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                });

                // ---- 視差3層星フィールド ----
                TITLE_STARS.forEach(s => {
                    s.x -= s.speed;
                    if (s.x < -2) s.x = VIEW_W + 2;
                    const twinkle = s.br * (0.6 + 0.4 * Math.sin(TT * 3.1 + s.x * 0.05));
                    const alpha = Math.min(1, twinkle);
                    if (s.layer === 2) {
                        ctx.save(); ctx.shadowBlur = 4; ctx.shadowColor = `rgba(180,200,255,${alpha})`;
                        ctx.fillStyle = `rgba(200,220,255,${alpha})`;
                        ctx.fillRect(s.x, s.y, s.size, s.size);
                        ctx.restore();
                    } else {
                        ctx.fillStyle = `rgba(180,200,255,${alpha * 0.75})`;
                        ctx.fillRect(s.x, s.y, s.size, s.size);
                    }
                });

                // ---- 浮遊パーティクル ----
                TITLE_PARTICLES.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.003;
                    if (p.life <= 0 || p.y < 0) { p.x = Math.random() * VIEW_W; p.y = VIEW_H + 5; p.life = 0.4 + Math.random() * 0.6; }
                    ctx.save(); ctx.globalAlpha = p.life * 0.7;
                    ctx.shadowBlur = 5; ctx.shadowColor = p.color;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                });

                // ---- 歩くプレイヤーキャラクター ----
                titleWalkerX += 0.8;
                if (titleWalkerX > VIEW_W + 80) titleWalkerX = -70;
                const walkerWF = Math.floor(T / 12) % 2;
                const walkerSprite = walkerWF ? PLAYER_RIGHT_SPRITE_W2 : PLAYER_RIGHT_SPRITE;
                ctx.save(); ctx.globalAlpha = 0.45;
                drawShape(walkerSprite, titleWalkerX, VIEW_H - 90, 0, PIXEL_SCALE * 1.1, false, false, ctx);
                ctx.restore();

                // ---- ロゴ ----
                ctx.save();
                ctx.textAlign = 'center';
                // 影グロー
                const glowStr = 25 + 10 * Math.sin(TT * 1.5);
                ctx.shadowBlur = glowStr; ctx.shadowColor = '#B8860B';
                ctx.fillStyle = '#EFD02E';
                ctx.font = 'bold 56px monospace';
                const logoScale = 1 + 0.008 * Math.sin(TT * 0.8);
                ctx.save();
                ctx.translate(VIEW_W / 2, 128);
                ctx.scale(logoScale, logoScale);
                ctx.fillText('Retro Fantasy', 0, 0);
                ctx.restore();
                // 装飾線
                ctx.shadowBlur = 8; ctx.shadowColor = '#FFD700';
                ctx.strokeStyle = '#B8860B'; ctx.lineWidth = 1.5;
                const lineAlpha = 0.5 + 0.3 * Math.sin(TT * 1.2);
                ctx.globalAlpha = lineAlpha;
                ctx.beginPath(); ctx.moveTo(VIEW_W/2 - 240, 142); ctx.lineTo(VIEW_W/2 + 240, 142); ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.restore();

                // サブタイトル
                ctx.save();
                ctx.textAlign = 'center'; ctx.shadowBlur = 8; ctx.shadowColor = '#4488AA';
                ctx.fillStyle = '#C0D8E8';
                ctx.font = 'bold 19px monospace';
                ctx.fillText('― A Philosophical Journey ―', VIEW_W / 2, 178);
                ctx.restore();

                // ---- フィロソフィカルクォート (フェードイン/アウト) ----
                const quotePhase = (T % 200) / 200;
                const quoteAlpha = quotePhase < 0.1 ? quotePhase / 0.1 : quotePhase > 0.85 ? (1 - quotePhase) / 0.15 : 1;
                ctx.save();
                ctx.textAlign = 'center'; ctx.globalAlpha = quoteAlpha * 0.7;
                ctx.fillStyle = '#AACCEE'; ctx.font = 'italic 13px monospace';
                ctx.fillText(TITLE_QUOTES[titleQuoteIdx], VIEW_W / 2, 215);
                ctx.restore();

                // ---- メニュー ----
                const opts = ['NEW GAME', 'CONTINUE', '今日のチャレンジ'];
                const menuBaseY = 268;
                for (let i = 0; i < opts.length; i++) {
                    const sel = (titleSelectedOption === i);
                    const bounce = sel ? Math.sin(TT * 4) * 2 : 0;
                    const y = menuBaseY + i * 62 + bounce;
                    ctx.save();
                    ctx.textAlign = 'center';
                    if (sel) {
                        // 選択中: グロー背景
                        const menuGrad = ctx.createLinearGradient(VIEW_W/2 - 180, y - 24, VIEW_W/2 + 180, y);
                        const selColor = i === 2 ? '#FF8C00' : '#EFD02E';
                        menuGrad.addColorStop(0, 'rgba(0,0,0,0)');
                        menuGrad.addColorStop(0.5, `rgba(${i===2?'100,60,0':'80,60,0'},0.45)`);
                        menuGrad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = menuGrad;
                        ctx.fillRect(VIEW_W/2 - 180, y - 28, 360, 38);
                        ctx.shadowBlur = 18; ctx.shadowColor = selColor;
                        ctx.fillStyle = selColor;
                        ctx.font = `bold ${i===2?28:36}px monospace`;
                        ctx.fillText('► ' + opts[i], VIEW_W / 2, y);
                    } else {
                        ctx.fillStyle = i === 2 ? '#7A5218' : '#888888';
                        ctx.font = `${i===2?22:28}px monospace`;
                        ctx.fillText(opts[i], VIEW_W / 2, y);
                    }
                    if (i === 2 && isTodayChallengeCompleted()) {
                        ctx.fillStyle = '#44ff88'; ctx.font = '12px monospace';
                        ctx.fillText('✓ 本日クリア済み', VIEW_W / 2, y + 18);
                    }
                    ctx.restore();
                }

                // デイリーチャレンジ詳細 / 難易度選択
                if (titleSelectedOption === 2) {
                    const todayChallenge = getTodayChallenge();
                    ctx.save();
                    ctx.fillStyle = 'rgba(0,0,0,0.75)';
                    ctx.fillRect(VIEW_W/2 - 200, 462, 400, 62);
                    ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 1.5; ctx.shadowBlur = 6; ctx.shadowColor = '#FF8C00';
                    ctx.strokeRect(VIEW_W/2 - 200, 462, 400, 62);
                    ctx.fillStyle = '#FF8C00'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
                    ctx.fillText(todayChallenge.name, VIEW_W / 2, 480);
                    ctx.fillStyle = '#ddd'; ctx.font = '12px monospace';
                    ctx.fillText(todayChallenge.desc, VIEW_W / 2, 498);
                    ctx.fillStyle = '#888'; ctx.font = '11px monospace';
                    ctx.fillText('Enter で開始', VIEW_W / 2, 516);
                    ctx.restore();
                } else {
                    ctx.save(); ctx.textAlign = 'center';
                    ctx.fillStyle = '#556677'; ctx.font = '13px monospace';
                    ctx.fillText('DIFFICULTY', VIEW_W / 2, 476);
                    for (let d = 0; d < 3; d++) {
                        const sel = (difficultyLevel === d);
                        ctx.fillStyle = sel ? (d===0?'#44ff44':d===1?'#EFD02E':'#ff4444') : '#445';
                        ctx.font = sel ? 'bold 19px monospace' : '15px monospace';
                        if (sel) { ctx.shadowBlur = 8; ctx.shadowColor = ctx.fillStyle; }
                        ctx.fillText(DIFF_NAMES[d], VIEW_W/2 - 110 + d*110, 498);
                        ctx.shadowBlur = 0;
                    }
                    ctx.fillStyle = '#445'; ctx.font = '11px monospace';
                    ctx.fillText('← → で変更', VIEW_W/2, 516);
                    ctx.restore();
                }

                // クレジットリンク + ナビ説明
                ctx.save(); ctx.textAlign = 'center';
                ctx.fillStyle = '#445'; ctx.font = '13px monospace';
                ctx.fillText('[ C ] CREDITS', VIEW_W / 2, 540);
                ctx.fillStyle = '#334'; ctx.font = '12px monospace';
                ctx.fillText('[↑↓] 選択   [Enter/Space] 決定', VIEW_W / 2, VIEW_H - 18);
                ctx.restore();

                // ---- 右パネル (タイトル用) ----
                const rpGrad = ctx.createLinearGradient(VIEW_W, 0, VIEW_W + STATS_W, 0);
                rpGrad.addColorStop(0, '#050510'); rpGrad.addColorStop(1, '#0A0A20');
                ctx.fillStyle = rpGrad;
                ctx.fillRect(VIEW_W, 0, STATS_W, VIEW_H);
                ctx.save(); ctx.shadowBlur = 6; ctx.shadowColor = '#FFD700';
                ctx.strokeStyle = '#3A2800'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(VIEW_W, 0); ctx.lineTo(VIEW_W, VIEW_H); ctx.stroke();
                ctx.restore();
                ctx.save(); ctx.textAlign = 'center';
                const infoItems = [
                    ['STAGE',  '20ステージ',    '#88AACC'],
                    ['ENEMY',  '14種の敵',       '#FF9944'],
                    ['SKILL',  '3つのスキル',    '#CC88FF'],
                    ['PATH',   '3つの哲学の道',  '#88FF88'],
                    ['HIDDEN', '隠しステージ',   '#EFD02E'],
                    ['BOSS',   '哲学的対話',     '#FF6644'],
                ];
                ctx.fillStyle = '#EFD02E'; ctx.font = 'bold 14px monospace'; ctx.shadowBlur = 6; ctx.shadowColor = '#FFD700';
                ctx.fillText('FEATURES', VIEW_W + STATS_W/2, 60);
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,215,0,0.25)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(VIEW_W+15, 66); ctx.lineTo(VIEW_W+STATS_W-15, 66); ctx.stroke();
                infoItems.forEach(([label, val, col], fi) => {
                    const fy = 90 + fi * 52;
                    const pulse = 0.7 + 0.3 * Math.sin(TT * 1.2 + fi * 0.9);
                    ctx.globalAlpha = pulse;
                    ctx.fillStyle = col; ctx.font = 'bold 11px monospace'; ctx.shadowBlur = 4; ctx.shadowColor = col;
                    ctx.fillText(label, VIEW_W + STATS_W/2, fy);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#DDDDDD'; ctx.font = '12px monospace';
                    ctx.fillText(val, VIEW_W + STATS_W/2, fy + 18);
                    ctx.globalAlpha = 1;
                });
                // 下部ヒント
                ctx.globalAlpha = 0.5 + 0.3 * Math.sin(TT * 2);
                ctx.fillStyle = '#556677'; ctx.font = '11px monospace';
                ctx.fillText('Press any key', VIEW_W + STATS_W/2, VIEW_H - 30);
                ctx.fillText('to start', VIEW_W + STATS_W/2, VIEW_H - 15);
                ctx.globalAlpha = 1;
                ctx.restore();

                ctx.textAlign = 'left';
                return;
            }

            if (gameState === 'credits') {
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, VIEW_W + STATS_W, VIEW_H);

                ctx.textAlign = 'center';
                ctx.fillStyle = '#EFD02E';
                ctx.font = 'bold 32px monospace';
                ctx.fillText('— CREDITS —', (VIEW_W + STATS_W) / 2, 60);

                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 18px monospace';
                ctx.fillText('Retro Fantasy — A Philosophical Journey', (VIEW_W + STATS_W) / 2, 110);

                const credits = [
                    ['', ''],
                    ['■ 哲学的引用・参考思想家', ''],
                    ['Socrates', 'ソクラテス（問いかけの父）'],
                    ['Plato', 'プラトン（イデア論）'],
                    ['Aristotle', 'アリストテレス（存在の哲学）'],
                    ['René Descartes', 'デカルト（Cogito ergo sum）'],
                    ['Friedrich Nietzsche', 'ニーチェ（力への意志）'],
                    ['Jean-Paul Sartre', 'サルトル（実存主義）'],
                    ['', ''],
                    ['■ 技術', ''],
                    ['HTML5 Canvas API', 'レンダリングエンジン'],
                    ['Web Audio API', 'サウンドシステム'],
                    ['', ''],
                    ['■ Special Thanks', ''],
                    ['', 'このゲームをプレイしてくれた あなた へ'],
                    ['', 'あなたの存在が、この哲学の旅を意味あるものにする'],
                ];

                let y = 145;
                credits.forEach(([left, right]) => {
                    if (left.startsWith('■')) {
                        ctx.fillStyle = '#EFD02E';
                        ctx.font = 'bold 15px monospace';
                        ctx.fillText(left, (VIEW_W + STATS_W) / 2, y);
                    } else if (left === '' && right === '') {
                        // spacing
                    } else {
                        ctx.fillStyle = '#AAAAAA';
                        ctx.font = '14px monospace';
                        ctx.textAlign = 'right';
                        ctx.fillText(left, (VIEW_W + STATS_W) / 2 - 10, y);
                        ctx.fillStyle = '#FFFFFF';
                        ctx.textAlign = 'left';
                        ctx.fillText(right, (VIEW_W + STATS_W) / 2 + 10, y);
                    }
                    y += 22;
                });

                ctx.textAlign = 'center';
                if (Math.floor(Date.now() / 600) % 2 === 0) {
                    ctx.fillStyle = '#888';
                    ctx.font = '14px monospace';
                    ctx.fillText('— 何かキーを押してタイトルへ —', (VIEW_W + STATS_W) / 2, VIEW_H - 30);
                }
                ctx.textAlign = 'left';
                return;
            }

            // ステージ選択画面
            if (gameState === 'stageSelect') {
                ctx.fillStyle = '#000022';
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.fillStyle = '#080818';
                ctx.fillRect(VIEW_W, 0, STATS_W, VIEW_H);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#EFD02E';
                ctx.font = 'bold 36px monospace';
                ctx.fillText('CONTINUE - Select Stage', VIEW_W / 2, 80);
                ctx.fillStyle = '#D0D0D0';
                ctx.font = '18px monospace';
                ctx.fillText(`Available: Stage 1 to Stage ${maxReachedStage + 1}`, VIEW_W / 2, 118);

                const bw = 260, bh = 44;
                const bx = VIEW_W / 2 - bw / 2;
                const listStartY = 148;
                const listSpacing = 52;
                const visibleCount = Math.min(maxReachedStage + 1, 7);
                const scrollOffset = Math.max(0, Math.min(stageSelectCursor - 3, maxReachedStage + 1 - visibleCount));

                for (let vi = 0; vi < visibleCount; vi++) {
                    const i = scrollOffset + vi;
                    if (i > maxReachedStage) break;
                    const by = listStartY + vi * listSpacing;
                    const sel = (stageSelectCursor === i);
                    ctx.fillStyle = sel ? '#EFD02E' : '#223355';
                    ctx.fillRect(bx, by, bw, bh);
                    ctx.strokeStyle = sel ? '#fff' : '#445577';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(bx, by, bw, bh);
                    ctx.fillStyle = sel ? '#000' : '#ccc';
                    ctx.font = sel ? 'bold 22px monospace' : '20px monospace';
                    ctx.fillText(`STAGE ${i + 1}`, VIEW_W / 2, by + 29);
                }
                if (maxReachedStage + 1 > visibleCount) {
                    ctx.fillStyle = '#666';
                    ctx.font = '13px monospace';
                    if (scrollOffset > 0) ctx.fillText('▲', VIEW_W / 2, listStartY - 8);
                    if (scrollOffset + visibleCount <= maxReachedStage) ctx.fillText('▼', VIEW_W / 2, listStartY + visibleCount * listSpacing + 12);
                }
                ctx.fillStyle = '#888';
                ctx.font = '14px monospace';
                ctx.fillText('[↑↓] / [WS] to move, [Enter] / [Space] to select, [Esc] to go back', VIEW_W / 2, VIEW_H - 40);
                ctx.textAlign = 'left';
                return;
            }

            if (!isBgCached) {
                // 背景テーマ設定
                const sc = getActiveStageConfig(currentStageIndex);
                bgCtx.fillStyle = sc.bg;
                bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

                // 背景とマップの描画
                for (let r = 0; r < MAP_ROWS; r++) {
                    for (let c = 0; c < MAP_COLS; c++) {
                        const tile = mapData[r * MAP_COLS + c];
                        const tx = c * TILE_SIZE;
                        const ty = r * TILE_SIZE;

                        if (tile === 0) {
                            if ((c + r) % 2 === 0 && c % 3 !== 0) {
                                drawShape(
                                    [[0, 1, 0, 0], [1, 5, 1, 1], [1, 5, 5, 1], [0, 1, 1, 0]],
                                    tx + 10, ty + 10, 0, 2, false, false, bgCtx
                                );
                            }
                            // 床タイル: 微細グリッド
                            bgCtx.strokeStyle = 'rgba(0,0,0,0.08)';
                            bgCtx.lineWidth = 0.5;
                            bgCtx.strokeRect(tx, ty, TILE_SIZE, TILE_SIZE);
                            // ランダム明るいバリエーション
                            if ((c * 7 + r * 13) % 11 === 0) {
                                bgCtx.fillStyle = 'rgba(255,255,255,0.04)';
                                bgCtx.fillRect(tx + 2, ty + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                            }
                        } else if (tile === 1) {
                            drawShape(TILE_MOUNTAIN, tx, ty, 0, 4, false, false, bgCtx);
                            // 壁: 3Dシャドウエッジ
                            bgCtx.fillStyle = 'rgba(0,0,0,0.3)';
                            bgCtx.fillRect(tx + TILE_SIZE - 3, ty, 3, TILE_SIZE);
                            bgCtx.fillRect(tx, ty + TILE_SIZE - 3, TILE_SIZE, 3);
                            // 壁: ハイライト(左上)
                            bgCtx.fillStyle = 'rgba(255,255,255,0.12)';
                            bgCtx.fillRect(tx, ty, TILE_SIZE, 2);
                            bgCtx.fillRect(tx, ty, 2, TILE_SIZE);
                        } else if (tile === 2) {
                            drawShape(TILE_WATER, tx, ty, 0, 4, false, false, bgCtx);
                            // 水: 3Dシャドウエッジ
                            bgCtx.fillStyle = 'rgba(0,0,0,0.2)';
                            bgCtx.fillRect(tx + TILE_SIZE - 3, ty, 3, TILE_SIZE);
                            bgCtx.fillRect(tx, ty + TILE_SIZE - 3, TILE_SIZE, 3);
                        } else if (tile === 3) {
                            drawShape(TILE_BRIDGE, tx, ty, 0, 4, false, false, bgCtx);
                            // 橋: 3Dシャドウエッジ
                            bgCtx.fillStyle = 'rgba(0,0,0,0.25)';
                            bgCtx.fillRect(tx + TILE_SIZE - 3, ty, 3, TILE_SIZE);
                            bgCtx.fillRect(tx, ty + TILE_SIZE - 3, TILE_SIZE, 3);
                            bgCtx.fillStyle = 'rgba(255,255,255,0.1)';
                            bgCtx.fillRect(tx, ty, TILE_SIZE, 2);
                        }
                    }
                }
                isBgCached = true;
            }

            // カメラ適用: ワールドの見える範囲だけbgCanvasから切り出して描画
            const shakeX = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
            const shakeY = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
            if (screenShake > 0) screenShake = Math.max(0, screenShake - 0.8);
            ctx.save();
            ctx.translate(shakeX, shakeY);
            ctx.drawImage(bgCanvas, camX, camY, VIEW_W, VIEW_H, 0, 0, VIEW_W, VIEW_H);

            // ステージ大気オーバーレイ
            const _sc = getActiveStageConfig(currentStageIndex);
            if (_sc.tint) {
                ctx.save();
                ctx.fillStyle = _sc.tint;
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.restore();
            }

            let pRot = 0;
            if (player.dirX === 1) pRot = Math.PI / 2;
            else if (player.dirX === -1) pRot = -Math.PI / 2;
            else if (player.dirY === -1) pRot = 0;
            else if (player.dirY === 1) pRot = Math.PI;

            // 哲学の鍵アイテム描画
            if (keyItemPos && !keyItemCollected) {
                const kx = keyItemPos.x - camX;
                const ky = keyItemPos.y - camY;
                const pulse = Math.sin(Date.now() / 300) * 0.25;
                // パルシング金色グロー
                const keyGlowStrength = 15 + 10 * Math.abs(Math.sin(Date.now() / 400));
                drawGlow(ctx, kx + SPRITE_SIZE/2, ky + SPRITE_SIZE/2, 28, '#FFD700', keyGlowStrength);
                drawShape(KEY_ITEM_SPRITE, kx, ky, pulse, PIXEL_SCALE);
                // 画面外なら矢印インジケーター
                if (kx < 0 || kx > VIEW_W || ky < 0 || ky > VIEW_H) {
                    const ax = Math.max(20, Math.min(VIEW_W - 20, kx));
                    const ay = Math.max(20, Math.min(VIEW_H - 20, ky));
                    const ang = Math.atan2(keyItemPos.y - (player.y + SPRITE_SIZE/2), keyItemPos.x - (player.x + SPRITE_SIZE/2));
                    ctx.save();
                    ctx.translate(ax, ay);
                    ctx.rotate(ang);
                    ctx.fillStyle = '#EFD02E';
                    ctx.font = 'bold 16px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('▶', 0, 6);
                    ctx.restore();
                }
            }

            // アイテム描画（カメラオフセット適用）
            for (let item of items) {
                const wobble = Math.sin(Date.now() / 200) * 0.15;
                const iix = item.x - camX + SPRITE_SIZE/2;
                const iiy = item.y - camY + SPRITE_SIZE/2;
                if (item.type === 'wisdom') {
                    // 知恵の欠片: 青い光のグロー (ラジアルグラデーション + drawGlow)
                    const wGlow = ctx.createRadialGradient(iix, iiy, 2, iix, iiy, 28);
                    const wAlpha = 0.3 + 0.2 * Math.sin(Date.now() / 300);
                    wGlow.addColorStop(0, `rgba(100,200,255,${wAlpha + 0.2})`);
                    wGlow.addColorStop(1, 'rgba(100,200,255,0)');
                    ctx.save();
                    ctx.fillStyle = wGlow;
                    ctx.beginPath();
                    ctx.arc(iix, iiy, 28, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    drawGlow(ctx, iix, iiy, 20, '#7EC8E3', 12);
                } else if (item.type === 'orb_reason') {
                    drawGlow(ctx, iix, iiy, 20, '#5B9BD5', 12);
                } else if (item.type === 'orb_emotion') {
                    drawGlow(ctx, iix, iiy, 20, '#E84855', 12);
                } else if (item.type === 'key_freedom') {
                    drawGlow(ctx, iix, iiy, 20, '#FFD700', 12);
                } else if (item.type === 'chain_duty') {
                    drawGlow(ctx, iix, iiy, 20, '#9B59B6', 12);
                }
                drawShape(item.sprite, item.x - camX, item.y - camY, wobble, PIXEL_SCALE);
            }

            // 弾（カメラオフセット適用）
            for (let p of projectiles) {
                let rot = Math.atan2(p.dy, p.dx) + Math.PI / 2;
                drawShape(p.sprite, p.x - camX, p.y - camY, rot, PIXEL_SCALE);
            }

            // 敵（カメラオフセット適用）
            for (let enemy of enemies) {
                const wobble = Math.sin(Date.now() / 150) * 0.1;
                let scale = PIXEL_SCALE;
                if (enemy.type === 'boss') scale *= 1.5;
                const eFlipX = (player.x < enemy.x);
                const esx = enemy.x - camX, esy = enemy.y - camY;
                if (esx < -SPRITE_SIZE * 2 || esx > VIEW_W + SPRITE_SIZE || esy < -SPRITE_SIZE * 2 || esy > VIEW_H + SPRITE_SIZE) continue;
                // ボス: 赤/オレンジのグロー
                if (enemy.type === 'boss') {
                    drawGlow(ctx, esx + SPRITE_SIZE * 0.75, esy + SPRITE_SIZE * 0.75, 28, '#FF4400', 12);
                }
                drawShape(enemy.sprite, esx, esy, wobble, scale, enemy.hitTimer % 4 > 1, eFlipX);
                // HPバー
                ctx.fillStyle = '#f00';
                const hpRatio = enemy.hp / enemy.maxHp;
                ctx.fillRect(esx, esy - 10, (16 * scale) * hpRatio, 4);
                ctx.strokeStyle = '#000';
                ctx.strokeRect(esx, esy - 10, 16 * scale, 4);
            }

            // 主人公
            if (player.invincibleTimer === 0 || player.invincibleTimer % 8 < 4) {
                let heroFlip = false;
                let heroSprite;
                const wf = player.walkFrame;
                if (player.dirX === -1) { heroSprite = wf ? PLAYER_RIGHT_SPRITE_W2 : PLAYER_RIGHT_SPRITE; heroFlip = true; }
                else if (player.dirX === 1) { heroSprite = wf ? PLAYER_RIGHT_SPRITE_W2 : PLAYER_RIGHT_SPRITE; }
                else if (player.dirY === -1) { heroSprite = wf ? PLAYER_BACK_SPRITE_W2 : PLAYER_BACK_SPRITE; }
                else { heroSprite = wf ? PLAYER_SPRITE_W2 : PLAYER_SPRITE; }

                // プレイヤー: 温かい金色グロー
                drawGlow(ctx, player.x - camX + SPRITE_SIZE/2, player.y - camY + SPRITE_SIZE/2, 24, '#FFD700', 8);
                // アクティブスキル視覚エフェクト
                const skCx = player.x - camX + SPRITE_SIZE/2;
                const skCy = player.y - camY + SPRITE_SIZE/2;
                if (skills.rengeki.active) {
                    const t = Date.now() / 120;
                    ctx.save(); ctx.globalAlpha = 0.55 + 0.25 * Math.sin(t);
                    ctx.strokeStyle = '#FF6644'; ctx.lineWidth = 3; ctx.shadowBlur = 12; ctx.shadowColor = '#FF6644';
                    ctx.beginPath(); ctx.arc(skCx, skCy, 30 + 4 * Math.sin(t * 2), 0, Math.PI * 2); ctx.stroke();
                    ctx.restore();
                }
                if (skills.barrier.active) {
                    const t = Date.now() / 200;
                    ctx.save(); ctx.globalAlpha = 0.6 + 0.2 * Math.sin(t);
                    ctx.strokeStyle = '#44AAFF'; ctx.lineWidth = 4; ctx.shadowBlur = 16; ctx.shadowColor = '#44AAFF';
                    ctx.beginPath(); ctx.arc(skCx, skCy, 34, 0, Math.PI * 2); ctx.stroke();
                    ctx.restore();
                }
                if (skills.timeslow.active) {
                    const t = Date.now() / 300;
                    ctx.save(); ctx.globalAlpha = 0.4;
                    ctx.strokeStyle = '#CC88FF'; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = '#CC88FF';
                    for (let ri = 0; ri < 3; ri++) {
                        ctx.beginPath(); ctx.arc(skCx, skCy, 26 + ri * 8 + 3 * Math.sin(t + ri), 0, Math.PI * 2); ctx.stroke();
                    }
                    ctx.restore();
                }
                drawShape(heroSprite, player.x - camX, player.y - camY, 0, PIXEL_SCALE, false, heroFlip);
            }

            // 盾 (構えている時)
            if (isShielding && player.invincibleTimer % 8 < 4) {
                const sx = player.x - camX + player.dirX * 25;
                const sy = player.y - camY + player.dirY * 25;
                drawShape(SHIELD_SPRITE, sx, sy, pRot, PIXEL_SCALE);
            }

            // 魔法サークル (攻撃中) — 強化版
            if (player.isAttacking && currentWeapon === 'sword') {
                const maxTimer = comboStep === 3 ? 20 : 15;
                const progress = 1 - player.attackTimer / maxTimer;
                const cx = player.x - camX + SPRITE_SIZE / 2;
                const cy = player.y - camY + SPRITE_SIZE / 2;
                const baseRadius = SPRITE_SIZE * (hasLongSword ? 2.2 : 1.5);
                const arcRadius = baseRadius * (comboStep === 3 ? 2.2 : comboStep === 2 ? 1.5 : 1.0);
                const arcSpan = comboStep === 3 ? Math.PI * 2 : Math.PI * (comboStep === 2 ? 1.0 : 0.75);
                let centerAngle = Math.PI / 2;
                if (player.dirX === 1) centerAngle = 0;
                else if (player.dirX === -1) centerAngle = Math.PI;
                else if (player.dirY === -1) centerAngle = -Math.PI / 2;
                const sweepStart = comboStep === 3 ? 0 : centerAngle - arcSpan / 2 + progress * arcSpan;
                const sweepEnd = comboStep === 3 ? Math.PI * 2 : centerAngle + arcSpan / 2;
                const alpha = 0.85 * (1 - progress);
                // 魔法コンボ段階で色変化 (青/紫系)
                const arcColor = comboStep === 3 ? `rgba(180,100,255,${alpha})` :
                                 comboStep === 2 ? `rgba(68,136,255,${alpha})` :
                                                  `rgba(136,68,255,${alpha})`;
                ctx.save();
                // グロー効果を有効化
                ctx.shadowBlur = 20;
                ctx.shadowColor = comboStep === 3 ? '#FF88FF' : '#8844FF';
                // メイン弧
                ctx.strokeStyle = arcColor;
                ctx.lineWidth = comboStep === 3 ? 10 : comboStep === 2 ? 8 : 7;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(cx, cy, arcRadius, sweepStart, sweepEnd);
                ctx.stroke();
                // 内側の弧（二重リング）
                ctx.shadowBlur = 10;
                ctx.strokeStyle = comboStep === 3 ? `rgba(220,180,255,${alpha * 0.5})` : `rgba(150,180,255,${alpha * 0.6})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, arcRadius * 0.85, sweepStart, sweepEnd);
                ctx.stroke();
                ctx.shadowBlur = 0;
                // ルーン小円 (6個を弧の周囲に配置)
                const runeCount = comboStep === 3 ? 12 : 6;
                for (let ri = 0; ri < runeCount; ri++) {
                    const runeAngle = sweepStart + (sweepEnd - sweepStart) * (ri / (runeCount - 1 || 1));
                    const rx = cx + Math.cos(runeAngle) * arcRadius;
                    const ry = cy + Math.sin(runeAngle) * arcRadius;
                    ctx.beginPath();
                    ctx.arc(rx, ry, comboStep === 3 ? 5 : 3, 0, Math.PI * 2);
                    ctx.fillStyle = comboStep === 3 ? `rgba(255,180,255,${alpha})` : `rgba(160,120,255,${alpha})`;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = comboStep === 3 ? '#FF88FF' : '#8844FF';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                // 魔法オーブ: 中心に光の点
                if (comboStep === 3) {
                    const orbGlow = ctx.createRadialGradient(cx, cy, 2, cx, cy, arcRadius * 0.3);
                    orbGlow.addColorStop(0, `rgba(200,150,255,${alpha * 0.8})`);
                    orbGlow.addColorStop(1, `rgba(68,68,255,0)`);
                    ctx.fillStyle = orbGlow;
                    ctx.beginPath();
                    ctx.arc(cx, cy, arcRadius * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    // コンボ3: バーストの12小円
                    for (let bi = 0; bi < 12; bi++) {
                        const ba = (Math.PI * 2 * bi / 12) + progress * Math.PI;
                        const br = arcRadius * 0.5 * progress;
                        ctx.beginPath();
                        ctx.arc(cx + Math.cos(ba)*br, cy + Math.sin(ba)*br, 4, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,160,255,${alpha * 0.7})`;
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = '#FF88FF';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
                ctx.restore();
            }

            // ==== 賢者NPC 描画 ====
            if (sageNPC && sageNPC.stage === currentStageIndex) {
                const sx = sageNPC.x - camX;
                const sy = sageNPC.y - camY;
                if (sx > -SPRITE_SIZE && sx < VIEW_W + SPRITE_SIZE && sy > -SPRITE_SIZE && sy < VIEW_H + SPRITE_SIZE) {
                    // 白いグロー円
                    const sageGlow = ctx.createRadialGradient(sx + SPRITE_SIZE/2, sy + SPRITE_SIZE/2, 4,
                                                              sx + SPRITE_SIZE/2, sy + SPRITE_SIZE/2, 36);
                    sageGlow.addColorStop(0, 'rgba(180,220,255,0.35)');
                    sageGlow.addColorStop(1, 'rgba(180,220,255,0)');
                    ctx.save();
                    ctx.fillStyle = sageGlow;
                    ctx.beginPath();
                    ctx.arc(sx + SPRITE_SIZE/2, sy + SPRITE_SIZE/2, 36, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    // 賢者スプライト (8x8 * PIXEL_SCALE/2 = 24px)
                    drawShape(SAGE_SPRITE, sx + SPRITE_SIZE/4, sy + SPRITE_SIZE/4, 0, PIXEL_SCALE/2);
                    // 頭上に ? か ✓
                    const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
                    ctx.save();
                    ctx.globalAlpha = sageNPC.interacted ? 0.9 : pulse;
                    ctx.font = 'bold 18px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = sageNPC.interacted ? '#88FF88' : '#EFD02E';
                    ctx.fillText(sageNPC.interacted ? '✓' : '?', sx + SPRITE_SIZE/2, sy - 6);
                    ctx.textAlign = 'left';
                    ctx.restore();
                }
            }

            // アンビエントパーティクル描画
            drawAmbient();

            // パーティクル描画
            drawParticles(camX, camY);

            // 暗闇オーバーレイ
            drawDarknessOverlay(camX, camY);

            // UI (ゲームエリア 0-800)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, VIEW_W, 40);

            ctx.fillStyle = '#fff';
            ctx.font = '20px monospace';
            ctx.fillText(`STAGE: ${currentStageIndex + 1} | SCORE: ${pScore}`, 10, 26);

            ctx.fillStyle = bossActive ? '#ff4444' : '#fff';
            ctx.font = '16px monospace';
            const hudMsg = bossActive ? '⚔ BOSS ⚔' : (keyItemPos ? `倒せ: ${enemiesDefeatedInStage}` : '鍵を取れ!');
            ctx.fillText(hudMsg, VIEW_W - 120, 26);

            // コンボインジケーター
            if (comboStep > 0 && comboTimer > 0) {
                const dots = ['●', '●●', '●●●'];
                const colors = ['#AAAAAA', '#88BBFF', '#FFD700'];
                ctx.fillStyle = colors[comboStep - 1];
                ctx.font = 'bold 16px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`COMBO ${dots[comboStep - 1]}`, VIEW_W / 2, 28);
                if (comboStep === 3) {
                    ctx.fillStyle = `rgba(255,200,0,${(comboTimer / COMBO_WINDOW) * 0.8})`;
                    ctx.fillText('SPIN!', VIEW_W / 2 + 90, 28);
                }
                ctx.textAlign = 'left';
            }

            ctx.fillStyle = '#fff';
            ctx.fillText(`HP: `, 160, 26);
            for (let i = 0; i < player.maxHp; i++) {
                ctx.fillStyle = i < player.hp ? '#e02020' : '#444';
                ctx.fillRect(200 + i * 20, 10, 14, 20);
            }

            ctx.restore(); // end screen shake transform

            // ビネットオーバーレイ (ゲームエリア)
            drawVignette();

            // 右側ステータスパネル
            drawStatsPanel();

            // ナラティブオーバーレイ
            drawNarrativeOverlay();

            // ボス哲学対話オーバーレイ
            drawBossDialogue();

            // 思索オーバーレイ
            drawMeditationOverlay();

            // アイテム合成オーバーレイ
            drawSynthesisOverlay();

            // 哲学アイテム合成オーバーレイ
            drawPhilSynthOverlay();

            // チュートリアル
            drawTutorial();

            // 実績ポップアップ
            if (achievementPopup && achievementPopup.timer > 0) {
                const t = achievementPopup.timer;
                const alpha = t > 160 ? 1 : t > 40 ? (t-40)/120 : t/40;
                const slideY = t > 160 ? 0 : (160-t)*0.3;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = 'rgba(20,20,20,0.9)';
                ctx.fillRect(VIEW_W - 310, 50 + slideY, 290, 58);
                ctx.strokeStyle = '#EFD02E';
                ctx.lineWidth = 2;
                ctx.strokeRect(VIEW_W - 310, 50 + slideY, 290, 58);
                ctx.fillStyle = '#EFD02E';
                ctx.font = 'bold 11px monospace';
                ctx.textAlign = 'right';
                ctx.fillText('🏆 実績解除', VIEW_W - 24, 66 + slideY);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 14px monospace';
                ctx.fillText(achievementPopup.label, VIEW_W - 24, 82 + slideY);
                ctx.fillStyle = '#AAAAAA';
                ctx.font = '11px monospace';
                ctx.fillText(achievementPopup.desc, VIEW_W - 24, 96 + slideY);
                ctx.restore();
            }

            // バーチャルパッド（タッチデバイス）
            drawVirtualPad();

            // 墓石を描画（プレイ中）
            if (!isGameOver) {
                for (const g of graveMarkers) {
                    if (g.stage === currentStageIndex) {
                        const gx = g.x - camX, gy = g.y - camY;
                        if (gx > -20 && gx < VIEW_W && gy > -20 && gy < VIEW_H) {
                            ctx.save();
                            ctx.globalAlpha = 0.55;
                            ctx.fillStyle = '#888888';
                            ctx.fillRect(gx + 16, gy + 8, 16, 24);
                            ctx.fillRect(gx + 10, gy + 8, 28, 10);
                            ctx.fillStyle = '#aaaaaa';
                            ctx.font = '9px monospace';
                            ctx.textAlign = 'center';
                            ctx.fillText('RIP', gx + 24, gy + 25);
                            ctx.textAlign = 'left';
                            ctx.restore();
                        }
                    }
                }
            }

            if (isGameOver) {
                const phase2Start = 220;
                const phase3Start = 150;
                // モノクロフィルター
                ctx.save();
                const monoAlpha = Math.min(1, (deathSceneTimer - phase2Start) / 80);
                if (deathSceneTimer < phase2Start) {
                    ctx.fillStyle = `rgba(0,0,0,${Math.max(0, 0.7 - deathSceneTimer / 300 * 0.3)})`;
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    // グレースケールオーバーレイ
                    ctx.fillStyle = `rgba(180,180,180,${Math.min(0.65, (phase2Start - deathSceneTimer) / 150)})`;
                    ctx.globalCompositeOperation = 'color';
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    ctx.globalCompositeOperation = 'source-over';
                }
                ctx.restore();

                ctx.fillStyle = 'rgba(0,0,0,0.72)';
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.textAlign = 'center';

                // memento mori テキスト
                if (deathSceneTimer < phase2Start) {
                    const fadeIn = Math.min(1, (phase2Start - deathSceneTimer) / 60);
                    ctx.globalAlpha = fadeIn;
                    ctx.fillStyle = '#888888';
                    ctx.font = 'italic 20px serif';
                    ctx.fillText('memento mori', VIEW_W / 2, VIEW_H / 2 - 80);
                    ctx.fillStyle = '#e02020';
                    ctx.font = 'bold 52px monospace';
                    ctx.fillText('GAME OVER', VIEW_W / 2, VIEW_H / 2 - 20);
                    ctx.fillStyle = '#aaaaaa';
                    ctx.font = '18px monospace';
                    ctx.fillText(`— Stage ${currentStageIndex + 1}  Score: ${pScore} —`, VIEW_W / 2, VIEW_H / 2 + 30);

                    if (deathSceneTimer < 80) {
                        ctx.fillStyle = '#888888';
                        ctx.font = 'italic 16px serif';
                        ctx.globalAlpha = (80 - deathSceneTimer) / 80;
                        const lastWords = [
                            'Cogito ergo sum...',
                            '我思う、ゆえに我あり...',
                            '存在は消えても、問いは残る...',
                            'The unexamined life is not worth living...',
                        ];
                        ctx.fillText(lastWords[currentStageIndex % lastWords.length], VIEW_W / 2, VIEW_H / 2 + 75);
                    }
                    ctx.globalAlpha = 1;
                }

                if (Math.floor(Date.now() / 500) % 2 === 0 && deathSceneTimer < 60) {
                    ctx.fillStyle = '#555555';
                    ctx.font = '14px monospace';
                    ctx.fillText('Returning to title...', VIEW_W / 2, VIEW_H / 2 + 120);
                }
                ctx.textAlign = 'left';
            } else if (msgTimer > 0 && currentStageIndex !== 7) {
                const cmLines = centerMessage.split('\n');
                const cmH = Math.max(80, cmLines.length * 36 + 20);
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, VIEW_H / 2 - cmH / 2, VIEW_W, cmH);
                ctx.textAlign = 'center';
                cmLines.forEach((ln, li) => {
                    const isFirst = li === 0;
                    ctx.fillStyle = isFirst ? '#fff' : '#CCDDFF';
                    ctx.font = isFirst ? 'bold 28px monospace' : '16px monospace';
                    ctx.fillText(ln, VIEW_W / 2, VIEW_H / 2 - cmH / 2 + 36 + li * (isFirst ? 32 : 22));
                });
                ctx.textAlign = 'left';
                msgTimer--;
            } else if (msgTimer > 0 && currentStageIndex === 8 && enemiesDefeatedInStage >= 1) {
                const cmLines2 = centerMessage.split('\n');
                const cmH2 = Math.max(80, cmLines2.length * 36 + 20);
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, VIEW_H / 2 - cmH2 / 2, VIEW_W, cmH2);
                ctx.textAlign = 'center';
                cmLines2.forEach((ln, li) => {
                    const isFirst = li === 0;
                    ctx.fillStyle = isFirst ? '#EFD02E' : '#CCDDFF';
                    ctx.font = isFirst ? 'bold 28px monospace' : '16px monospace';
                    ctx.fillText(ln, VIEW_W / 2, VIEW_H / 2 - cmH2 / 2 + 36 + li * (isFirst ? 32 : 22));
                });
                ctx.textAlign = 'left';
                msgTimer--;
            }

            if (isPaused && !isGameOver && popupMessage === '') {
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.textAlign = 'center';

                if (!pauseInSettings && !pauseInAchievements) {
                    ctx.fillStyle = '#EFD02E';
                    ctx.font = 'bold 38px monospace';
                    ctx.fillText('— PAUSE —', VIEW_W / 2, VIEW_H / 2 - 90);

                    const pItems = ['▶  再開', '⚙  設定', '🏆  実績', '⏹  タイトルへ'];
                    pItems.forEach((label, i) => {
                        const sel = pauseMenuCursor === i;
                        ctx.fillStyle = sel ? '#ffffff' : '#888888';
                        ctx.font = sel ? 'bold 28px monospace' : '24px monospace';
                        if (sel) {
                            ctx.fillStyle = 'rgba(255,255,255,0.1)';
                            ctx.fillRect(VIEW_W/2 - 160, VIEW_H/2 - 30 + i*60, 320, 44);
                            ctx.fillStyle = '#ffffff';
                        }
                        ctx.fillText(label, VIEW_W / 2, VIEW_H / 2 - 10 + i * 60);
                    });

                    ctx.fillStyle = '#555';
                    ctx.font = '13px monospace';
                    ctx.fillText('↑↓ 選択   Enter 決定   P/Esc 閉じる', VIEW_W / 2, VIEW_H / 2 + 185);
                } else if (pauseInSettings) {
                    ctx.fillStyle = '#EFD02E';
                    ctx.font = 'bold 30px monospace';
                    ctx.fillText('⚙ 設定', VIEW_W / 2, VIEW_H / 2 - 100);

                    const settings = [
                        { label: 'BGM音量', val: bgmVolume },
                        { label: 'SE音量', val: seVolume },
                        { label: '← 戻る', val: null },
                    ];
                    settings.forEach((s, i) => {
                        const sel = pauseMenuCursor === i;
                        ctx.fillStyle = sel ? '#fff' : '#888';
                        ctx.font = sel ? 'bold 22px monospace' : '20px monospace';
                        if (s.val !== null) {
                            const barW = 180;
                            const bx = VIEW_W / 2 - barW / 2;
                            const by = VIEW_H / 2 - 40 + i * 65;
                            ctx.fillText(s.label, VIEW_W / 2, by);
                            ctx.fillStyle = '#333';
                            ctx.fillRect(bx, by + 8, barW, 16);
                            ctx.fillStyle = sel ? '#EFD02E' : '#888';
                            ctx.fillRect(bx, by + 8, barW * s.val, 16);
                            ctx.strokeStyle = '#666';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(bx, by + 8, barW, 16);
                        } else {
                            ctx.fillText(s.label, VIEW_W / 2, VIEW_H / 2 - 40 + i * 65);
                        }
                    });
                    ctx.fillStyle = '#555';
                    ctx.font = '13px monospace';
                    ctx.fillText('↑↓ 選択   ←→ 調整   Esc 戻る', VIEW_W / 2, VIEW_H / 2 + 185);
                } else if (pauseInAchievements) {
                    ctx.fillStyle = '#EFD02E'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('🏆 実績', VIEW_W/2, VIEW_H/2 - 220);
                    const colCount = 2;
                    const perCol = Math.ceil(ACHIEVEMENTS.length / colCount);
                    const colX = [VIEW_W/2 - 250, VIEW_W/2 + 10];
                    ACHIEVEMENTS.forEach((ach, i) => {
                        const col = Math.floor(i / perCol);
                        const row = i % perCol;
                        const unlocked = unlockedAchievements.has(ach.id);
                        ctx.fillStyle = unlocked ? '#EFD02E' : '#444444';
                        ctx.font = (unlocked ? 'bold ' : '') + '11px monospace';
                        ctx.textAlign = 'left';
                        ctx.fillText((unlocked ? '✓ ' : '○ ') + ach.label + ' — ' + ach.desc, colX[col], VIEW_H/2 - 195 + row * 26);
                    });
                    ctx.fillStyle = '#555'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('Esc 戻る', VIEW_W/2, VIEW_H/2 + 215);
                }
                ctx.textAlign = 'left';
            } else if (isPaused && !isGameOver) {
                // popupMessage表示時の既存処理
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                const pw = 500, ph = 260;
                ctx.fillRect(VIEW_W / 2 - pw / 2, VIEW_H / 2 - ph / 2, pw, ph);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.strokeRect(VIEW_W / 2 - pw / 2, VIEW_H / 2 - ph / 2, pw, ph);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                const lines = popupMessage.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    ctx.font = i === 0 ? 'bold 30px monospace' : '20px monospace';
                    ctx.fillStyle = i === 0 ? '#EFD02E' : '#fff';
                    ctx.fillText(lines[i], VIEW_W / 2, VIEW_H / 2 - ph / 2 + 50 + i * 35);
                }
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = '#ccc';
                    ctx.font = '16px monospace';
                    ctx.fillText("Press [P] or [Start] to Continue", VIEW_W / 2, VIEW_H / 2 + ph / 2 - 20);
                }
                ctx.textAlign = 'left';
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>

</html>
