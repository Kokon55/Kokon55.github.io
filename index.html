        function isWalkable(x, y) {
            // ピクセル座標を中心に少し余裕を持たせて円形で判定（SPRITE_SIZE/2）
            // 4隅のタイルをチェックして、一つでも障害物なら侵入不可とする
            const padding = 10;
            const points = [
                { cx: x + padding, cy: y + padding },
                { cx: x + SPRITE_SIZE - padding, cy: y + padding },
                { cx: x + padding, cy: y + SPRITE_SIZE - padding },
                { cx: x + SPRITE_SIZE - padding, cy: y + SPRITE_SIZE - padding }
            ];

            for (let p of points) {
                let tx = Math.floor(p.cx / TILE_SIZE);
                let ty = Math.floor(p.cy / TILE_SIZE);

                // 左右ループのためにtxを丸める
                if (tx < 0) tx = MAP_COLS - 1;
                else if (tx >= MAP_COLS) tx = 0;

                // 上下ループのためにtyを丸める
                if (ty < 0) ty = MAP_ROWS - 1;
                else if (ty >= MAP_ROWS) ty = 0;

                const tileType = mapData[ty * MAP_COLS + tx];
                if (tileType === 1 || tileType === 2) {
                    return false; // 山か川
                }
            }
            return true;
        }

        // BFSによる到達可能性の判定（プレイヤーのいるマスから敵のいるマスまで歩いていけるか）
        function isReachable(px, py, ex, ey) {
            const startX = Math.floor(px / TILE_SIZE);
            const startY = Math.floor(py / TILE_SIZE);
            const goalX = Math.floor(ex / TILE_SIZE);
            const goalY = Math.floor(ey / TILE_SIZE);

            if (startX === goalX && startY === goalY) return true;

            const queue = [{ x: startX, y: startY }];
            const visited = new Set();
            visited.add(`${startX},${startY}`);

            const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]]; // 上下左右のみ

            while (queue.length > 0) {
                const curr = queue.shift();

                if (curr.x === goalX && curr.y === goalY) return true;

                for (let d of dirs) {
                    const nx = curr.x + d[0];
                    const ny = curr.y + d[1];

                    // マップ範囲外チェック
                    if (nx < 0 || nx >= MAP_COLS || ny < 0 || ny >= MAP_ROWS) continue;

                    const tileType = mapData[ny * MAP_COLS + nx];
                    if (tileType !== 1 && tileType !== 2) { // 平地(0)か橋(3)なら通れる
                        const key = `${nx},${ny}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            queue.push({ x: nx, y: ny });
                        }
                    }
                }
            }
            return false;
        }

                const sw = audioCtx.createOscillator();
                const sg = audioCtx.createGain();
                sw.type = 'sawtooth'; sw.frequency.setValueAtTime(1800, now);
                sw.frequency.exponentialRampToValueAtTime(400, now + 0.08);
                sw.connect(sg); sg.connect(audioCtx.destination);
                sg.gain.setValueAtTime(0.04 * vol, now);
                sg.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                sw.start(now); sw.stop(now + 0.09);
            } else if (type === 'hit') {
                // 命中音: 重低音パンチ + クリック
                mkOsc('sawtooth', 300, 0.18, 0.07, 80);
                mkOsc('square',   500, 0.07, 0.04, 200);
            } else if (type === 'kill') {
                // 撃破: 下降アルペジオ + 爆発低音
                const freqs = [600, 480, 360, 240];
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    const t = now + i * 0.055;
                    o.type = 'square'; o.frequency.setValueAtTime(f, t);
                    o.connect(g); g.connect(audioCtx.destination);
                    g.gain.setValueAtTime(0.14 * vol, t);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                    o.start(t); o.stop(t + 0.09);
                });
                mkOsc('sawtooth', 180, 0.22, 0.28, 30);
            } else if (type === 'damage') {
                // 被弾: ショック + 高域ノイズ感
                mkOsc('triangle', 120, 0.35, 0.18, 55);
                mkOsc('square',   2400, 0.06, 0.06, 800);
                mkOsc('sawtooth', 300, 0.12, 0.12, 80);
            } else if (type === 'stageclear') {
                // ステージクリア: 上昇アルペジオ (C-E-G-C)
                const clrFreqs = [262, 330, 392, 523, 660];
                clrFreqs.forEach((f, i) => {
                    const t = now + i * 0.10;
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'triangle'; o.frequency.setValueAtTime(f, t);
                    o.connect(g); g.connect(audioCtx.destination);
                    if (reverbDelay) g.connect(reverbDelay);
                    g.gain.setValueAtTime(0.18 * vol, t);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                    o.start(t); o.stop(t + 0.23);
                    // 倍音
                    const o2 = audioCtx.createOscillator();
                    o2.type = 'sine'; o2.frequency.setValueAtTime(f * 2, t);
                    o2.connect(g); o2.start(t); o2.stop(t + 0.18);
                });
            } else if (type === 'gameover') {
                // ゲームオーバー: 重い下降 + 不協和音
                mkOsc('sawtooth', 220, 0.40, 1.5, 35);
                mkOsc('sawtooth', 185, 0.25, 1.2, 30);
                mkOsc('square',   160, 0.15, 0.8, 55);
            } else if (type === 'levelup') {
                // レベルアップ: 上昇ファンファーレ
                const lvlFreqs = [330, 415, 494, 659];
                lvlFreqs.forEach((f, i) => {
                    const t = now + i * 0.09;
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'square'; o.frequency.setValueAtTime(f, t);
                    o.connect(g); g.connect(audioCtx.destination);
                    if (reverbDelay) g.connect(reverbDelay);
                    g.gain.setValueAtTime(0.14 * vol, t);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                    o.start(t); o.stop(t + 0.19);
                });
            } else if (type === 'item') {
                // アイテム取得: キラキラ
                mkOsc('sine', 880, 0.12, 0.10, 1760);
                mkOsc('triangle', 1320, 0.08, 0.14, 2640);
            } else if (type === 'shield') {
                // 盾構え: 重いブロック音
                mkOsc('square', 200, 0.10, 0.06, 120);
                mkOsc('sine', 80, 0.15, 0.08, 50);
            }
        }

        function updateBgm() {
            if (!audioStarted || !audioCtx) return;
            const bgmAudio = document.getElementById('bgm');
            if (bgmAudio && bgmAudio.src && !bgmAudio.paused) return;

            // ステージ変化検出: bgmIndex と nextNoteTime をリセット
            if (bgmCurrentStage !== currentStageIndex) {
                bgmCurrentStage = currentStageIndex;
                bgmIndex = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
            }

            const profile = STAGE_BGM_PROFILES[Math.min(currentStageIndex, STAGE_BGM_PROFILES.length - 1)];
            const melody  = BGM_MELODIES[profile.intensity];
            const rootHz  = STAGE_ROOT_FREQS[Math.min(currentStageIndex, STAGE_ROOT_FREQS.length - 1)];

            // semitone offset → frequency multiplier
            function semitoneToFreq(root, semitones) {
                return root * Math.pow(2, semitones / 12);
            }

            // 動的テンポ: bgmDynamicSpeedMult が大きいほど早い
            const dynStep = (profile.tempo / 1000) / bgmDynamicSpeedMult;
            const noteLen = dynStep * 0.88;

            // 動的音量: profile.vol * bgmVolume * bgmDynamicVolMult
            const dynGain = profile.vol * bgmVolume * bgmDynamicVolMult * 0.12;

            // BGMルーティング先: bgmFilter が存在すればそこへ、なければ直接 destination
            const bgmDest = bgmFilter || audioCtx.destination;

            // per-intensity instrument character
            const melOscType = profile.intensity >= 3 ? 'sawtooth' :
                               profile.intensity >= 2 ? 'square' :
                               profile.intensity >= 1 ? 'triangle' : 'sine';

            while (nextNoteTime < audioCtx.currentTime + 0.25) {
                const melStep = bgmIndex % melody.length;
                const noteIdx = melody[melStep];

                if (noteIdx >= 0) {
                    const semitone = profile.scale[noteIdx % profile.scale.length];
                    const freq = semitoneToFreq(rootHz, semitone);

                    // --- メロディ (ADSR付き) ---
                    const osc = audioCtx.createOscillator();
                    const gn = audioCtx.createGain();
                    osc.type = melOscType;
                    osc.frequency.setValueAtTime(freq, nextNoteTime);
                    osc.connect(gn);
                    gn.connect(bgmDest);
                    if (reverbDelay) gn.connect(reverbDelay);
                    gn.gain.setValueAtTime(0.001, nextNoteTime);
                    gn.gain.linearRampToValueAtTime(dynGain, nextNoteTime + dynStep * 0.06);
                    gn.gain.setValueAtTime(dynGain * 0.75, nextNoteTime + noteLen * 0.5);
                    gn.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + noteLen);
                    osc.start(nextNoteTime);
                    osc.stop(nextNoteTime + noteLen + 0.05);

                    // --- ビブラート LFO (intensity 1以上) ---
                    if (profile.intensity >= 1 && noteLen > 0.12) {
                        const vOsc = audioCtx.createOscillator();
                        const vGn = audioCtx.createGain();
                        vOsc.type = 'sine';
                        vOsc.frequency.setValueAtTime(5.5, nextNoteTime);
                        vGn.gain.setValueAtTime(0, nextNoteTime);
                        vGn.gain.linearRampToValueAtTime(freq * 0.007, nextNoteTime + noteLen * 0.35);
                        vOsc.connect(vGn);
                        vGn.connect(osc.frequency);
                        vOsc.start(nextNoteTime);
                        vOsc.stop(nextNoteTime + noteLen + 0.05);
                    }

                    // --- デチューン2nd オシレーター (厚みを出す) ---
                    const osc1b = audioCtx.createOscillator();
                    const gn1b = audioCtx.createGain();
                    osc1b.type = melOscType;
                    osc1b.frequency.setValueAtTime(freq, nextNoteTime);
                    osc1b.detune.setValueAtTime(7, nextNoteTime); // わずかデチューン
                    osc1b.connect(gn1b);
                    gn1b.connect(bgmDest);
                    gn1b.gain.setValueAtTime(dynGain * 0.32, nextNoteTime + dynStep * 0.06);
                    gn1b.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + noteLen * 0.85);
                    osc1b.start(nextNoteTime);
                    osc1b.stop(nextNoteTime + noteLen);

                    // --- ハーモニー (3度: major/minor状況による) ---
                    const harmRatio = profile.intensity >= 2 ? 1.1892 : 1.2599;
                    const osc2 = audioCtx.createOscillator();
                    const gn2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(freq * harmRatio, nextNoteTime);
                    osc2.connect(gn2);
                    gn2.connect(bgmDest);
                    gn2.gain.setValueAtTime(0.001, nextNoteTime);
                    gn2.gain.linearRampToValueAtTime(dynGain * 0.24, nextNoteTime + dynStep * 0.1);
                    gn2.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + noteLen * 0.9);
                    osc2.start(nextNoteTime);
                    osc2.stop(nextNoteTime + noteLen);

                    // --- コードパッド (8拍ごと: 音楽的なコードボイシング) ---
                    if (bgmIndex % 8 === 0) {
                        const chordRatios = profile.intensity >= 2 ?
                            [1.0, 1.1892, 1.4983] :   // minor chord
                            [1.0, 1.2599, 1.4983];    // major chord
                        chordRatios.forEach((ratio, ci) => {
                            const cOsc = audioCtx.createOscillator();
                            const cGn = audioCtx.createGain();
                            cOsc.type = 'sine';
                            cOsc.frequency.setValueAtTime(freq * ratio * 0.5, nextNoteTime);
                            cOsc.detune.setValueAtTime(ci * 4 - 4, nextNoteTime); // 温かみのデチューン
                            cOsc.connect(cGn);
                            cGn.connect(bgmDest);
                            if (reverbDelay) cGn.connect(reverbDelay);
                            cGn.gain.setValueAtTime(0.001, nextNoteTime);
                            cGn.gain.linearRampToValueAtTime(dynGain * 0.30, nextNoteTime + dynStep * 1.2);
                            cGn.gain.setValueAtTime(dynGain * 0.25, nextNoteTime + dynStep * 5.0);
                            cGn.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + dynStep * 7.8);
                            cOsc.start(nextNoteTime);
                            cOsc.stop(nextNoteTime + dynStep * 8);
                        });
                    }
                }

                // --- ベースライン (intensity別波形) ---
                if (bgmIndex % 4 === 0) {
                    const bassStep = (bgmIndex / 4) % profile.bass.length;
                    const bassSemitone = profile.bass[bassStep];
                    const bassFreq = semitoneToFreq(rootHz * 0.25, bassSemitone);
                    if (bassFreq > 0) {
                        const bOsc = audioCtx.createOscillator();
                        const bGn = audioCtx.createGain();
                        bOsc.type = profile.intensity >= 2 ? 'sawtooth' : 'sine';
                        bOsc.frequency.setValueAtTime(bassFreq, nextNoteTime);
                        bOsc.connect(bGn);
                        bGn.connect(bgmDest);
                        bGn.gain.setValueAtTime(dynGain * 1.7, nextNoteTime);
                        bGn.gain.exponentialRampToValueAtTime(dynGain * 0.5, nextNoteTime + dynStep * 0.4);
                        bGn.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + dynStep * 3.6);
                        bOsc.start(nextNoteTime);
                        bOsc.stop(nextNoteTime + dynStep * 4);

                        // サブベース (intensity 2+)
                        if (profile.intensity >= 2) {
                            const sbOsc = audioCtx.createOscillator();
                            const sbGn = audioCtx.createGain();
                            sbOsc.type = 'sine';
                            sbOsc.frequency.setValueAtTime(bassFreq * 0.5, nextNoteTime);
                            sbOsc.connect(sbGn);
                            sbGn.connect(bgmDest);
                            sbGn.gain.setValueAtTime(dynGain * 0.9, nextNoteTime);
                            sbGn.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + dynStep * 2.0);
                            sbOsc.start(nextNoteTime);
                            sbOsc.stop(nextNoteTime + dynStep * 2.1);
                        }
                    }
                }

                // --- パーカッション (intensity 2以上で本格的なドラムパターン) ---
                if (profile.intensity >= 2) {
                    // キックドラム: 4拍ごと
                    if (bgmIndex % 4 === 0) {
                        const kOsc = audioCtx.createOscillator();
                        const kGn = audioCtx.createGain();
                        kOsc.type = 'sine';
                        kOsc.frequency.setValueAtTime(160, nextNoteTime);
                        kOsc.frequency.exponentialRampToValueAtTime(38, nextNoteTime + 0.13);
                        kOsc.connect(kGn);
                        kGn.connect(bgmDest);
                        kGn.gain.setValueAtTime(0.55 * bgmVolume, nextNoteTime);
                        kGn.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.16);
                        kOsc.start(nextNoteTime);
                        kOsc.stop(nextNoteTime + 0.17);
                    }
                    // スネア: 2拍目・4拍目 (intensity 3+)
                    if (profile.intensity >= 3 && bgmIndex % 4 === 2) {
                        for (let s = 0; s < 4; s++) {
                            const sOsc = audioCtx.createOscillator();
                            const sGn = audioCtx.createGain();
                            sOsc.type = 'triangle';
                            sOsc.frequency.setValueAtTime(150 + s * 110, nextNoteTime);
                            sOsc.connect(sGn);
                            sGn.connect(bgmDest);
                            sGn.gain.setValueAtTime(0.09 * bgmVolume, nextNoteTime);
                            sGn.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.07);
                            sOsc.start(nextNoteTime);
                            sOsc.stop(nextNoteTime + 0.08);
                        }
                    }
                    // ハイハット: 全ビート (intensity 3)
                    if (profile.intensity >= 3) {
                        const hOsc = audioCtx.createOscillator();
                        const hGn = audioCtx.createGain();
                        hOsc.type = 'square';
                        hOsc.frequency.setValueAtTime(9000 + (bgmIndex % 3) * 500, nextNoteTime);
                        hOsc.connect(hGn);
                        hGn.connect(bgmDest);
                        hGn.gain.setValueAtTime(0.028 * bgmVolume, nextNoteTime);
                        hGn.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.025);
                        hOsc.start(nextNoteTime);
                        hOsc.stop(nextNoteTime + 0.03);
                    }
                    // 8分音符タム (intensity 2のみ: 控えめな打楽器)
                    if (profile.intensity === 2 && bgmIndex % 2 === 0) {
                        const tOsc = audioCtx.createOscillator();
                        const tGn = audioCtx.createGain();
                        tOsc.type = 'sine';
                        tOsc.frequency.setValueAtTime(220, nextNoteTime);
                        tOsc.frequency.exponentialRampToValueAtTime(60, nextNoteTime + 0.06);
                        tOsc.connect(tGn);
                        tGn.connect(bgmDest);
                        tGn.gain.setValueAtTime(0.22 * bgmVolume, nextNoteTime);
                        tGn.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.07);
                        tOsc.start(nextNoteTime);
                        tOsc.stop(nextNoteTime + 0.08);
                    }
                } else {
                    // intensity 0-1: 控えめなアンビエントティック
                    if (bgmIndex % 8 === 0) {
                        const tOsc = audioCtx.createOscillator();
                        const tGn = audioCtx.createGain();
                        tOsc.type = 'sine';
                        tOsc.frequency.setValueAtTime(2800, nextNoteTime);
                        tOsc.connect(tGn);
                        tGn.connect(bgmDest);
                        tGn.gain.setValueAtTime(0.010 * bgmVolume, nextNoteTime);
                        tGn.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.04);
                        tOsc.start(nextNoteTime);
                        tOsc.stop(nextNoteTime + 0.05);
                    }
                }

                nextNoteTime += dynStep;
                bgmIndex++;
            }
        }

        // BGMをステージ切り替え時に再スタートする
        function restartBGMForStage() {
            if (!audioStarted || !audioCtx) return;
            // ステージ変化フラグをリセットして次の updateBgm() 呼び出しで再初期化させる
            bgmCurrentStage = -1;
            bgmIndex = 0;
            nextNoteTime = audioCtx.currentTime + 0.05;
        }

        // ==== updateBGMDynamic: ゲーム状態に応じてBGMを動的に変化させる ====
        function updateBGMDynamic() {
            if (!audioStarted || !audioCtx || !bgmMasterGain) return;
            const now = audioCtx.currentTime;

            // --- テンポ乗数 (ボス戦 > 低HP > 通常) ---
            let newSpeedMult;
            if (bossActive) {
                newSpeedMult = 1.4;
            } else if (player && player.hp < player.maxHp * 0.3) {
                newSpeedMult = 1.2;
            } else {
                newSpeedMult = 1.0;
            }
            bgmDynamicSpeedMult = newSpeedMult;

            // --- 音量乗数 (敵の数に応じて) ---
            const enemyCount = enemies ? enemies.filter(e => !e.isBoss).length : 0;
            let newVolMult;
            if (enemyCount === 0) {
                newVolMult = 0.6;
            } else if (enemyCount <= 3) {
                newVolMult = 1.0;
            } else {
                newVolMult = 1.15;
            }
            bgmDynamicVolMult = newVolMult;
            // マスターゲインをスムーズに更新 (0.8秒でターゲット値に到達)
            bgmMasterGain.gain.setTargetAtTime(newVolMult, now, 0.8);

            // --- ステージ別EQフィルター (ambient タイプに応じて) ---
            if (!bgmFilter) return;
            const sc = getActiveStageConfig(currentStageIndex);
            const ambient = sc.ambient;
            if (ambient === bgmLastAmbient) return; // 変化なければスキップ
            bgmLastAmbient = ambient;

            if (ambient === 'snow' || ambient === 'ice') {
                // 氷・雪: こもった音 (ローパスフィルター ~800Hz)
                bgmFilter.type = 'lowpass';
                bgmFilter.frequency.setTargetAtTime(800, now, 1.0);
                bgmFilter.Q.setTargetAtTime(0.7, now, 0.5);
            } else if (ambient === 'embers' || ambient === 'sandstorm') {
                // 炎・砂嵐: 荒い音 (ハイパスフィルター ~200Hz)
                bgmFilter.type = 'highpass';
                bgmFilter.frequency.setTargetAtTime(200, now, 1.0);
                bgmFilter.Q.setTargetAtTime(0.7, now, 0.5);
            } else if (ambient === 'cave' || ambient === 'dungeon' || ambient === 'drips') {
                // 洞窟・地下: リバーブ強化 (ディレイ量を増やし、allpass で広がりを付ける)
                bgmFilter.type = 'allpass';
                bgmFilter.frequency.setTargetAtTime(500, now, 0.5);
                if (reverbGain) reverbGain.gain.setTargetAtTime(0.38, now, 1.0);
            } else {
                // その他: フラットEQ (全帯域通過)
                bgmFilter.type = 'allpass';
                bgmFilter.frequency.setTargetAtTime(1000, now, 0.5);
                if (reverbGain) reverbGain.gain.setTargetAtTime(0.18, now, 1.0);
            }
        }

        // ==== 入力処理とゲームステータス ====

        const keys = {};
        let jpTimer = 0;

        // タッチ操作
        const touch = { up: false, down: false, left: false, right: false, attack: false, shield: false, weapon: false };
        let isTouchDevice = false;

        const VPAD = {
            // Dパッド中心座標
            cx: 80, cy: 510, radius: 60,
            // アクションボタン
            atkX: 680, atkY: 530, atkR: 32,
            shieldX: 620, shieldY: 490, shieldR: 24,
            weaponX: 680, weaponY: 470, weaponR: 18,
        };

        window.addEventListener('keydown', e => {
            keys[e.code] = true;

            if (narrativeTimer > 30) {
                narrativeTimer = 30;
                // Complete typewriter instantly on skip
                const tw = narrativeTypewriter;
                tw.charIndex = tw.totalLen || 0;
                return;
            }

            // 思索選択画面の操作
            if (meditationPending) {
                const opts = MEDITATION_DATA[meditationPendingStage] || MEDITATION_DATA[0];
                if (e.code === 'ArrowUp' || e.code === 'KeyW') {
                    meditationCursor = Math.max(0, meditationCursor - 1);
                } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
                    meditationCursor = Math.min(opts.length - 1, meditationCursor + 1);
                } else if (e.code === 'Enter' || e.code === 'Space') {
                    applyMeditation(opts[meditationCursor]);
                }
                e.preventDefault();
                return;
            }

            // ボス対話の操作
            if (bossDialogueActive) {
                const dlg = BOSS_DIALOGUES[currentStageIndex % BOSS_DIALOGUES.length];
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                    bossDialogueCursor = 0;
                } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                    bossDialogueCursor = 1;
                } else if (e.code === 'Enter' || e.code === 'Space') {
                    bossDialogueActive = false;
                    bossDialogueTimer = 0;
                    const correct = bossDialogueCursor === dlg.correct;
                    bossDebuffTarget = correct ? 'boss' : 'player';
                    bossDebuffTimer = 480; // 8秒
                    if (correct) { karma.tetsu++; achievementStats.dialogueWins++; }
                    centerMessage = correct ? '正解！ボスが動揺した！' : '不正解…ボスが激昂した！';
                    msgTimer = 120;
                    screenShake = correct ? 12 : 8;
                }
                e.preventDefault();
                return;
            }

            if (gameState === 'credits') {
                gameState = 'title';
                return;
            }

            // タイトル画面の操作
            if (gameState === 'title') {
                initAudio();
                if (e.code === 'ArrowUp' || e.code === 'KeyW') {
                    titleSelectedOption = Math.max(0, titleSelectedOption - 1);
                } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
                    titleSelectedOption = Math.min(2, titleSelectedOption + 1);
                } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                    if (titleSelectedOption !== 2) difficultyLevel = Math.max(0, difficultyLevel - 1);
                } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                    if (titleSelectedOption !== 2) difficultyLevel = Math.min(2, difficultyLevel + 1);
                } else if (e.code === 'Enter' || e.code === 'Space') {
                    if (titleSelectedOption === 0) {
                        // START: ステージ1から開始 (新規)
                        currentStageIndex = 0;
                        maxReachedStage = 0;
                        savedItemsForContinue = null;
                        hasLongSword = false; hasBow = false; hasShield = false; hasBoots = false;
                        playerLevel = 1; playerXP = 0; playerATK = 1.0;
                        player.maxHp = 5; player.hp = 5;
                        dailyChallengeActive = false;
                        currentDailyChallenge = null;
                        dailyChallengeXpMult = 1.0;
                        dailyChallengeNoWeapon = false;
                        dailyChallengeAtkUp = false;
                        dailyChallengeIronWill = false;
                        try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
                        mapData = STAGES[0];
                        hasStarted = true;
                        karma = { bu: 0, chi: 0, mamori: 0, tetsu: 0 };
                        ngPlusLevel = 0;
                        wisdomFragmentCount = 0; hiddenStageUnlocked = false; hiddenStageActive = false;
                        philItems = { orb_reason:0, orb_emotion:0, key_freedom:0, chain_duty:0 };
                        synthesisBonuses = { atkMult:1.0, hpBonus:0, spdBonus:0.0, xpBonus:0.0, arrowPower:1.0 };
                        philSynthBonuses = { aoeChance:0, dmgXP:0, atkBonus:0, hpBonus:0, dmgReduce:0, noKnockback:false, spdBonus:0, xpBonus:0 };
                        gameState = 'playing';
                        centerMessage = "STAGE 1";
                        msgTimer = 120;
                        startNarrative(0);
                        tutorialStep = 1;
                    } else if (titleSelectedOption === 1) {
                        // CONTINUE: セーブデータを読み込んでステージ選択画面へ
                        dailyChallengeActive = false;
                        currentDailyChallenge = null;

        function activateSkill(id) {
            const sk = skills[id];
            if (!sk.unlocked || sk.cooldown > 0 || sk.active) return;
            sk.active = true;
            sk.duration = SKILL_DEFS[id].maxDur;
            if (id === 'barrier') sk.shieldHit = false;
            playSoundEffect('shield');

        function updateSkills() {
            for (const [id, sk] of Object.entries(skills)) {
                if (sk.active) {
                    sk.duration--;
                    if (id === 'barrier' && sk.shieldHit) sk.duration = 0; // 1撃受けたら即終了
                    if (sk.duration <= 0) {
                        sk.active = false;
                        sk.cooldown = SKILL_DEFS[id].maxCd;
                    }
                } else if (sk.cooldown > 0) {
                    sk.cooldown--;

            }

        // ===== 哲学の道 ヘルパー関数 =====
        function getDominantPath() {
            const counts = { bu: 0, chi: 0, tetsu: 0 };
            for (const c of meditationChoices) {
                if (c.choiceIndex === 0) counts.bu++;
                else if (c.choiceIndex === 1) counts.chi++;
                else counts.tetsu++;
            }
            if (counts.bu >= counts.chi && counts.bu >= counts.tetsu) return 'bu';
            if (counts.chi >= counts.tetsu) return 'chi';
            return 'tetsu';
        }

        function getActiveStageConfig(si) {
            const base = STAGE_CONFIG[si] || STAGE_CONFIG[0];
            if (meditationChoices.length === 0) return base;
            const path = getDominantPath();
            const pathCfgs = path === 'bu' ? PATH_CONFIG_BU : path === 'chi' ? PATH_CONFIG_CHI : PATH_CONFIG_TETSU;
            const override = pathCfgs[si % pathCfgs.length];
            return {
                ...base,
                bg: override.bg,
                tint: override.tint,
                speedMult: (base.speedMult + override.speedMult) / 2,
                windX: override.windX,
                windY: override.windY,
                dark: override.dark || base.dark,
                darkR: override.dark ? override.darkR : base.darkR,
                ambient: override.ambient,
                bossHpMult: override.bossHpMult,
                bossSpeedMult: override.bossSpeedMult,
                bossLabel: override.bossLabel,
            };
        }

            try {

        function isTodayChallengeCompleted() {
            const rec = getDailyChallengeRecord();
            if (!rec) return false;
            const today = new Date();
            const dateStr = today.getFullYear() + '-' +
                String(today.getMonth() + 1).padStart(2, '0') + '-' +
                String(today.getDate()).padStart(2, '0');
            return rec.date === dateStr && rec.completed;
        }

            const dateStr = today.getFullYear() + '-' +

                String(today.getDate()).padStart(2, '0');
            try {
                localStorage.setItem(DAILY_CHALLENGE_KEY, JSON.stringify({ date: dateStr, completed: true, score: score }));

                    break;
                case 'double_xp':
                    dailyChallengeXpMult = challenge.param;
                    break;

                    dailyChallengeNoWeapon = true;

                    hasBow = false;

                    dailyChallengeIronWill = true;

                meditationAtkBonus += choice.val;
                playerATK = (1.0 + (playerLevel - 1) * 0.12) * (1.0 + meditationAtkBonus) * synthesisBonuses.atkMult * (1.0 + philSynthBonuses.atkBonus);
            } else if (choice.effect === 'hp') {
                meditationHpBonus += choice.val;
                player.maxHp += choice.val;
                player.hp = Math.min(player.maxHp, player.hp + choice.val);

                meditationXpBonus += choice.val;

                meditationSpdBonus += choice.val;

        function updateAmbient() {
            for (let i = ambientParticles.length - 1; i >= 0; i--) {
                const p = ambientParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                if (p.type === 'fireflies' || p.type === 'wisps') {
                    p.vx += (Math.random()-0.5)*0.15;
                    p.vy += (Math.random()-0.5)*0.15;
                    p.vx *= 0.97; p.vy *= 0.97;
                }
                if (p.type === 'leaves') p.rot = (p.rot || 0) + 0.05;
                p.life--;
                if (p.life <= 0 || p.x < -80 || p.x > VIEW_W+80 || p.y < -80 || p.y > VIEW_H+80) {
                    ambientParticles.splice(i, 1);
                }
            }
            if (lightningFlash > 0) lightningFlash--;
        }

        function drawAmbient() {
            if (lightningFlash > 0) {
                ctx.save();
                ctx.fillStyle = `rgba(200,220,255,${lightningFlash * 0.06})`;
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.restore();
            }
            for (const p of ambientParticles) {
                const alpha = p.type === 'fireflies' ? 0.5 + 0.5*Math.sin(Date.now()/400+p.x) :
                              p.life / p.maxLife;
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                ctx.fillStyle = p.color;
                if (p.type === 'rain') {
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = p.size;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + p.vx*3, p.y + p.vy*3);
                    ctx.stroke();
                } else if (p.type === 'leaves') {
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot || 0);
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill();
                    if (p.type === 'fireflies' || p.type === 'wisps') {
                        ctx.globalAlpha *= 0.3;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size*2.5, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }
        }

        function drawDarknessOverlay(camX, camY) {
            const sc = getActiveStageConfig(currentStageIndex);
            const isAllDark = dailyChallengeActive && currentDailyChallenge && currentDailyChallenge.rule === 'all_dark';
            if (!sc.dark && !isAllDark) return;
            const px = player.x - camX + SPRITE_SIZE / 2;
            const py = player.y - camY + SPRITE_SIZE / 2;
            const r = isAllDark && !sc.dark ? currentDailyChallenge.param : sc.darkR;
            const grad = ctx.createRadialGradient(px, py, r * 0.2, px, py, r);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(0.6, 'rgba(0,0,0,0.4)');
            grad.addColorStop(1, 'rgba(0,0,0,0.97)');
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.97)';
            ctx.fillRect(0, 0, VIEW_W, VIEW_H);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(px, py, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function spawnParticles(x, y, color, count, speed) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const spd = speed * (0.5 + Math.random());
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd,
                    life: 20 + Math.floor(Math.random() * 20),
                    maxLife: 40,
                    color,
                    size: 2 + Math.random() * 3,
                    glow: false,
                });
            }
        }

        function spawnGlowParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
                const speed = 1.5 + Math.random() * 2.5;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    life: 40 + Math.floor(Math.random() * 30),
                    maxLife: 70,
                    color,
                    size: 3 + Math.random() * 3,
                    glow: true,
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.88;
                p.vy *= 0.88;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles(camX, camY) {
            for (const p of particles) {
                const alpha = p.life / p.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                if (p.glow) {
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.color;
                }
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x - camX, p.y - camY, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function getStageBoss(stageIdx) {
            const tier = Math.floor(stageIdx / 5);
            const hpTable    = [35, 55, 80, 110, 150];
            const speedTable = [1.2, 1.4, 1.6, 1.8, 2.0];
            const spriteTable = [BOSS_SPRITE, DRAGON_WHELP_SPRITE, TROLL_SPRITE, BOSS_SPRITE, BOSS_SPRITE];
            let hp = Math.ceil(hpTable[Math.min(tier, 4)] * NG_MULT[ngPlusLevel]);
            let speed = speedTable[Math.min(tier, 4)];
            const stageCfg = getActiveStageConfig(stageIdx);
            if (stageCfg.bossHpMult) {
                hp = Math.ceil(hp * stageCfg.bossHpMult);
            }
            if (stageCfg.bossSpeedMult) {
                speed = speed * stageCfg.bossSpeedMult;
            }
            return {
                x: WORLD_W * 0.75, y: WORLD_H * 0.25,
                hp, maxHp: hp,
                speed,
                sprite: spriteTable[Math.min(tier, 4)],
                type: 'boss', fireInterval: 45, fireTimer: 0, hitTimer: 0, isBoss: true,
                bossLabel: stageCfg.bossLabel || null
            };
        }

                if (isWalkable(x, y)) return { x, y };
            }
            return { x: WORLD_W * 0.75, y: WORLD_H * 0.75 };
        }
