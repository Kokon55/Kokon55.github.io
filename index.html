        function stageEnemyPool(si) {
            // ステージ番号に応じて出現する敵の種類プールを返す
            if (si <= 2)  return [0,1,2];
            if (si <= 4)  return [0,1,2,3,4,7];
            if (si <= 6)  return [1,2,3,4,5,7,8];
            if (si <= 9)  return [1,3,4,5,7,8,9];
            if (si <= 12) return [1,4,5,7,9,10,11];
            if (si <= 15) return [4,5,7,9,10,11,12];
            return             [5,7,9,10,11,12,13];
        }

        function spawnEnemies() {
            if (bossActive) return; // ボス戦中は通常敵スポーン停止

            const fastSpawnMult = (dailyChallengeActive && currentDailyChallenge && currentDailyChallenge.rule === 'fast_spawn') ? currentDailyChallenge.param : 1;
            const maxOnScreen = Math.ceil((MAX_ENEMIES_PER_STAGE[currentStageIndex] || 4) * DIFF_SPAWN_MULT[difficultyLevel] * fastSpawnMult);
            const toSpawn = maxOnScreen - enemies.filter(e => !e.isBoss).length;

            for (let i = 0; i < toSpawn; i++) {
                let ex, ey, dist, reachable;
                let attempts = 0;
                do {
                    ex = 40 + Math.random() * (WORLD_W - SPRITE_SIZE - 80);
                    ey = 40 + Math.random() * (WORLD_H - SPRITE_SIZE - 80);
                    const dx = ex - player.x;
                    const dy = ey - player.y;
                    dist = Math.sqrt(dx * dx + dy * dy);
                    reachable = isWalkable(ex, ey) && isReachable(player.x, player.y, ex, ey);
                    attempts++;
                } while ((!reachable || dist < 120) && attempts < 1000);

                if (!reachable) { ex = player.x + 120; ey = player.y; }

                const pool = stageEnemyPool(currentStageIndex);
                const typeIdx = pool[Math.floor(Math.random() * pool.length)];
                const typeDef = ENEMY_TYPES[typeIdx];
                enemies.push({
                    x: ex, y: ey,
                    hp: Math.ceil(typeDef.hp * DIFF_ENEMY_MULT[difficultyLevel] * NG_MULT[ngPlusLevel]),
                    maxHp: Math.ceil(typeDef.hp * DIFF_ENEMY_MULT[difficultyLevel] * NG_MULT[ngPlusLevel]),
                    speed: typeDef.speed,
                    sprite: typeDef.sprite,
                    type: typeDef.type,
                    fireInterval: typeDef.fireInterval || 0,
                    fireTimer: 0,
                    hitTimer: 0
                });
            }
        }

        // 初期ロード時のプレイヤーを安全な位置に配置
        do {
            player.x = 40 + Math.random() * (WORLD_W - SPRITE_SIZE - 80);
            player.y = 40 + Math.random() * (WORLD_H - SPRITE_SIZE - 80);
        } while (!isWalkable(player.x, player.y));
        keyItemPos = findKeyItemPos();

        spawnEnemies();


        function playerAttack() {
            if (!player.isAttacking && !isGameOver && !meditationPending) {
                // コンボ進行
                if (comboTimer > 0 && comboStep < 3) {
                    comboStep++;
                } else {
                    comboStep = 1;
                }
                comboTimer = COMBO_WINDOW;
                player.isAttacking = true;
                player.attackTimer = comboStep === 3 ? 20 : 15;
                if (currentStageIndex === 0 && tutorialStep === 2) tutorialStep = 3;
                if (currentWeapon === 'sword') {
                    playSoundEffect('attack');
                } else if (currentWeapon === 'bow' && hasBow) {
                    playSoundEffect('attack');
                    let arrowDx = 0, arrowDy = 0;
                    if (Math.abs(player.dirX) >= Math.abs(player.dirY)) {
                        arrowDx = player.dirX >= 0 ? 1 : -1; arrowDy = 0;
                    } else {
                        arrowDx = 0; arrowDy = player.dirY >= 0 ? 1 : -1;
                    }
                    projectiles.push({
                        x: player.x + SPRITE_SIZE / 2 - 12,
                        y: player.y + SPRITE_SIZE / 2 - 12,
                        dx: arrowDx, dy: arrowDy, speed: 8,
                        sprite: ARROW_SPRITE, timer: 50, isPlayerProjectile: true
                    });
                }
            }
        }

        function update() {
            if (jpTimer > 0) jpTimer--;

            let padUp = false, padDown = false, padLeft = false, padRight = false;
            let padA = false, padB = false, padStart = false, padShield = false;

            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let gp of gamepads) {
                if (gp) {
                    const threshold = 0.5;
                    padUp = padUp || gp.axes[1] < -threshold || gp.buttons[12]?.pressed;
                    padDown = padDown || gp.axes[1] > threshold || gp.buttons[13]?.pressed;
                    padLeft = padLeft || gp.axes[0] < -threshold || gp.buttons[14]?.pressed;
                    padRight = padRight || gp.axes[0] > threshold || gp.buttons[15]?.pressed;

                    padA = padA || gp.buttons[0]?.pressed || gp.buttons[2]?.pressed;
                    padStart = padStart || gp.buttons[9]?.pressed;
                    padB = padB || gp.buttons[1]?.pressed;
                    padShield = padShield || gp.buttons[5]?.pressed;
                }
            }

            updateBgm(); // タイトル/ステージ選択中もBGMを流す

            // 動的BGMシステム: 60フレームごとにゲーム状態を評価
            bgmDynamicFrame++;
            if (bgmDynamicFrame >= 60) {
                bgmDynamicFrame = 0;
                updateBGMDynamic();
            }

            // ゲームパッド: タイトル画面操作
            if (gameState === 'title') {
                if (jpTimer === 0) {
                    if (padUp) {
                        titleSelectedOption = Math.max(0, titleSelectedOption - 1);
                        jpTimer = 15;
                    } else if (padDown) {
                        titleSelectedOption = Math.min(2, titleSelectedOption + 1);
                        jpTimer = 15;
                    }
                    if (padLeft && titleSelectedOption !== 2) {
                        difficultyLevel = Math.max(0, difficultyLevel - 1);
                        jpTimer = 15;
                    }
                    if (padRight && titleSelectedOption !== 2) {
                        difficultyLevel = Math.min(2, difficultyLevel + 1);
                        jpTimer = 15;
                    }
                    if (padA || padStart) {
                        initAudio();
                        if (titleSelectedOption === 0) {
                            currentStageIndex = 0;
                            maxReachedStage = 0;
                            savedItemsForContinue = null;
                            hasLongSword = false; hasBow = false; hasShield = false; hasBoots = false;
                            playerLevel = 1; playerXP = 0; playerATK = 1.0;
                            player.maxHp = 5; player.hp = 5;
                            dailyChallengeActive = false; currentDailyChallenge = null;
                            dailyChallengeXpMult = 1.0; dailyChallengeNoWeapon = false;
                            dailyChallengeAtkUp = false; dailyChallengeIronWill = false;
                            try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
                            mapData = STAGES[0];
                            hasStarted = true;
                            karma = { bu: 0, chi: 0, mamori: 0, tetsu: 0 };
                            gameState = 'playing';
                            centerMessage = "STAGE 1";
                            msgTimer = 120;
                            startNarrative(0);
                        } else if (titleSelectedOption === 1) {
                            dailyChallengeActive = false; currentDailyChallenge = null;
                            dailyChallengeXpMult = 1.0; dailyChallengeNoWeapon = false;
                            dailyChallengeAtkUp = false; dailyChallengeIronWill = false;
                            const loaded = loadGame();
                            if (!loaded) {
                                currentStageIndex = 0;
                                mapData = STAGES[0];
                                hasStarted = true;
                                gameState = 'playing';
                                centerMessage = "STAGE 1";
                                msgTimer = 120;
                                startNarrative(0);
                            } else {
                                stageSelectCursor = currentStageIndex;
                                gameState = 'stageSelect';
                            }
                        } else {
                            // 今日のチャレンジ
                            currentStageIndex = 0; maxReachedStage = 0; savedItemsForContinue = null;
                            hasLongSword = false; hasBow = false; hasShield = false; hasBoots = false;
                            playerLevel = 1; playerXP = 0; playerATK = 1.0;
                            player.maxHp = 5; player.hp = 5;
                            karma = { bu: 0, chi: 0, mamori: 0, tetsu: 0 };
                            try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
                            mapData = STAGES[0];
                            dailyChallengeActive = true;
                            const todayChallenge = getTodayChallenge();
                            applyDailyChallenge(todayChallenge);
                            hasStarted = true;
                            gameState = 'playing';
                            centerMessage = todayChallenge.name;
                            msgTimer = 150;
                            startNarrative(0);
                            tutorialStep = 0;
                        }
                        jpTimer = 30;
                    }
                }
                return;
            }

            // ゲームパッド: ステージ選択操作
            if (gameState === 'stageSelect') {
                if (jpTimer === 0) {
                    if (padUp) {
                        stageSelectCursor = Math.max(0, stageSelectCursor - 1);
                        jpTimer = 15;
                    } else if (padDown) {
                        stageSelectCursor = Math.min(maxReachedStage, stageSelectCursor + 1);
                        jpTimer = 15;
                    } else if (padA || padStart) {
                        isBgCached = false;
                        currentStageIndex = stageSelectCursor;
                        mapData = STAGES[currentStageIndex];
                        enemiesDefeatedInStage = 0;
                        itemBoxSpawnedThisStage = false;
                        keyItemCollected = false;
                        bossActive = false;
                        player.hp = player.maxHp;
                        enemies = [];
                        projectiles = [];
                        items = [];
                        sageNPC = null;
                        if (savedItemsForContinue) {
                            hasLongSword = savedItemsForContinue.hasLongSword;
                            hasBow = savedItemsForContinue.hasBow;
                            hasShield = savedItemsForContinue.hasShield;
                            hasBoots = savedItemsForContinue.hasBoots;
                            if (savedItemsForContinue.philItems) { Object.assign(philItems, savedItemsForContinue.philItems); }
                            if (savedItemsForContinue.synthesisBonuses) { Object.assign(synthesisBonuses, savedItemsForContinue.synthesisBonuses); }
                            if (savedItemsForContinue.philSynthBonuses) { Object.assign(philSynthBonuses, savedItemsForContinue.philSynthBonuses); }
                            if (savedItemsForContinue.meditationAtkBonus !== undefined) meditationAtkBonus = savedItemsForContinue.meditationAtkBonus;
                            if (savedItemsForContinue.meditationHpBonus !== undefined) meditationHpBonus = savedItemsForContinue.meditationHpBonus;
                            if (savedItemsForContinue.meditationXpBonus !== undefined) meditationXpBonus = savedItemsForContinue.meditationXpBonus;
                            if (savedItemsForContinue.meditationSpdBonus !== undefined) meditationSpdBonus = savedItemsForContinue.meditationSpdBonus;
                        }
                        do {
                            player.x = 40 + Math.random() * (WORLD_W - SPRITE_SIZE - 80);
                            player.y = 40 + Math.random() * (WORLD_H - SPRITE_SIZE - 80);
                        } while (!isWalkable(player.x, player.y));
                        keyItemPos = findKeyItemPos();
                        spawnEnemies();
                        hasStarted = true;
                        gameState = 'playing';
                        centerMessage = `STAGE ${currentStageIndex + 1}`;
                        msgTimer = 120;
                        startNarrative(currentStageIndex);
                        jpTimer = 30;
                    } else if (padB) {
                        gameState = 'title';
                        jpTimer = 15;
                    }
                }
                return;
            }

            if (padA || padStart) {
                if (!hasStarted) {
                    hasStarted = true;
                    initAudio();
                }
            }

            if (padA) {
                playerAttack();
                initAudio();
            }

            if (padStart && jpTimer === 0) { // Start button
                isPaused = !isPaused;
                if (!isPaused) popupMessage = "";
                jpTimer = 30;
            }

            if (padB && hasBow && jpTimer === 0) { // B button
                currentWeapon = currentWeapon === 'sword' ? 'bow' : 'sword';
                jpTimer = 20;
            }

            if (hasShield) {
                isShielding = (keys['KeyR'] || padShield || touch.shield) && !player.isAttacking;
                if (isShielding && currentStageIndex === 0 && tutorialStep === 3) tutorialStep = 4;
            }

            if (!hasStarted) return;
            if (narrativeTimer > 0) { narrativeTimer--; return; }
            if (meditationPending) return;
            if (synthesisMenuOpen) return;
            if (philSynthMenuOpen) return;
            if (bossDialogueActive) {
                // 対話中もタイマーだけ進める
                if (bossDialogueTimer > 0) {
                    bossDialogueTimer--;
                    if (bossDialogueTimer === 0) {
                        // タイムアウト→不正解扱い
                        bossDialogueActive = false;
                        bossDebuffTarget = 'player';
                        bossDebuffTimer = 480;
                        centerMessage = '時間切れ…ボスが激昂した！';
                        msgTimer = 120;
                    }
                }
                return;
            }
            if (isPaused) return; // ポーズ中は処理を止める
            achievementStats.maxScore = Math.max(achievementStats.maxScore, pScore);
            if (isGameOver) {
                if (gameOverTimer > 0) {
                    gameOverTimer--;
                    if (deathSceneTimer > 0) deathSceneTimer--;
                } else {
                    // タイトル画面へ自動遷移
                    if (dailyChallengeActive && dailyChallengeIronWill) {
                        // 鉄の意志: デイリーチャレンジ失敗
                        dailyChallengeActive = false;
                    }
                    isGameOver = false;
                    deathScenePhase = 0;
                    deathSceneTimer = 0;
                    gameState = 'title';
                }
                return;
            }
            // 進行中ならスキップ
            if (msgTimer > 0 && currentStageIndex === 8 && enemiesDefeatedInStage >= 1) {
                // ボス撃破後はすぐに復帰させず、ゲームクリアメッセージを出し続ける
            } else if (msgTimer > 0) {
                msgTimer--;
                return;
            }

            if (player.invincibleTimer > 0) player.invincibleTimer--;

            // -- プレイヤー移動 --

            let dx = 0;
            let dy = 0;
            if (keys['ArrowUp'] || keys['KeyW'] || padUp || touch.up) dy -= 1;
            if (keys['ArrowDown'] || keys['KeyS'] || padDown || touch.down) dy += 1;
            if (keys['ArrowLeft'] || keys['KeyA'] || padLeft || touch.left) dx -= 1;
            if (keys['ArrowRight'] || keys['KeyD'] || padRight || touch.right) dx += 1;

            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                dx /= len;
                dy /= len;

                const sc = getActiveStageConfig(currentStageIndex);
                const effSpeed = player.speed * sc.speedMult;
                const nextX = player.x + dx * effSpeed;
                const nextY = player.y + dy * effSpeed;
                if (isWalkable(nextX, player.y)) {
                    player.x = nextX;
                }
                if (isWalkable(player.x, nextY)) {
                    player.y = nextY;
                }
                // 風の効果
                const _allWindStr = (dailyChallengeActive && currentDailyChallenge && currentDailyChallenge.rule === 'all_wind') ? currentDailyChallenge.param : 0;
                const _effWindX = sc.windX !== 0 ? sc.windX : _allWindStr;
                const _effWindY = sc.windY !== 0 ? sc.windY : 0;
                if (_effWindX !== 0) {
                    const wx = player.x + _effWindX;
                    if (isWalkable(wx, player.y)) player.x = wx;
                }
                if (_effWindY !== 0) {
                    const wy = player.y + _effWindY;
                    if (isWalkable(player.x, wy)) player.y = wy;
                }

                // 向きの更新
                if (Math.abs(dx) > Math.abs(dy)) {
                    player.dirX = dx > 0 ? 1 : -1;
                    player.dirY = 0;
                } else {
                    player.dirX = 0;
                    player.dirY = dy > 0 ? 1 : -1;
                }

                // 歩行アニメ
                player.walkTimer++;
                if (player.walkTimer >= 10) { player.walkTimer = 0; player.walkFrame ^= 1; }
                if (currentStageIndex === 0 && tutorialStep === 1) tutorialStep = 2;
            } else {
                player.walkFrame = 0;
                player.walkTimer = 0;
                // 風の効果（立ち止まっている時も適用）
                const _scWind = getActiveStageConfig(currentStageIndex);
                const _allWindStr2 = (dailyChallengeActive && currentDailyChallenge && currentDailyChallenge.rule === 'all_wind') ? currentDailyChallenge.param : 0;
                const _effWindX2 = _scWind.windX !== 0 ? _scWind.windX : _allWindStr2;
                const _effWindY2 = _scWind.windY !== 0 ? _scWind.windY : 0;
                if (_effWindX2 !== 0) {
                    const wx = player.x + _effWindX2;
                    if (isWalkable(wx, player.y)) player.x = wx;
                }
                if (_effWindY2 !== 0) {
                    const wy = player.y + _effWindY2;
                    if (isWalkable(player.x, wy)) player.y = wy;
                }
            }

            // 境界チェック（ワールド座標でクランプ）
            if (player.x < 0) player.x = 0;
            else if (player.x > WORLD_W - SPRITE_SIZE) player.x = WORLD_W - SPRITE_SIZE;

            if (player.y < 0) player.y = 0;
            else if (player.y > WORLD_H - SPRITE_SIZE) player.y = WORLD_H - SPRITE_SIZE;

            // カメラ更新
            camX = Math.max(0, Math.min(player.x + SPRITE_SIZE / 2 - VIEW_W / 2, WORLD_W - VIEW_W));
            camY = Math.max(0, Math.min(player.y + SPRITE_SIZE / 2 - VIEW_H / 2, WORLD_H - VIEW_H));

            // 哲学の鍵アイテム取得チェック
            if (keyItemPos && !keyItemCollected && !bossActive) {
                if (Math.hypot(player.x + SPRITE_SIZE/2 - keyItemPos.x, player.y + SPRITE_SIZE/2 - keyItemPos.y) < SPRITE_SIZE * 1.2) {
                    keyItemCollected = true;
                    if (currentStageIndex === 0) tutorialStep = 5;
                    bossActive = true;
                    spawnGlowParticles(player.x + SPRITE_SIZE/2, player.y + SPRITE_SIZE/2, '#FFD700', 14);
                    keyItemPos = null;
                    const boss = getStageBoss(currentStageIndex);
                    enemies.push(boss);
                    bossDialogueTriggered = false;
                    bossDebuffTarget = null;
                    bossDebuffTimer = 0;
                    screenShake = 20;
                    spawnParticles(boss.x, boss.y, '#FF0000', 30, 8);
                    spawnParticles(boss.x, boss.y, '#FF8800', 20, 6);
                    centerMessage = "ボス出現！";
                    msgTimer = 90;
                    playSoundEffect('stageclear');
                }
            }

            // アイテムの拾得チェック
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                if (Math.hypot(player.x - item.x, player.y - item.y) < SPRITE_SIZE) {
                    if (item.type === 'wisdom') {
                        gainXP(30);
                        wisdomFragmentCount++;
                        if (wisdomFragmentCount >= 5 && !hiddenStageUnlocked) {
                            hiddenStageUnlocked = true;
                            centerMessage = '叡智の欠片を5個集めた！\n「真理の間」への扉が開いた...';
                            msgTimer = 180;
                        } else {
                            centerMessage = '知恵の欠片を拾った';
                            msgTimer = 90;
                        }
                        playSoundEffect('stageclear');
                        achievementStats.meditationCount++;
                        checkAchievements();
                        items.splice(i, 1);
                        continue;
                    }
                    // 哲学アイテム 拾得
                    if (item.type === 'orb_reason' || item.type === 'orb_emotion' ||
                        item.type === 'key_freedom' || item.type === 'chain_duty') {
                        philItems[item.type]++;
                        const philNames = { orb_reason: '理性の宝珠', orb_emotion: '感情の宝珠', key_freedom: '自由の鍵', chain_duty: '責任の鎖' };
                        centerMessage = `${philNames[item.type]}を拾った！[V]で合成`;
                        msgTimer = 120;
                        playSoundEffect('stageclear');
                        items.splice(i, 1);
                        continue;
                    }
                    if (item.isBox) {
                        playSoundEffect('item');
                        // ステージ1（index=0）から盾を入手可能。ステージ1または3では必ずシールドを付与
                        if ((currentStageIndex === 0 || currentStageIndex === 2) && !hasShield) {
                            hasShield = true;
                            updateHTMLUI();
                        } else {
                            const r = Math.random();
                            if (!hasLongSword && r < 0.25 && !dailyChallengeNoWeapon) {
                                hasLongSword = true;
                                updateHTMLUI();
                            } else if (!hasBow && r < 0.5 && !dailyChallengeNoWeapon) {
                                hasBow = true;
                                updateHTMLUI();
                            } else if (!hasShield && r < 0.75) {
                                hasShield = true;
                                updateHTMLUI();
                            } else if (!hasBoots) {
                                hasBoots = true;
                                player.speed = 3.6;
                                updateHTMLUI();
                            } else {
                                if (!dailyChallengeAtkUp) player.hp = Math.min(player.maxHp, player.hp + 1);
                            }
                        }
                    } else {
                        if (!dailyChallengeAtkUp) player.hp = Math.min(player.maxHp, player.hp + 1);
                        playSoundEffect('item');
                    }
                    items.splice(i, 1);
                }
            }

            // ==== 賢者NPC インタラクション ====
            if (sageNPC && sageNPC.stage === currentStageIndex && !sageNPC.interacted) {
                if (Math.hypot(player.x + SPRITE_SIZE/2 - (sageNPC.x + SPRITE_SIZE/2),
                               player.y + SPRITE_SIZE/2 - (sageNPC.y + SPRITE_SIZE/2)) < 60) {
                    sageNPC.interacted = true;
                    let wisdomMsg = sageNPC.wisdom;
                    if (currentStageIndex === 8) {
                        wisdomMsg += '\n「隠しステージへの道は...闇の中に」';
                    }
                    centerMessage = wisdomMsg;
                    msgTimer = 180;
                    gainXP(50);
                    playSoundEffect('stageclear');
                    spawnParticles(sageNPC.x + SPRITE_SIZE/2, sageNPC.y + SPRITE_SIZE/2, '#AADDFF', 20, 4);
                }
            }

            // (アイテム描画はdraw関数へ移動しました)

            // 弾の更新
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.dx * p.speed;
                p.y += p.dy * p.speed;
                p.timer--;

                if (p.timer <= 0) {
                    projectiles.splice(i, 1);
                    continue;
                }

                // プレイヤーの弾丸（弓矢）が敵に当たる判定
                if (p.isPlayerProjectile) {
                    let hit = false;
                    for (let j = 0; j < enemies.length; j++) {
                        let enemy = enemies[j];
                        if (enemy.hp <= 0 || enemy.hitTimer > 0) continue;
                        const ecx = enemy.x + SPRITE_SIZE / 2;
                        const ecy = enemy.y + SPRITE_SIZE / 2;
                        const er = SPRITE_SIZE * 0.4;
                        if (Math.hypot(ecx - (p.x + 12), ecy - (p.y + 12)) < er + 10) {
                            // Hit enemy!
                            const bossBoostP = (enemy.isBoss && bossDebuffTarget === 'boss' && bossDebuffTimer > 0) ? 2.0 : 1.0;
                            enemy.hp -= playerATK * 0.66 * bossBoostP * synthesisBonuses.arrowPower * (skills.rengeki.active ? 2.0 : 1.0);
                            enemy.hitTimer = 10;
                            enemy.x += p.dx * 15; // Knockback
                            enemy.y += p.dy * 15;
                            spawnParticles(enemy.x + SPRITE_SIZE/2, enemy.y + SPRITE_SIZE/2, '#8844FF', 6, 3);
                            screenShake = Math.max(screenShake, 4);
                            playSoundEffect('hit');
                            // ボス50%で哲学対話発動
                            if (enemy.isBoss && !bossDialogueTriggered && enemy.hp <= enemy.maxHp * 0.5 && enemy.hp > 0) {
                                bossDialogueTriggered = true;
                                bossDialogueActive = true;
                                bossDialogueCursor = 0;
                                bossDialogueTimer = 600;
                            }
                            if (enemy.hp <= 0) {
                                playSoundEffect('kill');
                                pScore += enemy.maxHp * (enemy.isBoss ? 5 : 1);
                                gainXP(Math.floor(enemy.maxHp * (enemy.isBoss ? 8 : 4) * DIFF_XP_MULT[difficultyLevel]));
                                enemiesDefeatedInStage++;
                                if (Math.random() < 0.18) {
                                    items.push({ x: enemy.x, y: enemy.y, sprite: HEART_SPRITE });
                                }
                                if (enemiesDefeatedInStage === 8 && !itemBoxSpawnedThisStage) {
                                    items.push({ x: WORLD_W / 2, y: WORLD_H / 2, sprite: ITEM_BOX_SPRITE, isBox: true });
                                    itemBoxSpawnedThisStage = true;
                                }

                                karma.chi++;
                                const wasBoss = enemy.isBoss;
                                spawnParticles(enemy.x + SPRITE_SIZE/2, enemy.y + SPRITE_SIZE/2, '#FFD700', 12, 5);
                                if (wasBoss) spawnGlowParticles(enemy.x + SPRITE_SIZE/2, enemy.y + SPRITE_SIZE/2, '#FFD700', 18);
                                screenShake = Math.max(screenShake, 8);
                                enemies.splice(j, 1);

                                if (wasBoss && !isStageAdvancing) {
                                    bossActive = false;
                                    achievementStats.bossKills++;
                                    checkAchievements();
                                    meditationPendingStage = currentStageIndex;
                                    meditationPending = true;
                                    meditationCursor = 0;
                                    centerMessage = BOSS_DEFEAT_STORIES[currentStageIndex] || BOSS_DEFEAT_STORIES[0];
                                    msgTimer = 210;
                                } else if (!wasBoss && !isStageAdvancing) {
                                    spawnEnemies();
                                }
                            }
                            hit = true;
                            break;
                        }
                    }
                    if (hit) {
                        projectiles.splice(i, 1);
                        continue;
                    }
                }

                // プレイヤーとの当たり判定 (弓矢は自爆しないように isPlayerProjectile を除外)
                if (!p.isPlayerProjectile) {
                    const pcx = player.x + SPRITE_SIZE / 2;
                    const pcy = player.y + SPRITE_SIZE / 2;

                    // 盾による防御
                    if (isShielding) {
                        const sx = pcx + player.dirX * 20;
                        const sy = pcy + player.dirY * 20;
                        if (Math.hypot(sx - (p.x + 12), sy - (p.y + 12)) < 30) {
                            playSoundEffect('attack'); // 弾いた音（剣の音を流用）
                            karma.mamori++;
                            projectiles.splice(i, 1);
                            continue;
                        }
                    }

                    const pr = SPRITE_SIZE * 0.4;
                    if (player.invincibleTimer === 0 && Math.hypot(pcx - (p.x + 12), pcy - (p.y + 12)) < pr + 10) {
                        // 魔法壁バリア: 1撃無効化
                        if (skills.barrier.active && !skills.barrier.shieldHit) {
                            skills.barrier.shieldHit = true;
                            playSoundEffect('shield');
                            spawnGlowParticles(pcx, pcy, '#44AAFF', 14);
                            projectiles.splice(i, 1);
                            continue;
                        }
                        const playerDebuffP = (bossDebuffTarget === 'player' && bossDebuffTimer > 0 && p.isBossProjectile) ? 2 : 1;
                        const dmgP = Math.max(1, Math.floor(playerDebuffP * (1.0 - philSynthBonuses.dmgReduce)));
                        player.hp -= dmgP;
                        if (philSynthBonuses.dmgXP > 0) gainXP(philSynthBonuses.dmgXP);
                        stageDamageTaken = true;
                        player.invincibleTimer = 60;
                        playSoundEffect('damage');
                        projectiles.splice(i, 1);
                        if (player.hp <= 0 && !isGameOver) {
                            isGameOver = true;
                            gameOverTimer = 300; // 5秒間の演出
                            deathScenePhase = 1;
                            deathSceneTimer = 300;
                            deathX = player.x;
                            deathY = player.y;
                            graveMarkers.push({ x: player.x, y: player.y, stage: currentStageIndex });
                            savedItemsForContinue = { hasLongSword, hasBow, hasShield, hasBoots,
                                philItems: JSON.parse(JSON.stringify(philItems)),
                                synthesisBonuses: JSON.parse(JSON.stringify(synthesisBonuses)),
                                philSynthBonuses: JSON.parse(JSON.stringify(philSynthBonuses)),
                                meditationAtkBonus, meditationHpBonus, meditationXpBonus, meditationSpdBonus };
                            saveGame();
                            playSoundEffect('gameover');
                        }
                        continue; // 弾消滅
                    }
                }
            }


            // -- 敵の処理 --
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                if (enemy.hp <= 0) continue;
                if (bossDialogueActive && enemy.isBoss) continue; // 対話中はボス停止

                if (enemy.hitTimer > 0) enemy.hitTimer--;

                // 中心点などの計算用
                const ecx = enemy.x + SPRITE_SIZE / 2;
                const ecy = enemy.y + SPRITE_SIZE / 2;
                const er = SPRITE_SIZE * 0.4; // 敵の当たり判定半径
                const pr = SPRITE_SIZE * 0.4; // プレイヤーの当たり判定半径

                // 隠しボス「無の化身」の特殊フェーズ処理
                if (enemy.isHiddenBoss) {
                    if (enemy.hp <= enemy.maxHp * 0.3 && enemy.phase === 1) {
                        enemy.phase = 2;
                        centerMessage = '「無の化身」が変貌した！';
                        msgTimer = 90;
                    }
                    enemy.phaseTimer++;
                    if (enemy.phase === 2 && enemy.phaseTimer % 300 === 0) {
                        // フェーズ2: 300フレームごとに通常敵を2体スポーン
                        for (let s = 0; s < 2; s++) {
                            let ex = enemy.x + (s === 0 ? -100 : 100);
                            let ey = enemy.y + (s === 0 ? 100 : -100);
                            ex = Math.max(SPRITE_SIZE, Math.min(WORLD_W - SPRITE_SIZE * 2, ex));
                            ey = Math.max(SPRITE_SIZE, Math.min(WORLD_H - SPRITE_SIZE * 2, ey));
                            enemies.push({
                                x: ex, y: ey,
                                hp: 3, maxHp: 3, speed: 1.5, type: 0,
                                sprite: null, fireInterval: 0, fireTimer: 0, hitTimer: 0
                            });
                        }
                    }
                }

                // 敵の移動・攻撃処理（ノックバック中は動かない）
                if (enemy.hitTimer === 0) {
                    const tsMult = skills.timeslow.active ? 0.25 : 1.0; // 時停止スキル乗数
                    let edx = player.x - enemy.x;
                    let edy = player.y - enemy.y;
                    const dist = Math.sqrt(edx * edx + edy * edy);

                    // 隠しボスの移動AI
                    if (enemy.isHiddenBoss) {
                        const orbitRadius = enemy.phase === 2 ? 120 : 200;
                        const orbitSpeed = (enemy.phase === 2 ? 0.04 : 0.025) * tsMult;
                        enemy.orbitAngle = (enemy.orbitAngle || 0) + orbitSpeed;
                        const targetX = player.x + Math.cos(enemy.orbitAngle) * orbitRadius - SPRITE_SIZE / 2;
                        const targetY = player.y + Math.sin(enemy.orbitAngle) * orbitRadius - SPRITE_SIZE / 2;
                        const tdx = targetX - enemy.x;
                        const tdy = targetY - enemy.y;
                        const tdist = Math.sqrt(tdx * tdx + tdy * tdy) || 1;
                        const spd = (enemy.phase === 2 ? enemy.speed * 1.5 : enemy.speed) * tsMult;
                        const moveX = enemy.x + (tdx / tdist) * spd;
                        const moveY = enemy.y + (tdy / tdist) * spd;
                        enemy.x = Math.max(SPRITE_SIZE, Math.min(WORLD_W - SPRITE_SIZE * 2, moveX));
                        enemy.y = Math.max(SPRITE_SIZE, Math.min(WORLD_H - SPRITE_SIZE * 2, moveY));
                        // ダッシュ攻撃
                        const dashInterval = enemy.phase === 2 ? 90 : 150;
                        if (enemy.phaseTimer % dashInterval === 50) {
                            const dashDist = dist || 1;
                            enemy.x = Math.max(SPRITE_SIZE, Math.min(WORLD_W - SPRITE_SIZE * 2, enemy.x + (edx / dashDist) * 60));
                            enemy.y = Math.max(SPRITE_SIZE, Math.min(WORLD_H - SPRITE_SIZE * 2, enemy.y + (edy / dashDist) * 60));
                        }
                        // 弾発射
                        enemy.fireTimer++;
                        if (enemy.fireTimer > enemy.fireInterval) {
                            enemy.fireTimer = 0;
                            const angle = Math.atan2(edy, edx);
                            const shots = enemy.phase === 2 ? 5 : 3;
                            for (let a = 0; a < shots; a++) {
                                const spread = (a - Math.floor(shots / 2)) * 0.3;
                                projectiles.push({
                                    x: enemy.x + SPRITE_SIZE / 2 - 12,
                                    y: enemy.y + SPRITE_SIZE / 2 - 12,
                                    dx: Math.cos(angle + spread),
                                    dy: Math.sin(angle + spread),
                                    speed: 3.5, sprite: MAGIC_SPRITE, timer: 150,
                                    isBossProjectile: true
                                });
                            }
                        }
                    } else if (enemy.type === 'mage' || enemy.type === 'archer' || enemy.type === 'boss') {
                        // 遠距離タイプは一定距離を保つ、または火を噴く
                        enemy.fireTimer++;
                        if (dist > 250) {
                            if (dist > 0) { edx /= dist; edy /= dist; }
                            const nextEx = enemy.x + edx * enemy.speed * tsMult;
                            const nextEy = enemy.y + edy * enemy.speed * tsMult;
                            if (isWalkable(nextEx, enemy.y)) enemy.x = nextEx;
                            if (isWalkable(enemy.x, nextEy)) enemy.y = nextEy;
                        }
                        if (enemy.fireTimer > enemy.fireInterval) {
                            enemy.fireTimer = 0;
                            // 弾を発射
                            let pdirX = edx / dist;
                            let pdirY = edy / dist;
                            if (enemy.type === 'boss') {
                                // 扇状に3発撃つ
                                for (let a = -1; a <= 1; a++) {
                                    projectiles.push({
                                        x: ecx - 12, y: ecy - 12,
                                        dx: Math.cos(Math.atan2(pdirY, pdirX) + a * 0.3),
                                        dy: Math.sin(Math.atan2(pdirY, pdirX) + a * 0.3),
                                        speed: 3, sprite: MAGIC_SPRITE, timer: 150,
                                        isBossProjectile: true
                                    });
                                }
                            } else {
                                projectiles.push({
                                    x: ecx - 12, y: ecy - 12, dx: pdirX, dy: pdirY,
                                    speed: enemy.type === 'archer' ? 4 : 2.5,
                                    sprite: enemy.type === 'archer' ? ARROW_SPRITE : MAGIC_SPRITE,
                                    timer: 150
                                });
                            }
                        }
                    } else {
                        // 近接タイプ
                        if (dist > 0) {
                            edx /= dist;
                            edy /= dist;
                            const nextEx = enemy.x + edx * enemy.speed * tsMult;
                            const nextEy = enemy.y + edy * enemy.speed * tsMult;
                            if (isWalkable(nextEx, enemy.y)) enemy.x = nextEx;
                            if (isWalkable(enemy.x, nextEy)) enemy.y = nextEy;
                        }
                    }
                }

                // プレイヤー側の攻撃判定
                if (player.isAttacking && player.attackTimer === 13) {
                    const comboMult = comboStep === 2 ? 1.4 : comboStep === 3 ? 1.8 : 1.0;
                    const attackDist = (hasLongSword ? TILE_SIZE * 1.5 : TILE_SIZE) * (comboStep >= 2 ? 1.3 : 1.0);
                    const ax = comboStep === 3 ? player.x + SPRITE_SIZE / 2 : player.x + SPRITE_SIZE / 2 + player.dirX * attackDist;
                    const ay = comboStep === 3 ? player.y + SPRITE_SIZE / 2 : player.y + SPRITE_SIZE / 2 + player.dirY * attackDist;
                    const ar = (hasLongSword ? TILE_SIZE * 0.8 : TILE_SIZE * 0.5) * (comboStep >= 2 ? 1.5 : 1.0) * (comboStep === 3 ? 2.2 : 1.0);

                    // 1マス先の障害物チェック（攻撃が岩や池を越えないようにする）
                    const checkX = player.x + SPRITE_SIZE / 2 + player.dirX * TILE_SIZE;
                    const checkY = player.y + SPRITE_SIZE / 2 + player.dirY * TILE_SIZE;
                    let tx = Math.floor(checkX / TILE_SIZE);
                    let ty = Math.floor(checkY / TILE_SIZE);
                    if (tx < 0) tx = MAP_COLS - 1; else if (tx >= MAP_COLS) tx = 0;
                    if (ty < 0) ty = MAP_ROWS - 1; else if (ty >= MAP_ROWS) ty = 0;
                    const tileType = mapData[ty * MAP_COLS + tx];
                    const isAttackBlocked = (comboStep !== 3) && (tileType === 1 || tileType === 2);

                    // combo_only チャレンジ: 必要コンボ数未満ではダメージなし
                    const comboMinRequired = (dailyChallengeActive && currentDailyChallenge && currentDailyChallenge.rule === 'combo_only') ? currentDailyChallenge.param : 1;
                    if (!isAttackBlocked && Math.hypot(ax - ecx, ay - ecy) < (ar + er) && comboStep >= comboMinRequired) {
                        const bossBoost = (enemy.isBoss && bossDebuffTarget === 'boss' && bossDebuffTimer > 0) ? 2.0 : 1.0;
                        const rengekiBoost = skills.rengeki.active ? 2.0 : 1.0;
                        enemy.hp -= playerATK * (hasLongSword ? 1.5 : 1.0) * comboMult * bossBoost * rengekiBoost;
                        if (comboStep === 3) achievementStats.combo3Count++;
                        enemy.hitTimer = 10;
                        spawnParticles(enemy.x + SPRITE_SIZE/2, enemy.y + SPRITE_SIZE/2, '#8844FF', 6, 3);
                        screenShake = Math.max(screenShake, 4);

                        // AOE攻撃 (弁証法の杖)
                        if (philSynthBonuses.aoeChance > 0 && Math.random() < philSynthBonuses.aoeChance) {
                            for (let k = 0; k < enemies.length; k++) {
                                if (k !== i) {
                                    enemies[k].hp -= playerATK * 0.5;
                                    enemies[k].hitTimer = 10;
                                    spawnParticles(enemies[k].x + SPRITE_SIZE/2, enemies[k].y + SPRITE_SIZE/2, '#AADDFF', 4, 3);
                                }
                            }
                            spawnParticles(player.x + SPRITE_SIZE/2, player.y + SPRITE_SIZE/2, '#AADDFF', 12, 5);
                        }

                        // ノックバック
                        const kbForce = comboStep === 3 ? 35 : 15;
                        enemy.x += (comboStep === 3 ? (enemy.x > player.x ? 1 : -1) : player.dirX) * kbForce;
                        enemy.y += (comboStep === 3 ? (enemy.y > player.y ? 1 : -1) : player.dirY) * kbForce;

                        // ボス50%で哲学対話発動（隠しボスは除く）
                        if (enemy.isBoss && !enemy.isHiddenBoss && !bossDialogueTriggered && enemy.hp <= enemy.maxHp * 0.5 && enemy.hp > 0) {
                            bossDialogueTriggered = true;
                            bossDialogueActive = true;
                            bossDialogueCursor = 0;
                            bossDialogueTimer = 600;
                        }

                        if (enemy.hp <= 0) {
                            playSoundEffect('kill');
                            pScore += enemy.maxHp * (enemy.isBoss ? 5 : 1);
                            gainXP(Math.floor(enemy.maxHp * (enemy.isBoss ? 8 : 4) * DIFF_XP_MULT[difficultyLevel] * (comboStep === 3 ? 1.25 : 1.0)));
                            enemiesDefeatedInStage++;

                            if (Math.random() < 0.18) {
                                items.push({ x: enemy.x, y: enemy.y, sprite: HEART_SPRITE });
                            }
                            if (enemiesDefeatedInStage === 8 && !itemBoxSpawnedThisStage) {
                                items.push({ x: WORLD_W / 2, y: WORLD_H / 2, sprite: ITEM_BOX_SPRITE, isBox: true });
                                itemBoxSpawnedThisStage = true;
                            }

                            // カルマ: 正面で倒した場合
                            const facingEnemy = (player.dirX !== 0 && Math.sign(enemy.x - player.x) === player.dirX) ||
                                                (player.dirY !== 0 && Math.sign(enemy.y - player.y) === player.dirY);
                            if (facingEnemy) karma.bu++;
                            const wasBoss2 = enemy.isBoss;
                            spawnParticles(enemy.x + SPRITE_SIZE/2, enemy.y + SPRITE_SIZE/2, '#FFD700', 12, 5);
                            if (wasBoss2) spawnGlowParticles(enemy.x + SPRITE_SIZE/2, enemy.y + SPRITE_SIZE/2, '#FFD700', 18);
                            screenShake = Math.max(screenShake, 8);
                            enemies.splice(i, 1);

                            if (wasBoss2 && enemy && enemy.isHiddenBoss) {
                                // 隠しボス撃破 → 真エンディング
                                bossActive = false;
                                hiddenBossActive = false;
                                isStageAdvancing = true;
                                centerMessage = 'TRUE ENDING: 真理の化身\n叡智を集めし者よ\n汝は無と存在の境界を越えた\n— あなたは真の哲学者だ —';
                                msgTimer = 999;
                                unlockAchievement('true_ending');
                            } else if (wasBoss2 && !isStageAdvancing) {
                                bossActive = false;
                                achievementStats.bossKills++;
                                checkAchievements();
                                meditationPendingStage = currentStageIndex;
                                meditationPending = true;
                                meditationCursor = 0;
                                centerMessage = BOSS_DEFEAT_STORIES[currentStageIndex] || BOSS_DEFEAT_STORIES[0];
                                msgTimer = 210;
                            } else if (!wasBoss2 && !isStageAdvancing) {
                                spawnEnemies();
                            }
                            continue;
                        } else {
                            playSoundEffect('hit');
                        }
                    }
                }

                // 敵からプレイヤーへの接触ダメージ判定
                if (player.invincibleTimer === 0 && enemy.hp > 0 && enemy.hitTimer === 0) {
                    const pcx = player.x + SPRITE_SIZE / 2;
                    const pcy = player.y + SPRITE_SIZE / 2;
                    let bossScale = enemy.type === 'boss' ? 1.5 : 1;
                    if (Math.hypot(pcx - ecx, pcy - ecy) < (pr + er * bossScale) * 0.8) {
                        // 魔法壁バリア: 1撃無効化
                        if (skills.barrier.active && !skills.barrier.shieldHit) {
                            skills.barrier.shieldHit = true;
                            playSoundEffect('shield');
                            spawnGlowParticles(pcx, pcy, '#44AAFF', 14);
                            player.invincibleTimer = 60;
                            continue;
                        }
                        const playerDebuff = (bossDebuffTarget === 'player' && bossDebuffTimer > 0 && enemy.isBoss) ? 2 : 1;
                        const dmgE = Math.max(1, Math.floor(playerDebuff * (1.0 - philSynthBonuses.dmgReduce)));
                        player.hp -= dmgE;
                        if (philSynthBonuses.dmgXP > 0) gainXP(philSynthBonuses.dmgXP);
                        stageDamageTaken = true;
                        player.invincibleTimer = 60;
                        playSoundEffect('damage');

                        // ノックバック
                        const kbDx = pcx - ecx;
                        const kbDy = pcy - ecy;
                        const len = Math.hypot(kbDx, kbDy) || 1;

                        const knockBackX = player.x + (kbDx / len) * 30;
                        const knockBackY = player.y + (kbDy / len) * 30;

                        if (!philSynthBonuses.noKnockback && isWalkable(knockBackX, player.y)) player.x = knockBackX;

                        if (!philSynthBonuses.noKnockback && isWalkable(player.x, knockBackY)) player.y = knockBackY;

                        if (player.x < 0) player.x = 0;
                        else if (player.x > WORLD_W - SPRITE_SIZE) player.x = WORLD_W - SPRITE_SIZE;
                        if (player.y < 0) player.y = 0;
                        else if (player.y > WORLD_H - SPRITE_SIZE) player.y = WORLD_H - SPRITE_SIZE;

                        if (player.hp <= 0 && !isGameOver) {
                            isGameOver = true;
                            gameOverTimer = 300; // 5秒間の演出
                            deathScenePhase = 1;
                            deathSceneTimer = 300;
                            deathX = player.x;
                            deathY = player.y;
                            graveMarkers.push({ x: player.x, y: player.y, stage: currentStageIndex });
                            savedItemsForContinue = { hasLongSword, hasBow, hasShield, hasBoots,
                                philItems: JSON.parse(JSON.stringify(philItems)),
                                synthesisBonuses: JSON.parse(JSON.stringify(synthesisBonuses)),
                                philSynthBonuses: JSON.parse(JSON.stringify(philSynthBonuses)),
                                meditationAtkBonus, meditationHpBonus, meditationXpBonus, meditationSpdBonus };
                            saveGame();
                            playSoundEffect('gameover');
                        }
                    }
                }
            }

            // --- 敵補充 (継続スポーン) ---
            if (!isGameOver && !bossActive && !isStageAdvancing) {
                spawnEnemies();
            }

            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer === 0) comboStep = 0;
            }

            if (player.isAttacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) player.isAttacking = false;
            }

            spawnAmbient();
            updateAmbient();
            // 火山ステージの地震
            if (getActiveStageConfig(currentStageIndex).ambient === 'embers' && Math.random() < 0.004) {
                screenShake = Math.max(screenShake, 5 + Math.random() * 8);
            }
            if (bossDebuffTimer > 0) bossDebuffTimer--;
            if (achievementPopup && achievementPopup.timer > 0) achievementPopup.timer--;
            updateSkills();
            checkSkillUnlocks();
            updateParticles();
        }

        function drawShape(sprite, fx, fy, rot, scale, isHitFlash = false, flipX = false, targetCtx = ctx) {
            const rowCount = sprite.length;
            const colCount = sprite[0].length;
            const width = colCount * scale;
            const height = rowCount * scale;
            targetCtx.save();
            targetCtx.translate(Math.round(fx) + width / 2, Math.round(fy) + height / 2);
            targetCtx.rotate(rot);
            if (flipX) targetCtx.scale(-1, 1);
            targetCtx.translate(-width / 2, -height / 2);
            for (let r = 0; r < rowCount; r++) {
                if (!sprite[r]) continue;
                for (let c = 0; c < colCount; c++) {
                    const colorId = sprite[r][c];
                    if (colorId && PALETTE[colorId]) {
                        targetCtx.fillStyle = PALETTE[colorId];
                        if (isHitFlash && colorId !== 0 && colorId !== 1) {
                            targetCtx.fillStyle = '#FFFFFF';
                        }
                        targetCtx.fillRect(c * scale, r * scale, scale + 0.5, scale + 0.5);
                    }
                }
            }
            targetCtx.restore();
        }

        // ==== ビネットオーバーレイ ====
        function drawVignette() {
            const vg = ctx.createRadialGradient(VIEW_W/2, VIEW_H/2, VIEW_H*0.3, VIEW_W/2, VIEW_H/2, VIEW_H*0.75);
            vg.addColorStop(0, 'rgba(0,0,0,0)');
            vg.addColorStop(1, 'rgba(0,0,0,0.45)');
            ctx.fillStyle = vg;
            ctx.fillRect(0, 0, VIEW_W, VIEW_H);
        }

        // ==== グロー効果ヘルパー ====
        function drawGlow(targetCtx, x, y, r, color, strength = 15) {
            targetCtx.save();
            targetCtx.shadowBlur = strength;
            targetCtx.shadowColor = color;
            targetCtx.beginPath();
            targetCtx.arc(x, y, r, 0, Math.PI * 2);
            targetCtx.fillStyle = color;
            targetCtx.globalAlpha = 0.18;
            targetCtx.fill();
            targetCtx.restore();
        }

        function drawVirtualPad() {
            if (!isTouchDevice) return;
            ctx.save();
            ctx.globalAlpha = 0.45;

            // Dパッド外円
            ctx.beginPath();
            ctx.arc(VPAD.cx, VPAD.cy, VPAD.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#223344';
            ctx.fill();
            ctx.strokeStyle = '#4488aa';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Dパッド十字
            const arms = [
                [0, -1, '▲'], [0, 1, '▼'], [-1, 0, '◀'], [1, 0, '▶']
            ];
            arms.forEach(([ax, ay, label]) => {
                const bx = VPAD.cx + ax * VPAD.radius * 0.6;
                const by = VPAD.cy + ay * VPAD.radius * 0.6;
                const active = (ax === -1 && touch.left) || (ax === 1 && touch.right) ||
                               (ay === -1 && touch.up)   || (ay === 1  && touch.down);
                ctx.fillStyle = active ? '#88ddff' : '#4488aa';
                ctx.font = 'bold 18px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(label, bx, by);
            });

            // 攻撃ボタン
            ctx.beginPath();
            ctx.arc(VPAD.atkX, VPAD.atkY, VPAD.atkR, 0, Math.PI * 2);
            ctx.fillStyle = touch.attack ? '#ff6644' : '#882200';
            ctx.fill();
            ctx.strokeStyle = '#ffaa88';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('ATK', VPAD.atkX, VPAD.atkY);

            // 盾ボタン
            ctx.beginPath();
            ctx.arc(VPAD.shieldX, VPAD.shieldY, VPAD.shieldR, 0, Math.PI * 2);
            ctx.fillStyle = touch.shield ? '#4488ff' : '#112266';
            ctx.fill();
            ctx.strokeStyle = '#6699ff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 11px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('DEF', VPAD.shieldX, VPAD.shieldY);

            // 武器切替ボタン
            ctx.beginPath();
            ctx.arc(VPAD.weaponX, VPAD.weaponY, VPAD.weaponR, 0, Math.PI * 2);
            ctx.fillStyle = '#224422';
            ctx.fill();
            ctx.strokeStyle = '#44aa44';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.fillStyle = '#aaffaa';
            ctx.font = 'bold 9px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('WPN', VPAD.weaponX, VPAD.weaponY);

            ctx.restore();
        }

        function drawBossDialogue() {
            if (!bossDialogueActive) {
                // debuff中のボスに視覚効果表示
                if (bossDebuffTimer > 0 && bossDebuffTarget === 'boss') {
                    ctx.save();
                    ctx.fillStyle = `rgba(0,255,100,${(bossDebuffTimer % 20 < 10) ? 0.08 : 0})`;
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    ctx.restore();
                } else if (bossDebuffTimer > 0 && bossDebuffTarget === 'player') {
                    ctx.save();
                    ctx.fillStyle = `rgba(255,0,0,${(bossDebuffTimer % 20 < 10) ? 0.07 : 0})`;
                    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                    ctx.restore();
                }
                return;
            }
            const dlg = BOSS_DIALOGUES[currentStageIndex % BOSS_DIALOGUES.length];
            const timeRatio = bossDialogueTimer / 600;

            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.82)';
            ctx.fillRect(0, 0, VIEW_W, VIEW_H);
            ctx.textAlign = 'center';

            // タイマーバー
            ctx.fillStyle = timeRatio > 0.4 ? '#EFD02E' : '#FF4444';
            ctx.fillRect(VIEW_W / 2 - 200, 28, 400 * timeRatio, 10);
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            ctx.strokeRect(VIEW_W / 2 - 200, 28, 400, 10);

            ctx.fillStyle = '#FF6666';
            ctx.font = 'bold 14px monospace';
            ctx.fillText(`— ボスの問いかけ — (${Math.ceil(bossDialogueTimer/60)}秒)`, VIEW_W / 2, 60);

            // 問い
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 22px monospace';
            ctx.fillText(`「${dlg.q}」`, VIEW_W / 2, 110);

            // 2択
            dlg.answers.forEach((ans, i) => {
                const sel = bossDialogueCursor === i;
                const bx = VIEW_W / 2 - 240 + i * 260;
                const by = 160;
                ctx.fillStyle = sel ? 'rgba(239,208,46,0.2)' : 'rgba(255,255,255,0.05)';
                ctx.fillRect(bx - 110, by, 220, 70);
                ctx.strokeStyle = sel ? '#EFD02E' : '#444444';
                ctx.lineWidth = sel ? 2 : 1;
                ctx.strokeRect(bx - 110, by, 220, 70);
                ctx.fillStyle = sel ? '#FFFFFF' : '#AAAAAA';
                ctx.font = (sel ? 'bold ' : '') + '15px monospace';
                ctx.fillText((sel ? '▶ ' : '  ') + ans, bx, by + 40);
            });

            ctx.fillStyle = '#555';
            ctx.font = '13px monospace';
            ctx.fillText('← → 選択   Enter 回答', VIEW_W / 2, 260);
            ctx.textAlign = 'left';
            ctx.restore();
        }

                ctx.fillStyle = '#777777';
                ctx.font = 'italic 12px monospace';
                ctx.fillText(`— ${opt.philosopher}`, bx + 26, by + 56);
            });

            ctx.fillStyle = '#444444';
            ctx.font = '13px monospace';
            ctx.fillText('↑↓ 選択   Enter / Space 決定', VIEW_W / 2, VIEW_H - 30);

        function startNarrative(si) {
            narrativeTimer = 240;
            narrativeStage = si;
            const name = STAGE_NAMES[si] || '';
            const quote = STAGE_QUOTES[si] || '';
            const story = STAGE_STORIES[si] || '';
            const line1 = `STAGE ${si + 1}  —  ${name}`;
            const line2 = quote;
            const line3 = story;
            narrativeTypewriter = {
                text: '',
                line1Target: line1,
                line2Target: line2,
                line3Target: line3,
                charIndex: 0,
                charTimer: 0,
                totalLen: line1.length + line2.length + line3.length
            };
            narrativeParticles = [];
        }

        function updateNarrativeParticles() {
            for (let i = narrativeParticles.length - 1; i >= 0; i--) {
                const p = narrativeParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.88;
                p.vy *= 0.88;
                p.life--;
                if (p.life <= 0) narrativeParticles.splice(i, 1);
            }
        }

        function drawNarrativeOverlay() {
            if (narrativeTimer <= 0) return;
            const alpha = narrativeTimer > 150 ? 1.0 :
                          narrativeTimer > 30  ? (narrativeTimer - 30) / 120 : narrativeTimer / 30;
            ctx.save();
            ctx.globalAlpha = Math.min(alpha, 0.88);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, VIEW_W, VIEW_H);

            // Update typewriter state
            const tw = narrativeTypewriter;
            const totalLen = tw.totalLen || 1;
            if (tw.charIndex < totalLen) {
                tw.charTimer--;
                if (tw.charTimer <= 0) {
                    tw.charTimer = 3;
                    tw.charIndex++;
                    // Spawn gold particles at text position when a new char appears
                    const textX = VIEW_W / 2;
                    const l1Len = (tw.line1Target || '').length;
                    const l2Len = (tw.line2Target || '').length;
                    const textY = tw.charIndex <= l1Len
                        ? VIEW_H / 2 - 50
                        : tw.charIndex <= l1Len + l2Len
                            ? VIEW_H / 2 - 5
                            : VIEW_H / 2 + 60;
                    for (let i = 0; i < 5; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const spd = 1 + Math.random() * 2;
                        narrativeParticles.push({
                            x: textX + (Math.random() - 0.5) * 80,
                            y: textY,
                            vx: Math.cos(angle) * spd,
                            vy: Math.sin(angle) * spd,
                            life: 15 + Math.floor(Math.random() * 15),
                            maxLife: 30,
                            color: '#FFD700',
                            size: 1.5 + Math.random() * 2,
                        });
                    }
                }
            }

            // Split typewriter progress into line1 / line2 / line3
            const l1 = tw.line1Target || '';
            const l2 = tw.line2Target || '';
            const l3 = tw.line3Target || '';
            const l1Shown = l1.slice(0, Math.min(tw.charIndex, l1.length));
            const l2Shown = l2.slice(0, Math.max(0, tw.charIndex - l1.length));
            const l3Shown = l3.slice(0, Math.max(0, tw.charIndex - l1.length - l2.length));
            const typing = tw.charIndex < totalLen;
            const cursorChar = (typing && Math.floor(Date.now() / 300) % 2 === 0) ? '|' : '';

            ctx.globalAlpha = alpha;

            // Draw narrative particles (UI-space, no camera offset)
            updateNarrativeParticles();
            for (const p of narrativeParticles) {
                const pAlpha = p.life / p.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha * pAlpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * pAlpha, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            ctx.globalAlpha = alpha;

            // ステージ番号 + 名前 (line 1)
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 22px monospace';
            ctx.textAlign = 'center';
            const displayL1 = l1Shown + (tw.charIndex <= l1.length ? cursorChar : '');
            ctx.fillText(displayL1, VIEW_W / 2, VIEW_H / 2 - 50);

            // 哲学的テキスト (line 2)
            ctx.fillStyle = '#AADDFF';
            ctx.font = '17px monospace';
            const displayL2 = l2Shown + (tw.charIndex > l1.length && tw.charIndex <= l1.length + l2.length ? cursorChar : '');
            ctx.fillText(displayL2, VIEW_W / 2, VIEW_H / 2 - 5);

            // ストーリーテキスト (line 3) — 改行対応
            if (l3Shown.length > 0 || tw.charIndex > l1.length + l2.length) {
                ctx.fillStyle = `rgba(200,220,180,${alpha * 0.85})`;
                ctx.font = '13px monospace';
                const displayL3 = l3Shown + (tw.charIndex > l1.length + l2.length ? cursorChar : '');
                const l3Lines = displayL3.split('\n');
                l3Lines.forEach((ln, idx) => {
                    ctx.fillText(ln, VIEW_W / 2, VIEW_H / 2 + 50 + idx * 20);
                });
            }

            // フェードアウト指示
            if (narrativeTimer < 60) {
                ctx.fillStyle = `rgba(150,150,150,${alpha * 0.7})`;
                ctx.font = '13px monospace';
                ctx.fillText('— Press any key to skip —', VIEW_W / 2, VIEW_H / 2 + 130);
            }
            ctx.restore();
        }
